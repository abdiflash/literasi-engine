<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Redaksi - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .navy-bg { background-color: #044A80; }
        .navy-text { color: #044A80; }
        .navy-border { border-color: #044A80; }
        
        /* Render konten dari Quill Editor */
        .content-render { font-size: 1.1rem; color: #334155; line-height: 1.8; }
        .content-render h1, .content-render h2 { font-weight: 800; color: #0f172a; margin-top: 1.5rem; }
        .content-render p { margin-bottom: 1.2rem; }
        .content-render blockquote { border-left: 4px solid #044A80; padding-left: 1rem; font-style: italic; background: #f8fafc; padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .content-render img { border-radius: 12px; margin: 1rem 0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        /* Custom Scrollbar */
        #articleList::-webkit-scrollbar { width: 6px; }
        #articleList::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="navy-bg p-4 rounded-2xl text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800">Ruang <span class="navy-text">Redaksi</span></h1>
                    <p class="text-slate-500 font-medium text-sm">Dashboard Kurasi Naskah Masuk</p>
                </div>
            </div>
            <button onclick="loadData()" class="bg-blue-50 text-blue-700 font-bold px-6 py-3 rounded-xl hover:bg-blue-100 transition-all flex items-center gap-2 border border-blue-200">
                <span id="refreshIcon">🔄</span> Perbarui Data
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col h-[750px]">
                <div class="flex items-center justify-between mb-4 border-b pb-4">
                    <h2 class="font-bold text-slate-700 flex items-center gap-2">
                        Antrean Review <span id="countBadge" class="bg-orange-500 text-white text-[10px] px-2 py-1 rounded-full">0</span>
                    </h2>
                </div>
                
                <div id="loadingList" class="flex flex-col items-center justify-center py-10 space-y-3">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-[#044A80]"></div>
                    <p class="text-sm text-slate-400 italic">Menghubungkan ke server...</p>
                </div>

                <div id="articleList" class="space-y-3 overflow-y-auto flex-1 pr-2">
                    </div>
            </div>

            <div class="lg:col-span-8 bg-white p-6 md:p-10 rounded-3xl shadow-sm border border-slate-200 hidden min-h-[750px]" id="reviewArea">
                <div class="mb-8 border-b pb-8">
                    <div class="flex justify-between items-start mb-4">
                        <span id="revKategori" class="navy-bg text-white text-[10px] font-bold px-3 py-1 rounded-lg uppercase tracking-wider">KATEGORI</span>
                        <span class="text-slate-400 text-xs font-medium" id="revID">ID Artikel</span>
                    </div>
                    <h1 id="revJudul" class="text-3xl font-black text-slate-900 mb-4 leading-tight">Judul Naskah</h1>
                    
                    <div class="flex flex-wrap items-center gap-y-2 gap-x-6 text-slate-500 text-sm font-medium">
                        <div class="flex items-center gap-2">
                            <span class="navy-text font-bold" id="revPenulis">Penulis</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span>📅 <span id="revTanggal">Tanggal</span></span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="bg-blue-50 navy-text px-2 py-1 rounded">📷 <span id="revSumberFoto" class="italic"></span></span>
                        </div>
                    </div>
                </div>

                <div id="revFotoArea" class="flex gap-4 overflow-x-auto mb-8 pb-4">
                    </div>

                <div id="revIsi" class="content-render p-8 rounded-2xl bg-slate-50 border border-slate-100 mb-10 shadow-inner">
                    Memuat konten...
                </div>

                <div class="flex flex-col md:flex-row gap-4 mt-auto">
                    <button id="btnSetujui" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-5 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                        <span>✅</span> SETUJUI & PUBLIKASIKAN
                    </button>
                    <button id="btnTolak" class="flex-1 bg-rose-600 hover:bg-rose-700 text-white font-bold py-5 rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2">
                        <span>❌</span> TOLAK NASKAH
                    </button>
                </div>
            </div>

            <div class="lg:col-span-8 flex items-center justify-center bg-white p-10 rounded-3xl shadow-sm border border-slate-200 border-dashed" id="emptyArea">
                <div class="text-center">
                    <div class="text-7xl mb-6 opacity-20">📂</div>
                    <h3 class="text-xl font-bold text-slate-700">Pilih Naskah Untuk Review</h3>
                    <p class="text-slate-400 mt-2">Klik salah satu naskah di kolom kiri untuk melihat isinya.</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxx87Qzy4VYYqnXET71EQc5cP_3ax9x4-sgLS8vEssE376fnSiOgfB91590qoBZ0kE-rA/exec"; // Ganti dengan URL Anda
    
        let globalArticles = [];
        let selectedArticleId = null;

        async function loadData() {
            const listContainer = document.getElementById('articleList');
            const loader = document.getElementById('loadingList');
            const badge = document.getElementById('countBadge');
            
            loader.style.display = 'flex';
            listContainer.innerHTML = '';
            
            try {
                // Menambahkan parameter ?action=searchPublic untuk mengambil data naskah
                const response = await fetch(`${GAS_WEB_APP_URL}?action=getPending`);
                const result = await response.json();
                
                loader.style.display = 'none';

                if(result.result === "success") {
                    globalArticles = result.data;
                    badge.innerText = globalArticles.length;

                    if(globalArticles.length === 0) {
                        listContainer.innerHTML = `
                            <div class="text-center py-10">
                                <p class="text-slate-400 italic text-sm">Tidak ada naskah baru.</p>
                            </div>`;
                        return;
                    }

                    globalArticles.forEach(art => {
                        const div = document.createElement('div');
                        div.className = "p-4 rounded-2xl border border-slate-100 bg-slate-50 hover:border-blue-400 hover:bg-blue-50 cursor-pointer transition-all group";
                        div.onclick = () => openArticle(art.id);
                        div.innerHTML = `
                            <div class="flex justify-between items-start mb-1">
                                <p class="text-[9px] font-bold text-blue-600 uppercase tracking-tighter">${art.kategori}</p>
                                <p class="text-[9px] text-slate-400">${art.id.split('-')[1] || ''}</p>
                            </div>
                            <h3 class="font-bold text-slate-800 line-clamp-2 leading-tight group-hover:navy-text">${art.judul}</h3>
                            <div class="flex justify-between items-center mt-3">
                                <p class="text-[10px] text-slate-500 font-medium font-bold">${art.penulis}</p>
                                <span class="text-[10px] text-slate-400">➡️</span>
                            </div>
                        `;
                        listContainer.appendChild(div);
                    });
                }
            } catch (err) {
                loader.innerHTML = '<span class="text-red-500 text-xs">Gagal terhubung ke database.</span>';
            }
        }

        function openArticle(id) {
            const art = globalArticles.find(a => a.id === id);
            if(!art) return;
            selectedArticleId = id;

            document.getElementById('emptyArea').classList.add('hidden');
            document.getElementById('reviewArea').classList.remove('hidden');

            document.getElementById('revKategori').innerText = art.kategori;
            document.getElementById('revID').innerText = art.id;
            document.getElementById('revJudul').innerText = art.judul;
            document.getElementById('revPenulis').innerText = art.penulis;
            document.getElementById('revTanggal').innerText = new Date(art.tanggal).toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
            document.getElementById('revSumberFoto').innerText = art.kredit || "Dokumen Pribadi";
            document.getElementById('revIsi').innerHTML = art.isi;

            const fotoArea = document.getElementById('revFotoArea');
            fotoArea.innerHTML = '';
            
            if(art.foto && art.foto.length > 0) {
                fotoArea.classList.remove('hidden');
                art.foto.forEach(link => {
                    let imageSrc = link;
                    // Optimasi thumbnail Google Drive
                    let fileIdMatch = link.match(/\/file\/d\/(.+?)\//) || link.match(/id=(.+?)(&|$)/);
                    if (fileIdMatch && fileIdMatch[1]) {
                        imageSrc = `https://drive.google.com/thumbnail?id=${fileIdMatch[1]}&sz=w800`;
                    }
                    
                    fotoArea.innerHTML += `
                        <div class="flex-shrink-0">
                            <img src="${imageSrc}" class="h-40 w-64 object-cover rounded-2xl border-2 border-white shadow-md bg-slate-200">
                        </div>`;
                });
            } else {
                fotoArea.classList.add('hidden');
            }
        }

        async function updateStatus(newStatus) {
            if(!selectedArticleId) return;
            if(!confirm(`Naskah ini akan di-${newStatus}. Lanjutkan?`)) return;

            const btnS = document.getElementById('btnSetujui');
            const btnT = document.getElementById('btnTolak');
            btnS.disabled = true; btnT.disabled = true;
            btnS.innerText = "Processing...";

            try {
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "updateStatus",
                        articleId: selectedArticleId,
                        status: newStatus
                    })
                });

                // Karena mode: no-cors di fetch GAS, kita asumsikan sukses jika fetch selesai
                alert(`Naskah telah ${newStatus === 'PUBLISHED' ? 'Diterbitkan!' : 'Ditolak!'}`);
                document.getElementById('emptyArea').classList.remove('hidden');
                document.getElementById('reviewArea').classList.add('hidden');
                loadData(); 

            } catch (err) {
                alert("Gagal memperbarui status.");
            } finally {
                btnS.disabled = false; btnT.disabled = false;
                btnS.innerHTML = "<span>✅</span> SETUJUI & PUBLIKASIKAN";
            }
        }

        document.getElementById('btnSetujui').addEventListener('click', () => updateStatus('PUBLISHED'));
        document.getElementById('btnTolak').addEventListener('click', () => updateStatus('REJECTED'));

        window.onload = loadData;
    </script>
</body>
</html>
