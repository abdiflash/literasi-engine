<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi Komunitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy-light: #38bdf8; --bg-dark: #0f172a; --card-dark: #1e293b; --border-dark: #334155; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow-x: hidden; }
        .navy-text { color: var(--navy-light); }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-dark); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .article-card { background: var(--card-dark); border: 1px solid var(--border-dark); transition: all 0.3s ease; cursor: pointer; border-radius: 2.5rem; }
        .article-card:hover { transform: translateY(-8px); border-color: var(--navy-light); }
        
        /* Wadah Media Utama Standar (Artikel/Cerpen/Esai) */
        .media-box { position: relative; width: 100%; aspect-ratio: 16/10; background: #020617; border-radius: 2rem; border: 1px solid var(--border-dark); overflow: hidden; }
        .slider-container { display: flex; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .slider-item-container { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 0.5rem; }
        .slider-item { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 1.5rem; }

        /* Mode Komik Memanjang */
        .media-box.comic-mode:not(.video-active) { 
            aspect-ratio: auto !important; 
            height: auto !important; 
            overflow: visible !important; 
            background: transparent !important; 
            border: none !important; 
        }
        .media-box.comic-mode:not(.video-active) .slider-container { 
            flex-direction: column !important; 
            gap: 1rem; 
            transform: none !important; 
            height: auto !important; 
        }
        .media-box.comic-mode:not(.video-active) .slider-item { 
            width: 100% !important; 
            height: auto !important; 
            max-height: none !important; 
        }

        /* Video Display Mode */
        .media-box.video-active { 
            display: block !important;
            aspect-ratio: 16/10 !important; 
            width: 100% !important;
            height: auto !important; 
            overflow: hidden !important; 
            background: #020617 !important; 
            border: 1px solid var(--border-dark) !important; 
            border-radius: 2rem !important; 
        }

        .media-box.video-active #videoContent,
        .media-box.video-active #readYoutube {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }

        /* Gaya Tombol Navigasi Tab */
        .tab-btn-active { background-color: #38bdf8; color: #0f172a; font-weight: 800; border-color: #38bdf8; }
        .tab-btn-inactive { background-color: #1e293b; color: #94a3b8; font-weight: 600; border-color: #334155; }
        .tab-btn-inactive:hover { color: #fff; border-color: #475569; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center gap-2">
            <div class="text-xl sm:text-2xl font-black navy-text tracking-tighter cursor-pointer whitespace-nowrap" onclick="location.reload()">
                PORTAL<span class="text-slate-500 font-light italic">LITERASI</span>
            </div>
            <div class="flex items-center gap-5 sm:gap-7 structural-buttons">
                <a href="daftar.html" class="text-white font-bold text-xs sm:text-sm hover:text-[#38bdf8] transition-colors">Daftar</a>
                <a href="tulis.html" class="text-[#38bdf8] font-bold text-xs sm:text-sm hover:text-white transition-colors">Tulis</a>
                <button onclick="document.getElementById('searchInput').focus()" class="text-white hover:text-[#38bdf8] transition-colors" title="Pencarian">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main id="homeView">
        <header class="max-w-7xl mx-auto px-6 pt-12 sm:pt-16 pb-6 text-center">
            <h1 class="text-4xl sm:text-5xl md:text-7xl font-extrabold tracking-tighter mb-6 text-white">Jendela <span class="navy-text">Inspirasi</span></h1>
            
            <div class="relative max-w-2xl mx-auto mt-4 mb-10 px-4">
                <div class="relative w-full">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </div>
                    <input type="text" id="searchInput" oninput="applyFiltersAndRender()" placeholder="Cari karya, penulis, atau bulan/tahun..." class="w-full bg-slate-800/50 border border-slate-700 text-white py-4 pl-14 pr-6 rounded-2xl focus:ring-2 focus:ring-[#38bdf8] outline-none transition-all shadow-lg">
                </div>
            </div>

            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6 border-b border-slate-800 pb-6 mb-8 text-left">
                <div class="flex flex-wrap gap-2" id="filter-role-container">
                    <button onclick="filterByRole('Semua')" class="role-btn active px-5 py-2 rounded-full text-xs sm:text-sm font-bold tracking-wide uppercase bg-[#38bdf8] text-slate-900 transition-all shadow-md">Semua Peran</button>
                    <button onclick="filterByRole('Siswa')" class="role-btn px-5 py-2 rounded-full text-xs sm:text-sm font-bold tracking-wide uppercase bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all">Siswa</button>
                    <button onclick="filterByRole('Orang Tua')" class="role-btn px-5 py-2 rounded-full text-xs sm:text-sm font-bold tracking-wide uppercase bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all">Orang Tua</button>
                    <button onclick="filterByRole('Guru')" class="role-btn px-5 py-2 rounded-full text-xs sm:text-sm font-bold tracking-wide uppercase bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all">Guru</button>
                    <button onclick="filterByRole('Alumni')" class="role-btn px-5 py-2 rounded-full text-xs sm:text-sm font-bold tracking-wide uppercase bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all">Alumni</button>
                </div>

                <div class="flex flex-wrap items-center gap-4 self-start lg:self-auto">
                    <div class="flex items-center gap-2">
                        <span class="text-slate-400 text-xs font-bold uppercase tracking-wider">Kategori:</span>
                        <select id="category-select" onchange="applyFiltersAndRender()" class="bg-slate-800 text-white border border-slate-700 rounded-xl px-3 py-2 text-sm font-semibold outline-none focus:ring-1 focus:ring-[#38bdf8]">
                            <option value="Semua">Semua Kategori</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-slate-400 text-xs font-bold uppercase tracking-wider">Urutkan:</span>
                        <select id="sort-select" onchange="applyFiltersAndRender()" class="bg-slate-800 text-white border border-slate-700 rounded-xl px-3 py-2 text-sm font-semibold outline-none focus:ring-1 focus:ring-[#38bdf8]">
                            <option value="terbaru">Terbaru</option>
                            <option value="terlama">Terlama</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <section class="max-w-7xl mx-auto px-6 pb-20">
            <div id="articleGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
            <div id="paginationContainer" class="flex justify-center items-center gap-2 mt-16 flex-wrap"></div>
        </section>

        <section class="bg-slate-900/50 border-t border-slate-800 py-16 sm:py-20">
            <div class="max-w-7xl mx-auto px-6">
                <div class="flex items-center justify-between mb-10">
                    <div>
                        <h2 class="text-3xl font-black text-white italic tracking-tighter">🏆 TOP PENULIS</h2>
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Paling Aktif Minggu Ini</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="document.getElementById('leaderboardList').scrollBy({left: -300, behavior: 'smooth'})" class="p-3 rounded-full border border-slate-700 text-slate-400 hover:border-[#38bdf8] hover:text-[#38bdf8] transition-all bg-slate-800/30 hover:bg-slate-800">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                        </button>
                        <button onclick="document.getElementById('leaderboardList').scrollBy({left: 300, behavior: 'smooth'})" class="p-3 rounded-full border border-slate-700 text-slate-400 hover:border-[#38bdf8] hover:text-[#38bdf8] transition-all bg-slate-800/30 hover:bg-slate-800">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                        </button>
                    </div>
                </div>
                <div id="leaderboardList" class="flex gap-4 sm:gap-6 overflow-x-auto pb-8 no-scrollbar px-1 scroll-smooth"></div>
            </div>
        </section>
    </main>

    <main id="readView" class="hidden pb-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
            <button onclick="backToHome()" class="mb-8 font-black text-xs text-slate-500 hover:text-white transition-all tracking-widest uppercase inline-flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                KEMBALI KE GALERI
            </button>
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                <div class="lg:col-span-6 space-y-4 lg:sticky lg:top-24">
                    <div id="mediaTabs" class="flex gap-2 w-full hidden">
                        <button id="tabFoto" onclick="switchMedia('foto')" class="flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200">
                            📸 Galeri Foto
                        </button>
                        <button id="tabVideo" onclick="switchMedia('video')" class="flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200">
                            🎥 Video YouTube
                        </button>
                    </div>

                    <div id="mediaBox" class="media-box shadow-2xl">
                        <div id="sliderContent" class="h-full w-full relative">
                            <div id="imageSlider" class="slider-container"></div>
                            <button id="prevBtn" onclick="moveSlide(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-[#38bdf8] hover:text-slate-900 text-white w-10 h-10 rounded-full z-20 transition-all font-bold text-lg">‹</button>
                            <button id="nextBtn" onclick="moveSlide(1)" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-[#38bdf8] hover:text-slate-900 text-white w-10 h-10 rounded-full z-20 transition-all font-bold text-lg">›</button>
                        </div>
                        
                        <div id="videoContent" class="w-full h-full bg-black hidden">
                            <div id="readYoutube" class="w-full h-full"></div>
                        </div>
                    </div>

                    <p id="readKredit" class="text-[11px] font-bold italic text-slate-500 px-2 uppercase tracking-wider hidden"></p>
                </div>

                <div class="lg:col-span-6 bg-slate-900/30 border border-slate-800/60 p-6 sm:p-10 rounded-[2.5rem]">
                    <h1 id="readJudul" class="text-3xl sm:text-4xl md:text-5xl font-black text-white mb-6 leading-tight tracking-tighter"></h1>
                    
                    <div class="flex items-center gap-4 border-b border-slate-800/80 pb-6 mb-8">
                        <div id="readAvatar" class="w-12 h-12 rounded-xl bg-slate-800 overflow-hidden border border-slate-700"></div>
                        <div>
                            <p id="readPenulis" class="font-black text-white uppercase text-xs tracking-wider"></p>
                            <p id="readStats" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-0.5"></p>
                        </div>
                    </div>

                    <article id="readIsi" class="prose prose-invert max-w-none text-slate-300 text-base sm:text-lg leading-relaxed"></article>

                    <div id="actionContainer" class="mt-12 pt-6 border-t border-slate-800/80 space-y-4"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxx87Qzy4VYYqnXET71EQc5cP_3ax9x4-sgLS8vEssE376fnSiOgfB91590qoBZ0kE-rA/exec";
        
        // State Variables
        let allArticles = [];
        let filteredArticles = [];
        let authorMap = {};
        let currentPage = 1;
        const LIMIT = 9; // Grid 3x3 Membutuhkan Batas 9 Item
        let currentSlide = 0;
        let currentYoutubeId = null;
        let activeKategoriIsKomik = false;

        // State Filter Baru
        let currentSelectedRole = 'Semua';
        let currentSelectedCategory = 'Semua';

        function getThumb(url, size = "w1200") {
            if (!url || url === "") return "https://via.placeholder.com/800x450/1e293b/64748b?text=Portal+Literasi";
            const match = url.match(/[-\w]{25,}/);
            return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=${size}` : url;
        }

        function getYoutubeId(url) {
            if (!url) return null;
            const str = url.toString().trim();
            if (str.length === 11) return str; 
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = str.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // Helper Pencarian Waktu
        function formatIndonesianDate(timestampStr) {
            if (!timestampStr) return "";
            try {
                const d = new Date(timestampStr);
                if (isNaN(d.getTime())) return timestampStr;
                const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
            } catch (e) {
                return timestampStr;
            }
        }

        async function init() {
            try {
                const authRes = await fetch(`${GAS_URL}?action=getAuthors`).then(r => r.json());
                const authors = authRes.data || [];
                authors.forEach(a => { 
                    authorMap[a.pin?.toString().trim()] = { foto: a.foto, nama: a.nama }; 
                });
                renderLeaderboard(authors);

                const artRes = await fetch(GAS_URL).then(r => r.json());
                if (artRes.result === "success") {
                    allArticles = artRes.data;
                    
                    // Render Dropdown Kategori dari Data Sheets
                    renderCategoryDropdown(artRes.categories);
                    
                    // Filter Pertama Kali
                    applyFiltersAndRender();
                }
            } catch (e) { console.error("Error Loading:", e); }
        }

        // --- CORE FILTER ENGINE --- //
        function applyFiltersAndRender() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            const sortOrder = document.getElementById('sort-select').value;
            currentSelectedCategory = document.getElementById('category-select').value;

            // 1. Saring Peran dan Kategori
            filteredArticles = allArticles.filter(art => {
                const peran = (art.peran || art.Peran || art.peran_saat_menulis || art.Peran_Saat_Menulis || '').toLowerCase();
                const matchRole = (currentSelectedRole === 'Semua') || (peran === currentSelectedRole.toLowerCase());
                
                const matchCategory = (currentSelectedCategory === 'Semua') || ((art.kategori || '').toLowerCase() === currentSelectedCategory.toLowerCase());
                
                return matchRole && matchCategory;
            });

            // 2. Saring Pencarian Teks & Tanggal
            if (searchQuery !== "") {
                filteredArticles = filteredArticles.filter(art => {
                    const tgl = formatIndonesianDate(art.timestamp || art.Timestamp).toLowerCase();
                    const judul = (art.judul || "").toLowerCase();
                    const penulis = (art.penulis || "").toLowerCase();
                    const isi = (art.isi || "").toLowerCase();

                    return judul.includes(searchQuery) || penulis.includes(searchQuery) || isi.includes(searchQuery) || tgl.includes(searchQuery);
                });
            }

            // 3. Urutkan (Terbaru / Terlama)
            filteredArticles.sort((a, b) => {
                const timeA = new Date(a.timestamp || a.Timestamp).getTime() || 0;
                const timeB = new Date(b.timestamp || b.Timestamp).getTime() || 0;
                return sortOrder === 'terbaru' ? timeB - timeA : timeA - timeB;
            });

            currentPage = 1;
            renderPage();
        }

        function filterByRole(roleName) {
            currentSelectedRole = roleName;
            
            // Ubah Warna Tombol Peran
            const buttons = document.querySelectorAll('.role-btn');
            buttons.forEach(btn => {
                if (btn.innerText.trim() === roleName || (roleName === 'Semua' && btn.innerText.trim() === 'Semua Peran')) {
                    btn.classList.add('bg-[#38bdf8]', 'text-slate-900');
                    btn.classList.remove('bg-slate-800', 'text-slate-300');
                } else {
                    btn.classList.remove('bg-[#38bdf8]', 'text-slate-900');
                    btn.classList.add('bg-slate-800', 'text-slate-300');
                }
            });

            applyFiltersAndRender();
        }

        function renderCategoryDropdown(cats) {
            const select = document.getElementById('category-select');
            if(!cats || cats.length === 0) return;
            const rawCats = cats.filter(c => c && c.toLowerCase() !== "semua");
            const uniqueCats = [...new Set(rawCats)];
            
            select.innerHTML = `<option value="Semua">Semua Kategori</option>`;
            uniqueCats.forEach(c => {
                select.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }

        // --- RENDER GRID ENGINE --- //
        function renderPage() {
            const grid = document.getElementById('articleGrid');
            const start = (currentPage - 1) * LIMIT;
            const end = start + LIMIT;
            const pageData = filteredArticles.slice(start, end);

            if (pageData.length === 0) {
                grid.innerHTML = `<div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-20 text-slate-500 font-bold tracking-widest uppercase">Karya tidak ditemukan</div>`;
                updatePagination();
                return;
            }

            grid.innerHTML = pageData.map((art, idx) => {
                const pin = art.pin?.toString().trim();
                const fotoPenulis = authorMap[pin] ? getThumb(authorMap[pin].foto, "w100") : `https://ui-avatars.com/api/?name=${encodeURIComponent(art.penulis)}`;
                
                const peran = art.peran || art.Peran || art.peran_saat_menulis || art.Peran_Saat_Menulis || '';
                const detailPeran = art.detail_peran || art.Detail_Peran || '';
                const displayPeran = peran ? `${peran}${detailPeran ? ' • ' + detailPeran : ''}` : '';
                const tgl = formatIndonesianDate(art.timestamp || art.Timestamp);
                
                // Ambil foto pertama dengan aman (jika format berupa array atau string pisahan koma)
                let firstPhoto = "";
                if (art.foto) {
                    if (Array.isArray(art.foto) && art.foto.length > 0) firstPhoto = art.foto[0];
                    else if (typeof art.foto === 'string') firstPhoto = art.foto.split(',')[0].trim();
                }
                
                return `
                <div class="article-card p-5 fade-in flex flex-col justify-between" style="animation-delay: ${idx * 0.1}s" onclick="openReadView('${art.id}')">
                    <div>
                        <div class="h-56 mb-5 rounded-[1.8rem] overflow-hidden bg-slate-900 relative">
                            <img src="${getThumb(firstPhoto, "w600")}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x450/1e293b/64748b?text=Portal+Literasi'">
                            <div class="absolute top-4 left-4 bg-black/80 backdrop-blur-md px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-white/10">${art.kategori || 'Umum'}</div>
                        </div>
                        <span class="text-[10px] text-slate-500 font-bold tracking-wider mb-2 block uppercase">${tgl}</span>
                        <h3 class="text-xl font-bold text-white line-clamp-2 px-1 leading-snug mb-5 hover:text-[#38bdf8] transition-colors">${art.judul}</h3>
                    </div>
                    <div class="flex items-center justify-between px-1 pt-4 border-t border-slate-700/50 mt-auto">
                        <div class="flex items-center gap-3">
                            <img src="${fotoPenulis}" class="w-8 h-8 rounded-full object-cover border border-slate-600 shadow-sm" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(art.penulis)}'">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${art.penulis}</span>
                                ${displayPeran ? `<span class="text-[8px] font-semibold text-slate-500 uppercase tracking-wider mt-0.5">${displayPeran}</span>` : ''}
                            </div>
                        </div>
                        <span class="text-[10px] font-black text-slate-600 tracking-tighter">👁️ ${art.views || 0}</span>
                    </div>
                </div>`;
            }).join('');
            
            updatePagination();
        }

        // --- SYSTEM PAGINATION BUILDER --- //
        function updatePagination() {
            const container = document.getElementById('paginationContainer');
            container.innerHTML = "";
            const totalPages = Math.ceil(filteredArticles.length / LIMIT);
            
            if (totalPages <= 1) return;

            // Tombol PREV
            const prevDisabled = currentPage === 1;
            container.insertAdjacentHTML('beforeend', `
                <button onclick="changePage(${currentPage - 1})" ${prevDisabled ? 'disabled' : ''} 
                        class="px-4 py-2 rounded-xl text-xs font-bold tracking-widest transition-all uppercase ${prevDisabled ? 'text-slate-600 cursor-not-allowed border border-slate-800' : 'text-slate-400 border border-slate-700 hover:border-[#38bdf8] hover:text-[#38bdf8]'}">
                    PREV
                </button>
            `);

            // Nomor Halaman
            for (let i = 1; i <= totalPages; i++) {
                const isCurrent = i === currentPage;
                container.insertAdjacentHTML('beforeend', `
                    <button onclick="changePage(${i})" 
                            class="w-10 h-10 rounded-xl text-sm font-black transition-all ${isCurrent ? 'bg-[#38bdf8] text-slate-900 shadow-lg shadow-[#38bdf8]/20' : 'text-slate-400 border border-slate-700 hover:bg-slate-800 hover:text-white'}">
                        ${i}
                    </button>
                `);
            }

            // Tombol NEXT
            const nextDisabled = currentPage === totalPages;
            container.insertAdjacentHTML('beforeend', `
                <button onclick="changePage(${currentPage + 1})" ${nextDisabled ? 'disabled' : ''} 
                        class="px-4 py-2 rounded-xl text-xs font-bold tracking-widest transition-all uppercase ${nextDisabled ? 'text-slate-600 cursor-not-allowed border border-slate-800' : 'text-slate-400 border border-slate-700 hover:border-[#38bdf8] hover:text-[#38bdf8]'}">
                    NEXT
                </button>
            `);
        }

        function changePage(targetPage) {
            const totalPages = Math.ceil(filteredArticles.length / LIMIT);
            if (targetPage < 1 || targetPage > totalPages) return;
            currentPage = targetPage;
            
            document.getElementById('searchInput').scrollIntoView({ behavior: 'smooth', block: 'center' });
            renderPage();
        }

        // --- COMPONENT LEADERBOARD --- //
        function renderLeaderboard(data) {
            const list = document.getElementById('leaderboardList');
            const top10 = [...data].sort((a, b) => (b.poin || 0) - (a.poin || 0)).slice(0, 10);
            list.innerHTML = top10.map((auth, idx) => `
                <div class="flex-shrink-0 bg-slate-800/40 border border-slate-700/50 p-4 sm:p-5 rounded-[2rem] flex items-center gap-4 sm:gap-5 min-w-[220px] sm:min-w-[260px] relative overflow-hidden group hover:border-[#38bdf8]/50 transition-all">
                    <div class="relative z-10">
                        <img src="${getThumb(auth.foto, 'w100')}" class="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl object-cover border-2 border-slate-700 group-hover:border-[#38bdf8] transition-all" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(auth.nama)}'">
                        <div class="absolute -top-2 -left-2 w-7 h-7 sm:w-8 sm:h-8 ${idx === 0 ? 'bg-yellow-500 text-slate-900' : 'bg-slate-700 text-white'} rounded-full flex items-center justify-center text-[9px] sm:text-[10px] font-black shadow-xl">#${idx+1}</div>
                    </div>
                    <div class="relative z-10 min-w-0 flex-1">
                        <p class="font-normal text-sm text-white uppercase tracking-tight truncate">${auth.nama}</p>
                        <p class="text-[10px] font-bold text-[#38bdf8] uppercase tracking-widest mt-1">${auth.poin || 0} POIN</p>
                    </div>
                    <div class="absolute right-[-10%] bottom-[-20%] text-6xl sm:text-7xl font-black text-white opacity-[0.03] italic">#${idx+1}</div>
                </div>
            `).join('');
        }

        // --- READ VIEW HANDLING --- //
        function openReadView(id) {
            const art = allArticles.find(a => a.id === id);
            if (!art) return;

            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('readView').classList.remove('hidden');
            window.scrollTo(0, 0);

            document.getElementById('readJudul').innerText = art.judul;
            document.getElementById('readPenulis').innerText = art.penulis;
            
            const peran = art.peran || art.Peran || art.peran_saat_menulis || art.Peran_Saat_Menulis || '';
            const detailPeran = art.detail_peran || art.Detail_Peran || '';
            const displayPeran = peran ? ` • ${peran}${detailPeran ? ' (' + detailPeran + ')' : ''}` : '';
            const tgl = formatIndonesianDate(art.timestamp || art.Timestamp);

            document.getElementById('readStats').innerText = `${art.views || 0} VIEW • ${tgl} • ${art.kategori}${displayPeran}`;
            document.getElementById('readIsi').innerHTML = art.isi ? art.isi.replace(/\n/g, '<br>') : '';
            
            // Avatar di Halaman Baca
            const pin = art.pin?.toString().trim();
            const avatarContainer = document.getElementById('readAvatar');
            const avatarUrl = authorMap[pin] ? getThumb(authorMap[pin].foto, "w100") : `https://ui-avatars.com/api/?name=${encodeURIComponent(art.penulis)}`;
            avatarContainer.innerHTML = `<img src="${avatarUrl}" class="w-full h-full object-cover">`;

            const kreditEl = document.getElementById('readKredit');
            if (art.kredit && art.kredit.trim() !== "") {
                kreditEl.innerText = "Sumber/Kredit: " + art.kredit;
                kreditEl.classList.remove('hidden');
            } else {
                kreditEl.classList.add('hidden');
            }

            // Set up sistem Reaksi (Maks 5x)
            const storageKey = `reacted_count_${art.id}`;
            const userClicks = parseInt(localStorage.getItem(storageKey)) || 0;
            const isMaxed = userClicks >= 5;
            const hasReacted = userClicks > 0;

            let buttonClass = "flex items-center gap-2 bg-slate-800/80 border border-slate-700 hover:border-pink-500 hover:bg-pink-500/10 text-slate-300 hover:text-pink-400 py-2.5 px-5 rounded-xl text-xs font-bold uppercase tracking-wider transition-all active:scale-95 shadow-md";
            if (isMaxed) {
                buttonClass = "flex items-center gap-2 bg-pink-500/10 border border-pink-500 text-pink-400 py-2.5 px-5 rounded-xl text-xs font-bold uppercase tracking-wider cursor-not-allowed opacity-80 shadow-md";
            } else if (hasReacted) {
                buttonClass = "flex items-center gap-2 bg-pink-500/5 border border-pink-500/50 hover:border-pink-500 text-pink-400 py-2.5 px-5 rounded-xl text-xs font-bold uppercase tracking-wider transition-all active:scale-95 shadow-md";
            }

            document.getElementById('actionContainer').innerHTML = `
                <div class="flex items-center justify-between bg-slate-800/30 border border-slate-800 p-4 rounded-2xl">
                    <span class="text-xs font-black uppercase tracking-wider text-slate-400">✨ Beri apresiasi (Maks 5x) :</span>
                    <button onclick="handleReact('${art.id}')" id="reactBtn" class="${buttonClass}" ${isMaxed ? 'disabled' : ''} title="${isMaxed ? 'Batas apresiasi tercapai' : `Sudah memberikan ${userClicks} hati`}">
                        <span>${hasReacted ? '❤️' : '🤍'}</span> <span id="reactCount">${art.reactions || 0}</span> REAKSI
                    </button>
                </div>
                <button onclick="backToHome()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-black text-xs py-4 px-6 rounded-xl transition-all tracking-widest uppercase shadow-lg">
                    SELESAI BACA & KEMBALI
                </button>
            `;

            // Handling Image Slider & Mode Komik
            activeKategoriIsKomik = (art.kategori || '').toLowerCase().includes('komik');
            const mediaBox = document.getElementById('mediaBox');
            if (activeKategoriIsKomik) {
                mediaBox.classList.add('comic-mode');
            } else {
                mediaBox.classList.remove('comic-mode');
            }

            let photos = [];
            if (art.foto) {
                if (Array.isArray(art.foto)) photos = art.foto;
                else if (typeof art.foto === 'string') photos = art.foto.split(',').map(p => p.trim()).filter(Boolean);
            }

            const slider = document.getElementById('imageSlider');
            if (photos.length > 0) {
                slider.innerHTML = photos.map(p => `
                    <div class="slider-item-container">
                        <img src="${getThumb(p, 'w1200')}" class="slider-item" onerror="this.src='https://via.placeholder.com/800x450/1e293b/64748b?text=Gambar+Gagal+Dimuat'">
                    </div>
                `).join('');
            } else {
                slider.innerHTML = `
                    <div class="slider-item-container">
                        <div class="text-slate-600 flex flex-col items-center justify-center gap-2">
                            <svg class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 002-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                            <span class="text-xs font-bold tracking-widest uppercase">Tidak ada gambar</span>
                        </div>
                    </div>
                `;
            }

            currentSlide = 0;
            updateSliderPosition();

            // Sembunyikan navigasi slider jika gambar hanya 1 atau merupakan mode Komik
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            if (photos.length <= 1 || activeKategoriIsKomik) {
                prevBtn?.classList.add('hidden');
                nextBtn?.classList.add('hidden');
            } else {
                prevBtn?.classList.remove('hidden');
                nextBtn?.classList.remove('hidden');
            }

            // Handling Embed Video YouTube & System Tab Switcher
            const mediaTabs = document.getElementById('mediaTabs');
            const readYoutube = document.getElementById('readYoutube');
            const videoUrl = art.video || art.Video || art.link_video || '';
            currentYoutubeId = getYoutubeId(videoUrl);

            if (currentYoutubeId) {
                mediaTabs.classList.remove('hidden');
                readYoutube.innerHTML = `<iframe class="w-full h-full rounded-2xl" src="https://www.youtube.com/embed/${currentYoutubeId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                switchMedia('foto'); // Default focus tetap pada galeri foto utama dahulu
            } else {
                mediaTabs.classList.add('hidden');
                readYoutube.innerHTML = '';
                switchMedia('foto');
            }

            // Integrasi optimistik untuk viewer counter
            art.views = (parseInt(art.views) || 0) + 1;
        }

        function switchMedia(type) {
            const tabFoto = document.getElementById('tabFoto');
            const tabVideo = document.getElementById('tabVideo');
            const sliderContent = document.getElementById('sliderContent');
            const videoContent = document.getElementById('videoContent');
            const mediaBox = document.getElementById('mediaBox');

            if (type === 'video') {
                tabVideo.className = tabVideo.className.replace('tab-btn-inactive', 'tab-btn-active');
                tabFoto.className = tabFoto.className.replace('tab-btn-active', 'tab-btn-inactive');
                sliderContent.classList.add('hidden');
                videoContent.classList.remove('hidden');
                mediaBox.classList.add('video-active');
            } else {
                tabFoto.className = tabFoto.className.replace('tab-btn-inactive', 'tab-btn-active');
                tabVideo.className = tabVideo.className.replace('tab-btn-active', 'tab-btn-inactive');
                videoContent.classList.add('hidden');
                sliderContent.classList.remove('hidden');
                mediaBox.classList.remove('video-active');
            }
        }

        function moveSlide(direction) {
            const slider = document.getElementById('imageSlider');
            const items = slider.querySelectorAll('.slider-item-container');
            if (items.length === 0) return;
            
            currentSlide += direction;
            if (currentSlide >= items.length) currentSlide = 0;
            if (currentSlide < 0) currentSlide = items.length - 1;
            
            updateSliderPosition();
        }

        function updateSliderPosition() {
            if (activeKategoriIsKomik) return;
            const slider = document.getElementById('imageSlider');
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function backToHome() {
            document.getElementById('readView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
            document.getElementById('readYoutube').innerHTML = ''; // Hentikan video saat keluar
            renderPage(); // Sinkronisasi ulang data terbaru di halaman utama
        }

        async function handleReact(id) {
            const storageKey = `reacted_count_${id}`;
            let userClicks = parseInt(localStorage.getItem(storageKey)) || 0;
            if (userClicks >= 5) return;

            userClicks++;
            localStorage.setItem(storageKey, userClicks);

            const art = allArticles.find(a => a.id === id);
            if (art) {
                art.reactions = (parseInt(art.reactions) || 0) + 1;
                document.getElementById('reactCount').innerText = art.reactions;
                
                const reactBtn = document.getElementById('reactBtn');
                if (userClicks >= 5) {
                    reactBtn.disabled = true;
                    reactBtn.className = "flex items-center gap-2 bg-pink-500/10 border border-pink-500 text-pink-400 py-2.5 px-5 rounded-xl text-xs font-bold uppercase tracking-wider cursor-not-allowed opacity-80 shadow-md";
                    reactBtn.title = "Batas apresiasi tercapai";
                } else {
                    reactBtn.className = "flex items-center gap-2 bg-pink-500/5 border border-pink-500/50 hover:border-pink-500 text-pink-400 py-2.5 px-5 rounded-xl text-xs font-bold uppercase tracking-wider transition-all active:scale-95 shadow-md";
                    reactBtn.title = `Sudah memberikan ${userClicks} hati`;
                }
                reactBtn.querySelector('span').innerText = '❤️';

                // Kirim data ke backend web app secara asinkronus (tidak menghalangi UI)
                try {
                    fetch(`${GAS_URL}?action=react&id=${id}`, { method: 'POST' });
                } catch(e) { console.error("Gagal sinkronisasi reaksi ke server", e); }
            }
        }

        window.onload = init;
    </script>
</body>
</html>
