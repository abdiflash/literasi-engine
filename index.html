<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Engine - Portal Literasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        .ql-editor { min-height: 250px; font-size: 16px; }
        .ql-toolbar { border-radius: 8px 8px 0 0; }
        #editor { border-radius: 0 0 8px 8px; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white p-6 md:p-10 rounded-2xl shadow-xl border border-slate-200">
        <div class="border-b-2 border-slate-100 pb-6 mb-8">
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">ENGINE <span class="text-blue-600">EDITOR</span></h1>
            <p class="text-slate-500 font-medium">Tulis artikel Anda. Admin akan meninjau sebelum diterbitkan.</p>
        </div>

        <form id="engineForm" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Nama Penulis</label>
                    <input type="text" id="penulis" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Nama Lengkap">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Email Penulis</label>
                    <input type="email" id="email" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="email@contoh.com">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="col-span-1">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Kategori</label>
                    <select id="kategori" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none cursor-pointer">
                        <optgroup label="Sastra & Kreatif">
                            <option value="Cerpen">Cerpen</option>
                            <option value="Puisi">Puisi</option>
                            <option value="Cerita Bersambung">Cerita Bersambung</option>
                        </optgroup>
                        <optgroup label="Wawasan">
                            <option value="Artikel Umum">Artikel Umum</option>
                            <option value="Opini">Opini</option>
                            <option value="Kesehatan">Kesehatan</option>
                        </optgroup>
                        <optgroup label="Komunitas">
                            <option value="Parenting">Parenting Corner</option>
                            <option value="Gaya Hidup">Gaya Hidup & Hobi</option>
                        </optgroup>
                    </select>
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Judul Artikel</label>
                    <input type="text" id="judul" required class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-lg" placeholder="Apa judul tulisan Anda hari ini?">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-blue-50 p-6 rounded-2xl border border-blue-100">
                <div>
                    <label class="block text-sm font-bold text-blue-900 mb-2">🖼️ Foto Utama (Cover)</label>
                    <input type="file" id="imageFile" accept="image/*" class="text-sm text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
                    <p class="text-[10px] text-blue-700 mt-2">*Maksimal file 2MB untuk performa terbaik.</p>
                </div>
                <div>
                    <label class="block text-sm font-bold text-blue-900 mb-2">🎥 Link YouTube (Opsional)</label>
                    <input type="url" id="youtube" class="w-full p-3 bg-white border border-blue-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" placeholder="https://youtube.com/watch?v=...">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Isi Konten</label>
                <div id="editor" class="bg-white"></div>
            </div>

            <div class="pt-4">
                <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-black text-white font-black py-4 px-6 rounded-2xl transition-all transform hover:scale-[1.01] active:scale-95 shadow-lg flex justify-center items-center gap-2 text-lg">
                    <span>🚀 KIRIM UNTUK DIREVIEW</span>
                </button>
                <div id="statusMsg" class="mt-4 text-center p-3 rounded-xl hidden font-bold"></div>
            </div>
        </form>
    </div>

    <script>
        // 1. MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI BAWAH INI
        const GAS_WEB_APP_URL = "MASUKKAN_URL_WEB_APP_ANDA_DISINI";

        // 2. Inisialisasi Quill Editor
        const quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Tuliskan inspirasi Anda di sini...',
            modules: {
                toolbar: [
                    ['bold', 'italic', 'underline', 'blockquote'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'clean']
                ]
            }
        });

        // 3. Helper: Convert File ke Base64 agar bisa dikirim via JSON
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // 4. Handle Form Submit
        document.getElementById('engineForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            if(GAS_WEB_APP_URL === "https://script.google.com/macros/s/AKfycbwyEZxncoGnMjCOWqkKo-yCWaJs4Rx7sirj1HFnxVa3q_sBthTxzZh4rXs0l0Mxf3RA1A/exec") {
                alert("Error: URL Web App Google belum dipasang di kode HTML!");
                return;
            }

            // UI State: Loading
            btn.disabled = true;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Memproses data...`;
            statusMsg.classList.add('hidden');

            try {
                const fileInput = document.getElementById('imageFile');
                let base64File = null;

                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    if(file.size > 2000000) throw new Error("File terlalu besar! Maksimal 2MB.");
                    base64File = await getBase64(file);
                }

                const payload = {
                    penulis: document.getElementById('penulis').value,
                    email: document.getElementById('email').value,
                    kategori: document.getElementById('kategori').value,
                    judul: document.getElementById('judul').value,
                    isi: quill.root.innerHTML,
                    youtube: document.getElementById('youtube').value,
                    imageFile: base64File
                };

                // Kirim ke GAS
                await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk Apps Script agar tidak kena CORS error
                    body: JSON.stringify(payload)
                });

                // Tampilkan sukses (Karena no-cors, kita anggap sukses jika tidak masuk ke catch)
                statusMsg.innerText = "✅ Berhasil! Artikel Anda sudah masuk ke meja redaksi untuk diperiksa.";
                statusMsg.className = "mt-4 text-center p-3 rounded-xl block font-bold bg-green-100 text-green-700";
                
                // Reset Form
                document.getElementById('engineForm').reset();
                quill.setContents([]);

            } catch (error) {
                statusMsg.innerText = "❌ Gagal: " + error.message;
                statusMsg.className = "mt-4 text-center p-3 rounded-xl block font-bold bg-red-100 text-red-700";
            } finally {
                btn.disabled = false;
                btn.innerHTML = "<span>🚀 KIRIM UNTUK DIREVIEW</span>";
            }
        });
    </script>
</body>
</html>
