<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi - Jendela Inspirasi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b1325;
            --card-bg: #132038;
            --primary-blue: #38bdf8;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 6%;
        }

        .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: #64748b; font-weight: 400; }

        .nav-links { display: flex; align-items: center; gap: 25px; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 14px; font-weight: 600; }
        .nav-links a.active { color: var(--primary-blue); }
        .search-icon-btn { background: none; border: none; color: var(--text-main); cursor: pointer; font-size: 16px; }

        .hero { text-align: center; padding: 40px 20px 20px 20px; }
        .hero h1 { font-size: 64px; font-weight: 800; margin-bottom: 25px; letter-spacing: -1px; }
        .hero h1 span { color: var(--primary-blue); }

        .controls-container { max-width: 760px; margin: 0 auto 40px auto; padding: 0 20px; }
        .search-wrapper { position: relative; margin-bottom: 30px; }
        .search-wrapper i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 16px; }
        
        .search-input {
            width: 100%; padding: 16px 20px 16px 55px; background-color: #0f1a30;
            border: 1px solid #1e2e4a; border-radius: 30px; color: var(--text-main);
            font-size: 15px; outline: none; transition: all 0.2s;
        }
        .search-input:focus { border-color: var(--primary-blue); box-shadow: 0 0 0 1px var(--primary-blue); }

        .filter-settings {
            display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between;
            gap: 20px; border-bottom: 1px solid #16253f; padding-bottom: 25px;
        }

        .role-filters { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn-filter {
            background-color: #162544; color: #94a3b8; border: none; padding: 10px 22px;
            border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase;
            cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
        }
        .btn-filter.active { background-color: #1e293b; color: var(--primary-blue); border: 1px solid #334155; }

        .dropdown-group { display: flex; align-items: center; gap: 20px; }
        .select-wrapper { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
        .select-wrapper select {
            background-color: #0f1a30; color: var(--text-main); border: 1px solid #1e2e4a;
            padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; outline: none; cursor: pointer;
        }

        .content-section { max-width: 1200px; margin: 0 auto; padding: 0 4%; }
        
        /* PERBAIKAN: Grid 3x3 layout */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
        }

        @media (max-width: 992px) {
            .grid-container { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; }
        }

        .card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card {
            background-color: var(--card-bg); border-radius: 24px; overflow: hidden;
            border: 1px solid transparent; transition: transform 0.2s, border-color 0.2s;
            display: flex; flex-direction: column; height: 100%;
        }
        .card:hover { transform: translateY(-4px); border-color: #1e3354; }

        .card-banner { position: relative; width: 100%; height: 210px; background-color: #0b1424; overflow: hidden; }
        
        .card-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .badge-category {
            position: absolute; top: 15px; left: 15px; background-color: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(4px); color: #cbd5e1; padding: 6px 14px; border-radius: 20px;
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; z-index: 2;
        }

        .card-body { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; justify-content: space-between; }
        .card-title { font-size: 22px; font-weight: 700; line-height: 1.4; margin-bottom: 25px; color: var(--text-main); }
        .card-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #1e2e4d; padding-top: 15px; }
        
        .author-info { display: flex; align-items: center; gap: 10px; }
        .author-img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background-color: #1e293b; }
        .author-meta { display: flex; flex-direction: column; }
        .author-name { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; }
        .author-role { font-size: 10px; color: #475569; margin-top: 2px; font-weight: 600; text-transform: uppercase; }
        .view-count { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #475569; }

        .status-message {
            text-align: center; padding: 80px 20px; color: #475569; font-weight: 700;
            font-size: 14px; letter-spacing: 1px; text-transform: uppercase; width: 100%; grid-column: 1 / -1;
        }

        /* PERBAIKAN: Style Pagination */
        .pagination {
            display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 40px;
        }
        .page-btn {
            background-color: #162544; color: #94a3b8; border: 1px solid #1e2e4a;
            width: 38px; height: 38px; border-radius: 8px; font-size: 14px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .page-btn.active {
            background-color: var(--primary-blue); color: #000; border-color: var(--primary-blue);
        }
        .page-btn:hover:not(.active):not(:disabled) {
            background-color: #1e3354; color: #fff;
        }
        .page-btn:disabled {
            opacity: 0.5; cursor: not-allowed;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PORTAL<span>LITERASI</span></div>
        <nav class="nav-links">
            <a href="daftar.html">Daftar</a>
            <a href="tulis.html" class="active">Tulis</a>
            <button class="search-icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Jendela <span>Inspirasi</span></h1>
        </section>

        <section class="controls-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari karya, penulis, atau bulan/tahun (Contoh: 14 Mei 2026)...">
            </div>

            <div class="filter-settings">
                <div class="role-filters" id="roleFilterGroup">
                    <button class="btn-filter active" data-role="all">Semua Peran</button>
                    <button class="btn-filter" data-role="Siswa">Siswa</button>
                    <button class="btn-filter" data-role="Orang Tua">Orang Tua</button>
                    <button class="btn-filter" data-role="Guru">Guru</button>
                    <button class="btn-filter" data-role="Staf">Staf</button>
                    <button class="btn-filter" data-role="Alumni">Alumni</button>
                </div>

                <div class="dropdown-group">
                    <div class="select-wrapper">
                        <span>Kategori:</span>
                        <select id="categorySelect">
                            <option value="all">Semua Kategori</option>
                            <option value="Cerpen (Cerita Pendek)">Cerpen</option>
                            <option value="Puisi & Sajak">Puisi</option>
                            <option value="Berita & Liputan Sekolah">Berita Sekolah</option>
                            <option value="Opini & Ulasan (Review)">Opini/Ulasan</option>
                            <option value="Edukasi & Pengetahuan">Edukasi</option>
                            <option value="Komik & Ilustrasi">Komik</option>
                            <option value="Fotografi">Fotografi</option>
                            <option value="Film Pendek & Video">Film Pendek</option>
                            <option value="Catatan Harian / Pengalaman">Catatan Pengalaman</option>
                            <option value="Artikel Umum">Artikel Umum</option>
                        </select>
                    </div>

                    <div class="select-wrapper">
                        <span>Urutkan:</span>
                        <select id="sortSelect">
                            <option value="terbaru">Terbaru</option>
                            <option value="populer">Populer</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="content-section">
            <div class="grid-container" id="feedGrid"></div>
            <div class="pagination" id="paginationContainer"></div>
        </section>
    </main>

    <script>
        // Database Tersinkron dengan Format Kolom Anda
        const mockDatabase = [
            {
                id: "ART-97BD539E",
                timestamp: "5/14/2026 14:10",
                judul: "Raungan Taring Baja Eps. 1",
                kategori: "Komik & Ilustrasi",
                penulis: "Leonardus Yesiabdi",
                peran: "Orang Tua",
                detailPeran: "ORTU • ABILAH HUSAIN",
                link_foto_1: "https://drive.google.com/file/d/1HHdWi_HGMMVSdjr58rR-uorBp1-PvEk0/view?usp=drivesdk",
                views: 29,
                avatar: "https://i.pravatar.cc/100?img=33"
            },
            {
                id: "ART-88XF221A",
                timestamp: "5/15/2026 09:30",
                judul: "Desain Rumah Minimalis",
                kategori: "Fotografi",
                penulis: "Leonardus Yesi",
                peran: "Guru/Staf",
                detailPeran: "GURU/STAF • PUBLIKASI",
                link_foto_1: "https://drive.google.com/file/d/1kay7BScd-LbURxXjoZrQ8XdB5RQNOKfj/view?usp=drivesdk",
                views: 9,
                avatar: "https://i.pravatar.cc/100?img=12"
            },
            {
                id: "ART-11QA902C",
                timestamp: "4/12/2026 11:15",
                judul: "Tes Artikel Biasa",
                kategori: "Artikel Umum",
                penulis: "Budi Santoso",
                peran: "Siswa",
                detailPeran: "SISWA • KELAS X-A",
                link_foto_1: "",
                views: 4,
                avatar: "https://i.pravatar.cc/100?img=11"
            }
        ];

        const namaBulanIndo = [
            "januari", "februari", "maret", "april", "mei", "juni", 
            "juli", "agustus", "september", "oktober", "november", "desember"
        ];

        let currentRole = "all";
        let currentCategory = "all";
        let currentSort = "terbaru";
        let searchQuery = "";
        
        // PERBAIKAN: Variabel Pagination
        let currentPage = 1;
        const itemsPerPage = 9; // Menampilkan 9 item (3x3 grid) per halaman
        let currentFilteredData = [];

        const feedGrid = document.getElementById('feedGrid');
        const paginationContainer = document.getElementById('paginationContainer');
        const searchInput = document.getElementById('searchInput');
        const categorySelect = document.getElementById('categorySelect');
        const sortSelect = document.getElementById('sortSelect');
        const roleButtons = document.querySelectorAll('#roleFilterGroup .btn-filter');

        // Fungsi Link Google Drive Viewer 
        function getDriveDirectLink(driveUrl) {
            if (!driveUrl) return null;
            const match = driveUrl.match(/\/d\/(.+?)\//);
            if (match && match[1]) {
                const fileId = match[1];
                return `https://drive.google.com/uc?export=view&id=${fileId}`;
            }
            return driveUrl;
        }

        // PERBAIKAN: Update Display hanya merender data sesuai Halaman (Pagination)
        function updateDisplay() {
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = currentFilteredData.slice(startIndex, endIndex);
            
            renderFeed(pageData);
            renderPagination(currentFilteredData.length);
        }

        function renderFeed(data) {
            feedGrid.innerHTML = "";
            
            if (data.length === 0) {
                feedGrid.innerHTML = `<div class="status-message">Karya tidak ditemukan</div>`;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                const directImageUrl = getDriveDirectLink(item.link_foto_1);
                
                const imageHTML = directImageUrl 
                    ? `<img src="${directImageUrl}" alt="Thumbnail Karya" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                       <div class="fallback-icon" style="display:none; width:100%; height:100%; background:#1a273f; align-items:center; justify-content:center; color:#334155;">
                           <i class="fa-regular fa-image" style="font-size: 28px;"></i>
                       </div>`
                    : `<div style="width:100%; height:100%; background:#1a273f; display:flex; align-items:center; justify-content:center; color:#334155;">
                           <i class="fa-regular fa-image" style="font-size: 28px;"></i>
                       </div>`;

                card.innerHTML = `
                    <a href="baca.html?id=${item.id}" class="card-link">
                        <div class="card">
                            <div class="card-banner">
                                <span class="badge-category">${getShortCategory(item.kategori)}</span>
                                ${imageHTML}
                            </div>
                            <div class="card-body">
                                <h3 class="card-title">${item.judul}</h3>
                                <div class="card-footer">
                                    <div class="author-info">
                                        <img src="${item.avatar}" alt="${item.penulis}" class="author-img">
                                        <div class="author-meta">
                                            <span class="author-name">${item.penulis}</span>
                                            <span class="author-role">${item.detailPeran}</span>
                                        </div>
                                    </div>
                                    <div class="view-count">
                                        <i class="fa-regular fa-eye"></i>
                                        <span>${item.views}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </a>
                `;
                feedGrid.appendChild(card);
            });
        }

        // PERBAIKAN: Fungsi Render Pagination
        function renderPagination(totalItems) {
            paginationContainer.innerHTML = "";
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            
            if (totalPages <= 1) return; // Sembunyikan pagination jika hanya 1 halaman

            // Tombol Prev
            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerHTML = '<i class="fa-solid fa-chevron-left"></i>';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; updateDisplay(); } };
            paginationContainer.appendChild(prevBtn);

            // Tombol Angka Halaman
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.innerText = i;
                pageBtn.onclick = () => { currentPage = i; updateDisplay(); };
                paginationContainer.appendChild(pageBtn);
            }

            // Tombol Next
            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; updateDisplay(); } };
            paginationContainer.appendChild(nextBtn);
        }

        function getShortCategory(fullCategory) {
            if(fullCategory.includes("Komik")) return "Komik";
            if(fullCategory.includes("Fotografi")) return "Fotografi";
            if(fullCategory.includes("Umum")) return "Artikel Umum";
            return fullCategory;
        }

        function filterAndSortData() {
            let filtered = [...mockDatabase];

            if (currentRole !== "all") {
                filtered = filtered.filter(item => {
                    const dbRole = item.peran.toLowerCase();
                    const reqRole = currentRole.toLowerCase();
                    // PERBAIKAN: Pisahkan pencarian antara Guru dan Staf jika digabung di database "Guru/Staf"
                    if (reqRole === "guru") return dbRole.includes('guru');
                    if (reqRole === "staf") return dbRole.includes('staf');
                    return dbRole === reqRole;
                });
            }

            if (currentCategory !== "all") {
                filtered = filtered.filter(item => item.kategori === currentCategory);
            }

            // PERBAIKAN: Algoritma Pencarian Tanggal Diperkuat
            if (searchQuery.trim() !== "") {
                const query = searchQuery.toLowerCase().trim();
                
                filtered = filtered.filter(item => {
                    let stringTanggalLengkap = "";
                    let stringBulanTahun = "";
                    
                    // Ekstrak tanggal (Abaikan waktu jika ada spasi)
                    const dateOnly = item.timestamp.split(' ')[0];
                    const parts = dateOnly.split('/');
                    
                    if(parts.length === 3) {
                        const month = parseInt(parts[0]);
                        const day = parts[1];
                        const year = parts[2];
                        const monthName = namaBulanIndo[month - 1] || "";
                        
                        stringTanggalLengkap = `${day} ${monthName} ${year}`;
                        stringBulanTahun = `${monthName} ${year}`;
                    }

                    const matchTanggal = stringTanggalLengkap.includes(query) || 
                                         stringBulanTahun.includes(query) ||
                                         item.timestamp.includes(query);

                    return item.judul.toLowerCase().includes(query) || 
                           item.penulis.toLowerCase().includes(query) || 
                           matchTanggal;
                });
            }

            if (currentSort === "terbaru") {
                filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            } else if (currentSort === "populer") {
                filtered.sort((a, b) => b.views - a.views);
            }

            currentFilteredData = filtered;
            currentPage = 1; // Kembali ke halaman 1 setiap kali filter diubah
            updateDisplay();
        }

        roleButtons.forEach(button => {
            button.addEventListener('click', () => {
                roleButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentRole = button.getAttribute('data-role');
                filterAndSortData();
            });
        });

        categorySelect.addEventListener('change', (e) => {
            currentCategory = e.target.value;
            filterAndSortData();
        });

        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            filterAndSortData();
        });

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            filterAndSortData();
        });

        document.addEventListener("DOMContentLoaded", () => {
            filterAndSortData();
        });
    </script>
</body>
</html>
