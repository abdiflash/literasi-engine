<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi Komunitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #044A80; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        
        /* Typography for Article Content */
        .content-render { 
            font-size: 1.2rem; 
            line-height: 1.9; 
            color: #334155; 
        }
        .content-render h1, .content-render h2 { 
            color: #0f172a; 
            font-weight: 800; 
            margin-top: 2.5rem; 
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        .content-render p { margin-bottom: 1.8rem; }
        .content-render blockquote { 
            border-left: 5px solid var(--navy); 
            background: #f8fafc; 
            padding: 1.5rem 2rem; 
            font-style: italic; 
            border-radius: 0 1rem 1rem 0;
            margin: 2rem 0;
        }
        .content-render img { border-radius: 1.5rem; margin: 2.5rem 0; }

        /* Custom Utilities */
        .navy-text { color: var(--navy); }
        .navy-bg { background-color: var(--navy); }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        
        /* Skeleton Loading */
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="text-slate-900 selection:bg-blue-100 selection:text-[#044A80]">

    <nav class="glass-nav sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black navy-text tracking-tighter flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                PORTAL<span class="text-slate-400 font-light text-xl">LITERASI</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="tulis.html" class="navy-bg hover:opacity-90 text-white font-bold py-2.5 px-6 rounded-2xl transition-all shadow-lg shadow-blue-900/20 text-sm">
                    Kirim Naskah
                </a>
            </div>
        </div>
    </nav>

    <main id="homeView" class="pb-20">
        <section class="max-w-4xl mx-auto px-6 pt-16 pb-12 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 leading-[1.1]">
                Jendela <span class="navy-text italic font-serif">Inspirasi</span> & <br>Karya Literasi.
            </h1>
            <p class="text-xl text-slate-500 mb-10 leading-relaxed">
                Platform kurasi naskah untuk berbagi perspektif, cerita, dan pengetahuan bagi komunitas.
            </p>
            
            <div class="relative max-w-xl mx-auto">
                <input type="text" id="searchInput" placeholder="Cari judul artikel atau penulis..." 
                    class="w-full bg-white border border-slate-200 py-4 px-6 pr-12 rounded-2xl shadow-sm focus:ring-2 focus:ring-[#044A80] focus:border-transparent outline-none transition-all">
                <div class="absolute right-4 top-1/2 -translate-y-1/2 opacity-30">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
        </section>

        <section class="max-w-7xl mx-auto px-6">
            <div id="loading" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="h-80 skeleton rounded-3xl"></div>
                <div class="h-80 skeleton rounded-3xl"></div>
                <div class="h-80 skeleton rounded-3xl"></div>
            </div>

            <div id="articleGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 hidden">
                </div>
        </section>
    </main>

    <main id="readView" class="hidden">
        <div class="max-w-3xl mx-auto px-6 py-12">
            <button onclick="backToHome()" class="mb-10 flex items-center gap-2 text-slate-400 hover:text-[#044A80] transition-colors font-bold text-sm uppercase tracking-widest">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                Kembali
            </button>

            <header class="mb-12">
                <span id="readKategori" class="navy-bg text-white text-[10px] font-black px-3 py-1 rounded-md uppercase tracking-widest mb-6 inline-block">Kategori</span>
                <h1 id="readJudul" class="text-4xl md:text-6xl font-extrabold text-slate-900 mb-8 leading-tight tracking-tighter">Judul Artikel</h1>
                
                <div class="flex items-center gap-4 p-6 rounded-3xl bg-slate-50 border border-slate-100">
                    <div id="readAvatar" class="w-14 h-14 navy-bg rounded-2xl flex items-center justify-center text-xl font-bold text-white shadow-xl">A</div>
                    <div>
                        <p class="font-black text-slate-900 text-lg" id="readPenulis">Nama Penulis</p>
                        <p class="text-sm text-slate-500 font-medium tracking-tight" id="readTanggal">Tanggal rilis</p>
                    </div>
                </div>
            </header>

            <div id="sliderMainContainer" class="mb-12 hidden">
                <div class="relative group aspect-video rounded-[2rem] overflow-hidden bg-slate-100 shadow-2xl">
                    <div id="sliderWrapper" class="flex h-full transition-transform duration-700 cubic-bezier(0.4, 0, 0.2, 1)">
                        </div>
                    
                    <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-4 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="prevSlide()" class="p-3 bg-white/90 rounded-2xl shadow-xl hover:scale-110 transition-transform">◀</button>
                        <button onclick="nextSlide()" class="p-3 bg-white/90 rounded-2xl shadow-xl hover:scale-110 transition-transform">▶</button>
                    </div>

                    <div id="sliderIndicators" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2"></div>
                </div>
                <p class="mt-4 text-center text-xs text-slate-400">📷 Kredit Foto: <span id="readSumberFoto" class="font-bold text-slate-600"></span></p>
            </div>

            <div id="ytContainer" class="mb-12 hidden aspect-video rounded-[2rem] overflow-hidden shadow-2xl">
                <iframe id="readYoutube" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
            </div>

            <article id="readIsi" class="content-render">
                </article>
        </div>
    </main>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz0yVcEnrPaIgxq-7Ht1s6eCgqQ_cT1dMnaVONUQiMSQgFZMKjSeN-48uKJyHwE3K-9yA/exec"; // Ganti dengan URL Anda
        let globalArticles = [];
        let currentSlideIndex = 0;
        let totalSlidesCount = 0;

        async function loadPublishedArticles() {
            try {
                // Sesuai dengan Code.gs: action=searchPublic
                const response = await fetch(`${GAS_WEB_APP_URL}?action=searchPublic`);
                const result = await response.json();
                
                document.getElementById('loading').style.display = 'none';

                if(result.result === "success") {
                    globalArticles = result.data.reverse(); 
                    renderArticles(globalArticles);
                }
            } catch (err) {
                document.getElementById('loading').innerHTML = '<p class="text-red-500">Gagal memuat artikel. Periksa koneksi internet.</p>';
            }
        }

        function renderArticles(articles) {
            const grid = document.getElementById('articleGrid');
            grid.innerHTML = '';
            grid.classList.remove('hidden');

            if(articles.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-slate-400">Tidak ada artikel yang ditemukan.</p>`;
                return;
            }

            articles.forEach(art => {
                let thumbUrl = "https://images.unsplash.com/photo-1455390582262-044cdead27d8?w=800&q=80"; 
                if(art.foto && art.foto.length > 0) {
                    let fileIdMatch = art.foto[0].match(/\/file\/d\/(.+?)\//) || art.foto[0].match(/id=(.+?)(&|$)/);
                    if (fileIdMatch && fileIdMatch[1]) {
                        thumbUrl = `https://drive.google.com/thumbnail?id=${fileIdMatch[1]}&sz=w800`;
                    }
                }

                const card = document.createElement('div');
                card.className = "group cursor-pointer";
                card.onclick = () => openReadView(art.id);
                card.innerHTML = `
                    <div class="relative h-72 mb-6 rounded-[2.5rem] overflow-hidden shadow-sm group-hover:shadow-2xl group-hover:-translate-y-2 transition-all duration-500">
                        <img src="${thumbUrl}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-8">
                            <span class="text-white font-bold text-sm">Baca Selengkapnya →</span>
                        </div>
                        <span class="absolute top-6 left-6 navy-bg text-white text-[9px] font-black px-3 py-1 rounded-lg uppercase tracking-widest">${art.kategori}</span>
                    </div>
                    <div class="px-2">
                        <h3 class="text-2xl font-extrabold text-slate-900 mb-3 leading-tight group-hover:navy-text transition-colors line-clamp-2">${art.judul}</h3>
                        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">${art.penulis}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Search Functionality
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = globalArticles.filter(art => 
                art.judul.toLowerCase().includes(val) || 
                art.penulis.toLowerCase().includes(val)
            );
            renderArticles(filtered);
        });

        function openReadView(id) {
            const art = globalArticles.find(a => a.id === id);
            if(!art) return;

            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('readView').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            document.getElementById('readKategori').innerText = art.kategori;
            document.getElementById('readJudul').innerText = art.judul;
            document.getElementById('readPenulis').innerText = art.penulis;
            document.getElementById('readAvatar').innerText = art.penulis.charAt(0).toUpperCase();
            document.getElementById('readTanggal').innerText = art.tanggal;
            document.getElementById('readIsi').innerHTML = art.isi;
            document.getElementById('readSumberFoto').innerText = art.kredit || "Dokumen Pribadi";

            // YouTube Logic
            const yt = document.getElementById('ytContainer');
            if(art.youtube) {
                yt.classList.remove('hidden');
                let vidId = art.youtube.split('v=')[1]?.split('&')[0] || art.youtube.split('/').pop();
                document.getElementById('readYoutube').src = `https://www.youtube.com/embed/${vidId}`;
            } else {
                yt.classList.add('hidden');
            }

            // Slider Logic
            const sliderContainer = document.getElementById('sliderMainContainer');
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.innerHTML = '';
            
            if(art.foto && art.foto.length > 0) {
                sliderContainer.classList.remove('hidden');
                totalSlidesCount = art.foto.length;
                art.foto.forEach(link => {
                    let imgUrl = link;
                    let fileIdMatch = link.match(/\/file\/d\/(.+?)\//) || link.match(/id=(.+?)(&|$)/);
                    if (fileIdMatch && fileIdMatch[1]) imgUrl = `https://drive.google.com/thumbnail?id=${fileIdMatch[1]}&sz=w1200`;
                    
                    const slide = document.createElement('div');
                    slide.className = "w-full h-full flex-shrink-0";
                    slide.style.flex = "0 0 100%";
                    slide.innerHTML = `<img src="${imgUrl}" class="w-full h-full object-cover">`;
                    wrapper.appendChild(slide);
                });
                initSlider();
            } else {
                sliderContainer.classList.add('hidden');
            }
        }

        function backToHome() {
            document.getElementById('readView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
            document.getElementById('readYoutube').src = "";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Slider Core
        function initSlider() {
            currentSlideIndex = 0;
            updateSliderView();
        }
        function nextSlide() { if(currentSlideIndex < totalSlidesCount - 1) { currentSlideIndex++; updateSliderView(); } }
        function prevSlide() { if(currentSlideIndex > 0) { currentSlideIndex--; updateSliderView(); } }
        function updateSliderView() {
            document.getElementById('sliderWrapper').style.transform = `translateX(-${currentSlideIndex * 100}%)`;
        }

        window.onload = loadPublishedArticles;
    </script>
</body>
</html>
