<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi Komunitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #044A80; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .navy-bg { background-color: var(--navy); }
        .navy-text { color: var(--navy); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Style Slider Panah */
        .slider-wrapper { position: relative; width: 100%; }
        .slider-container { 
            display: flex; 
            overflow-x: auto; 
            scroll-snap-type: x mandatory; 
            scroll-behavior: smooth; 
            border-radius: 2.5rem;
            gap: 10px;
        }
        .slider-item { 
            flex: 0 0 100%; 
            scroll-snap-align: start; 
            aspect-ratio: 16/9; 
            object-fit: cover; 
            border-radius: 2.5rem;
        }
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.8);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
            transition: all 0.3s;
        }
        .nav-btn:hover { background: white; scale: 1.1; }
        .btn-prev { left: 15px; }
        .btn-next { right: 15px; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black navy-text tracking-tighter cursor-pointer" onclick="location.reload()">
                PORTAL<span class="text-slate-400 font-light text-xl italic">LITERASI</span>
            </div>
            <a href="tulis.html" class="navy-bg text-white font-bold py-2 px-6 rounded-xl text-sm">Kirim Naskah</a>
        </div>
    </nav>

    <main id="homeView">
        <header class="max-w-4xl mx-auto px-6 pt-12 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-8">Jendela <span class="navy-text">Inspirasi</span></h1>
            <div id="articleGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 py-10"></div>
        </header>
    </main>

    <main id="readView" class="hidden pb-20">
        <div class="max-w-3xl mx-auto px-6 py-12">
            <div class="flex justify-between items-center mb-8">
                <button onclick="backToHome()" class="font-bold text-xs text-slate-400 hover:navy-text uppercase tracking-widest">← Kembali</button>
                <button id="waShareBtn" class="bg-green-500 text-white px-5 py-2 rounded-full text-xs font-bold shadow-md">Bagikan WA</button>
            </div>

            <div class="slider-wrapper mb-10 group">
                <button class="nav-btn btn-prev opacity-0 group-hover:opacity-100" onclick="moveSlider(-1)">❮</button>
                <div id="imageSlider" class="slider-container no-scrollbar bg-slate-100"></div>
                <button class="nav-btn btn-next opacity-0 group-hover:opacity-100" onclick="moveSlider(1)">❯</button>
            </div>

            <header class="mb-10">
                <h1 id="readJudul" class="text-4xl md:text-5xl font-black text-slate-900 mb-6 leading-tight"></h1>
                <div class="flex items-center gap-4 border-b border-slate-100 pb-8">
                    <div id="readAvatarContainer" class="w-14 h-14 overflow-hidden rounded-2xl navy-bg flex items-center justify-center text-white font-bold text-2xl shadow-md border-2 border-white"></div>
                    <div class="flex-1">
                        <p id="readPenulis" class="font-bold text-slate-900 text-lg"></p>
                        <p id="readStats" class="text-xs text-slate-400 font-bold uppercase tracking-tighter"></p>
                    </div>
                </div>
            </header>

            <article id="readIsi" class="content-render text-lg leading-relaxed text-slate-700"></article>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz0yVcEnrPaIgxq-7Ht1s6eCgqQ_cT1dMnaVONUQiMSQgFZMKjSeN-48uKJyHwE3K-9yA/exec";
        let globalArticles = [];

        function getThumb(url, size = "w1200") {
            if (!url || url === "" || url.includes("null")) return "https://via.placeholder.com/800x450?text=Foto+Tidak+Tersedia";
            const match = url.match(/[-\w]{25,}/);
            return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=${size}` : url;
        }

        async function init() {
            try {
                const res = await fetch(`${GAS_URL}?action=searchPublic`);
                const json = await res.json();
                if(json.result === "success") {
                    globalArticles = json.data.reverse();
                    renderArticles(globalArticles);
                }
            } catch(e) { console.error(e); }
        }

        function renderArticles(articles) {
            const grid = document.getElementById('articleGrid');
            grid.innerHTML = articles.map(art => `
                <div class="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all cursor-pointer" onclick="openReadView('${art.id}')">
                    <img src="${getThumb(art.foto[0], 'w600')}" class="w-full h-48 object-cover rounded-[1.5rem] mb-4">
                    <h3 class="font-extrabold text-lg line-clamp-2">${art.judul}</h3>
                    <p class="text-[10px] text-slate-400 mt-2 font-bold uppercase">${art.penulis}</p>
                </div>
            `).join('');
        }

        async function openReadView(id) {
            const art = globalArticles.find(a => a.id === id);
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('readView').classList.remove('hidden');

            // Logika Slider
            const slider = document.getElementById('imageSlider');
            slider.innerHTML = art.foto.filter(f => f && f !== "").map(f => `<img src="${getThumb(f, 'w1200')}" class="slider-item">`).join('');
            
            // Logika Avatar Profil (Sesuai kolom Link_Foto_Profil)
            const avatarBox = document.getElementById('readAvatarContainer');
            // Properti Link_Foto_Profil harus ada di objek art (dipassing dari GAS)
            if(art.Link_Foto_Profil) {
                avatarBox.innerHTML = `<img src="${getThumb(art.Link_Foto_Profil, 'w200')}" class="w-full h-full object-cover">`;
            } else {
                avatarBox.innerHTML = art.penulis[0].toUpperCase();
            }

            document.getElementById('readJudul').innerText = art.judul;
            document.getElementById('readPenulis').innerText = art.penulis;
            document.getElementById('readIsi').innerHTML = art.isi;
            document.getElementById('readStats').innerText = `${art.views || 0} Views • ${art.kategori}`;

            // WA Share
            const currentUrl = window.location.href.split('?')[0];
            const waText = encodeURIComponent(`*${art.judul}*\n\nBaca artikel selengkapnya di:\n${currentUrl}?read=${id}`);
            document.getElementById('waShareBtn').onclick = () => window.open(`https://wa.me/?text=${waText}`);

            window.scrollTo(0,0);
        }

        // FUNGSI NAVIGASI SLIDER
        function moveSlider(direction) {
            const slider = document.getElementById('imageSlider');
            const itemWidth = slider.querySelector('.slider-item').clientWidth;
            slider.scrollBy({ left: direction * itemWidth, behavior: 'smooth' });
        }

        function backToHome() {
            document.getElementById('readView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
