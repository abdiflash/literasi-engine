<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jendela Inspirasi</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
    }
  </style>
</head>
<body class="text-slate-800 antialiased">

  <header class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white py-12 px-4 shadow-md text-center">
    <h1 class="text-3xl md:text-4xl font-bold tracking-tight mb-2">✨ Jendela Inspirasi</h1>
    <p class="text-blue-100 max-w-md mx-auto text-sm md:text-base">Ruang apresiasi karya, cerita, dan inspirasi dari seluruh keluarga besar sekolah.</p>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-8">
      
      <div class="relative max-w-2xl mx-auto mb-6">
        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
        <input 
          type="text" 
          id="search-input" 
          placeholder="Cari judul, karya, atau nama penulis..." 
          class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-sm"
        >
      </div>

      <div class="flex flex-wrap justify-center gap-2 mb-6 border-b border-slate-100 pb-5" id="role-filters">
        <button data-role="Semua" class="role-btn px-4 py-2 text-xs md:text-sm font-medium rounded-full bg-blue-600 text-white shadow-sm transition-all">Semua Peran</button>
        <button data-role="Siswa" class="role-btn px-4 py-2 text-xs md:text-sm font-medium rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all">Siswa</button>
        <button data-role="Guru" class="role-btn px-4 py-2 text-xs md:text-sm font-medium rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all">Guru</button>
        <button data-role="Orang Tua" class="role-btn px-4 py-2 text-xs md:text-sm font-medium rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all">Orang Tua</button>
        <button data-role="Alumni" class="role-btn px-4 py-2 text-xs md:text-sm font-medium rounded-full bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all">Alumni</button>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 max-w-4xl mx-auto">
        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Kategori</label>
          <select id="filter-kategori" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-medium focus:ring-2 focus:ring-blue-500">
            <option value="Semua">Semua Kategori</option>
            <option value="Artikel">Artikel</option>
            <option value="Puisi">Puisi</option>
            <option value="Cerpen">Cerpen</option>
            <option value="Pantun">Pantun</option>
            <option value="Quotes">Quotes</option>
          </select>
        </div>

        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Bulan</label>
          <select id="filter-bulan" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-medium focus:ring-2 focus:ring-blue-500">
            <option value="Semua">Semua Bulan</option>
            <option value="1">Januari</option>
            <option value="2">Februari</option>
            <option value="3">Maret</option>
            <option value="4">April</option>
            <option value="5">Mei</option>
            <option value="6">Juni</option>
            <option value="7">Juli</option>
            <option value="8">Agustus</option>
            <option value="9">September</option>
            <option value="10">Oktobet</option>
            <option value="11">November</option>
            <option value="12">Desember</option>
          </select>
        </div>

        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Tahun</label>
          <select id="filter-tahun" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-medium focus:ring-2 focus:ring-blue-500">
            <option value="Semua">Semua Tahun</option>
            <option value="2026">2026</option>
            <option value="2025">2025</option>
          </select>
        </div>

        <div>
          <label class="block text-[11px] font-semibold uppercase tracking-wider text-slate-400 mb-1">Urutan</label>
          <select id="filter-urutan" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-medium focus:ring-2 focus:ring-blue-500">
            <option value="terbaru">Terbaru</option>
            <option value="terlama">Terlama</option>
          </select>
        </div>
      </div>

    </section>

    <section id="karya-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="col-span-full text-center py-12 text-slate-400">
        <i class="fa-solid fa-spinner fa-spin text-2xl mb-2 text-blue-500"></i>
        <p class="text-sm">Memuat karya indah dari Google Sheets...</p>
      </div>
    </section>

  </main>

  <script>
    // MASUKKAN URL GOOGLE WEB APP (APPS SCRIPT) ANDA DI SINI
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbybCOuVb9tO169uWwA5Zc1O637u_Y3e506xunYJ9_m_Vb6fB1t_2A0S2C08b6E-7OIn/exec"; 

    let databaseKarya = [];
    let peranTerpilih = "Semua";

    // Fungsi Fetch Data dari Google Sheet via API
    async function loadData() {
      try {
        const response = await fetch(WEB_APP_URL);
        databaseKarya = await response.json();
        renderKarya();
      } catch (error) {
        console.error("Gagal mengambil data:", error);
        document.getElementById('karya-container').innerHTML = `
          <div class="col-span-full text-center py-12 text-red-500">
            <i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i>
            <p class="text-sm font-semibold">Gagal memuat data. Periksa kembali URL Web App Anda.</p>
          </div>`;
      }
    }

    // Fungsi Utama Render & Filter Data
    function renderKarya() {
      const container = document.getElementById('karya-container');
      const kataKunci = document.getElementById('search-input').value.toLowerCase();
      const katTerpilih = document.getElementById('filter-kategori').value;
      const bulanTerpilih = document.getElementById('filter-bulan').value;
      const tahunTerpilih = document.getElementById('filter-tahun').value;
      const urutanTerpilih = document.getElementById('filter-urutan').value;

      // Proses Penyaringan (Filtering)
      let hasilFilter = databaseKarya.filter(item => {
        
        // 1. Filter Pencarian Teks
        const cocokSearch = item.Judul.toLowerCase().includes(kataKunci) || 
                            item.Nama.toLowerCase().includes(kataKunci) || 
                            item.Isi.toLowerCase().includes(kataKunci);

        // 2. Filter Peran (Pill Tabs)
        const cocokPeran = (peranTerpilih === "Semua") || (item.Status === peranTerpilih);

        // 3. Filter Kategori Dropdown
        const cocokKategori = (katTerpilih === "Semua") || (item.Kategori === katTerpilih);

        // Parsing Tanggal yang Aman untuk validasi Bulan & Tahun
        // Format Timestamp Google Sheet: MM/DD/YYYY atau DD/MM/YYYY bergantung pada locale lokal sheet.
        const dateObj = new Date(item.Timestamp);
        const nomorBulan = dateObj.getMonth() + 1; // getMonth() dimulai dari 0 (Januari) s.d 11 (Desember)
        const nomorTahun = dateObj.getFullYear();

        // 4. Filter Bulan (Pemberesan Isu "Mei tidak ditemukan")
        const cocokBulan = (bulanTerpilih === "Semua") || (nomorBulan.toString() === bulanTerpilih);

        // 5. Filter Tahun
        const cocokTahun = (tahunTerpilih === "Semua") || (nomorTahun.toString() === tahunTerpilih);

        return cocokSearch && cocokPeran && cocokKategori && cocokBulan && cocokTahun;
      });

      // Proses Pengurutan Data (Sorting)
      if (urutanTerpilih === "terbaru") {
        hasilFilter.sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));
      } else {
        hasilFilter.sort((a, b) => new Date(a.Timestamp) - new Date(b.Timestamp));
      }

      // Render Card ke HTML
      container.innerHTML = "";
      if (hasilFilter.length === 0) {
        container.innerHTML = `
          <div class="col-span-full text-center py-16 bg-white rounded-2xl border border-dashed border-slate-200">
            <i class="fa-regular fa-folder-open text-4xl text-slate-300 mb-3"></i>
            <p class="text-slate-500 text-sm font-medium">Tidak ada karya yang sesuai dengan filter pencarian.</p>
          </div>`;
        return;
      }

      hasilFilter.forEach(item => {
        // Pembersihan & formatting tampilan tanggal kartu
        const opt = { year: 'numeric', month: 'long', day: 'numeric' };
        const tglTampil = new Date(item.Timestamp).toLocaleDateString('id-ID', opt);

        const card = document.createElement('div');
        card.className = "bg-white border border-slate-100 rounded-2xl p-6 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all flex flex-col justify-between";
        card.innerHTML = `
          <div>
            <div class="flex items-center justify-between mb-3">
              <span class="text-[11px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-md bg-blue-50 text-blue-600">${item.Kategori}</span>
              <span class="text-xs text-slate-400 font-medium">${tglTampil}</span>
            </div>
            <h3 class="text-base font-bold text-slate-800 mb-2 line-clamp-2">${item.Judul}</h3>
            <p class="text-slate-600 text-xs leading-relaxed mb-4 line-clamp-4 whitespace-pre-line">${item.Isi}</p>
          </div>
          <div class="border-t border-slate-50 pt-3 flex items-center justify-between">
            <span class="text-xs font-semibold text-slate-700 truncate max-w-[150px]"><i class="fa-solid fa-circle-user text-slate-400 mr-1.5"></i>${item.Nama}</span>
            <span class="text-[10px] font-medium bg-slate-100 text-slate-500 px-2 py-0.5 rounded">${item.Status}</span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // EVENT LISTENERS CONTROL

    // Event Listener Input Pencarian & Dropdown
    document.getElementById('search-input').addEventListener('input', renderKarya);
    document.getElementById('filter-kategori').addEventListener('change', renderKarya);
    document.getElementById('filter-bulan').addEventListener('change', renderKarya);
    document.getElementById('filter-tahun').addEventListener('change', renderKarya);
    document.getElementById('filter-urutan').addEventListener('change', renderKarya);

    // Event Listener khusus Tombol Peran (Pill Tabs)
    const tombolPeran = document.querySelectorAll('.role-btn');
    tombolPeran.forEach(btn => {
      btn.addEventListener('click', function() {
        // Reset warna semua tombol peran
        tombolPeran.forEach(b => {
          b.classList.remove('bg-blue-600', 'text-white', 'shadow-sm');
          b.classList.add('bg-slate-100', 'text-slate-600');
        });
        
        // Aktifkan tombol yang dipilih
        this.classList.remove('bg-slate-100', 'text-slate-600');
        this.classList.add('bg-blue-600', 'text-white', 'shadow-sm');
        
        peranTerpilih = this.getAttribute('data-role');
        renderKarya(); // Update Tampilan
      });
    });

    // Jalankan load data saat halaman web dibuka
    window.onload = loadData;
  </script>
</body>
</html>
