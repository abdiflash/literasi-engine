<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi Komunitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #044A80; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .navy-bg { background-color: var(--navy); }
        .navy-text { color: var(--navy); }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .active-cat { background-color: var(--navy) !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(4, 74, 128, 0.3); }
        
        .content-render { font-size: 1.15rem; line-height: 1.8; color: #334155; }
        .content-render h2 { font-weight: 800; font-size: 1.75rem; margin-top: 2rem; color: #0f172a; }
        .rank-card:nth-child(1) { border-left: 4px solid #fbbf24; }
        .rank-card:nth-child(2) { border-left: 4px solid #94a3b8; }
        .rank-card:nth-child(3) { border-left: 4px solid #b45309; }
        .article-card img { transition: transform 0.5s ease; }
        .article-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="text-slate-900 selection:bg-blue-100">

    <nav class="glass-nav sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black navy-text tracking-tighter cursor-pointer" onclick="location.reload()">
                PORTAL<span class="text-slate-400 font-light text-xl italic">LITERASI</span>
            </div>
            <div class="flex gap-2">
                <a href="daftar.html" class="border-2 border-[#044A80] navy-text font-bold py-2 px-4 rounded-xl text-sm hover:bg-blue-50 transition-all">Daftar Penulis</a>
                <a href="tulis.html" class="navy-bg text-white font-bold py-2 px-4 rounded-xl text-sm shadow-lg shadow-blue-900/20">Kirim Naskah</a>
            </div>
        </div>
    </nav>

    <main id="homeView">
        <header class="max-w-4xl mx-auto px-6 pt-12 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tighter mb-4">Jendela <span class="navy-text italic font-serif">Inspirasi</span></h1>
            
            <div id="catContainer" class="flex gap-3 overflow-x-auto no-scrollbar py-6 justify-start md:justify-center">
                <button onclick="filterCat('Semua')" class="cat-pill active-cat whitespace-nowrap px-6 py-2 rounded-full bg-white border border-slate-200 text-sm font-bold transition-all">Semua</button>
            </div>

            <div class="relative max-w-xl mx-auto mt-4">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Cari karya atau penulis..." class="w-full bg-slate-100 border-none py-4 px-6 rounded-2xl focus:ring-2 focus:ring-[#044A80] outline-none">
            </div>
        </header>

        <section class="max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-4 gap-10">
            <aside class="lg:col-span-1 order-2 lg:order-1">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 sticky top-28">
                    <h2 class="font-black text-lg mb-6 flex items-center gap-2">🏆 TOP PENULIS</h2>
                    <div id="leaderboardList" class="space-y-4">
                        <div class="animate-pulse flex space-x-4"><div class="rounded-full bg-slate-200 h-10 w-10"></div><div class="flex-1 space-y-3 py-1"><div class="h-2 bg-slate-200 rounded"></div></div></div>
                    </div>
                </div>
            </aside>

            <div class="lg:col-span-3 order-1 lg:order-2">
                <div id="loading" class="text-center py-20 text-slate-400 font-bold">Menyusun rak buku...</div>
                <div id="articleGrid" class="grid grid-cols-1 md:grid-cols-2 gap-8 hidden"></div>
            </div>
        </section>
    </main>

    <main id="readView" class="hidden pb-20">
        <div class="max-w-3xl mx-auto px-6 py-12">
            <div class="flex justify-between items-center mb-10">
                <button onclick="backToHome()" class="font-bold text-xs text-slate-400 hover:navy-text">← KEMBALI</button>
                <button id="waShareBtn" class="bg-green-500 text-white px-5 py-2 rounded-full text-xs font-bold flex items-center gap-2 shadow-md hover:bg-green-600">Bagikan ke WA</button>
            </div>

            <header class="mb-10">
                <h1 id="readJudul" class="text-4xl md:text-5xl font-black text-slate-900 leading-tight mb-6 tracking-tighter"></h1>
                <div class="flex items-center gap-4 border-b border-slate-100 pb-8">
                    <div id="readAvatarContainer" class="w-14 h-14 overflow-hidden rounded-2xl navy-bg flex items-center justify-center text-white font-bold text-2xl">
                        </div>
                    <div class="flex-1">
                        <p id="readPenulis" class="font-bold text-slate-900 text-lg"></p>
                        <p id="readStats" class="text-xs text-slate-400 font-bold uppercase tracking-widest"></p>
                    </div>
                    <div class="text-right">
                        <span id="readPoinPenulis" class="bg-amber-100 text-amber-600 px-3 py-1 rounded-lg text-[10px] font-black italic"></span>
                    </div>
                </div>
            </header>

            <article id="readIsi" class="content-render mb-12"></article>

            <div class="border-t border-slate-100 pt-10 text-center">
                <button onclick="handleLike()" id="likeBtn" class="group flex flex-col items-center mx-auto transition-all">
                    <div class="w-20 h-20 rounded-full border-2 border-slate-100 flex items-center justify-center text-3xl group-hover:scale-110 group-hover:border-red-100 transition-all shadow-sm">❤️</div>
                    <span id="readLikesCount" class="mt-2 font-black text-slate-900 text-xl">0</span>
                </button>
            </div>
        </div>
    </main>

    <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz0yVcEnrPaIgxq-7Ht1s6eCgqQ_cT1dMnaVONUQiMSQgFZMKjSeN-48uKJyHwE3K-9yA/exec";
    let globalArticles = [];
    let currentArtId = null;

    // --- FUNGSI FIX GAMBAR DRIVE ---
    function getThumb(url, size = "w800") {
        if (!url || url === "") return "https://images.unsplash.com/photo-1455390582262-044cdead27d8?w=800";
        
        // Cek jika link adalah link Google Drive
        if (url.includes("drive.google.com")) {
            // Regex lebih kuat untuk menangkap ID File Drive
            const match = url.match(/[-\w]{25,}/);
            if (match) return `https://drive.google.com/thumbnail?id=${match[0]}&sz=${size}`;
        }
        return url; // Kembalikan URL asli jika bukan Drive (misal Unsplash/Imgur)
    }

    async function init() {
        try {
            const [artRes, leadRes] = await Promise.all([
                fetch(`${GAS_URL}?action=searchPublic`).then(r => r.json()),
                fetch(`${GAS_URL}?action=getLeaderboard`).then(r => r.json())
            ]);

            if(artRes.result === "success") {
                globalArticles = artRes.data.reverse();
                renderCategories();
                renderArticles(globalArticles);
            }
            if(leadRes.result === "success") renderLeaderboard(leadRes.data);
            document.getElementById('loading').style.display = 'none';
        } catch(e) { 
            console.error("Load failed", e);
        }
    }

    function renderArticles(articles) {
        const grid = document.getElementById('articleGrid');
        grid.classList.remove('hidden');
        grid.innerHTML = articles.map(art => {
            // Pastikan art.foto adalah array atau string
            const fotoUrl = Array.isArray(art.foto) ? art.foto[0] : art.foto;
            return `
            <div class="article-card group cursor-pointer bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-xl transition-all" onclick="openReadView('${art.id}')">
                <div class="relative h-52 mb-4 rounded-[1.5rem] overflow-hidden bg-slate-100">
                    <img src="${getThumb(fotoUrl)}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x600?text=Gambar+Tidak+Tersedia'">
                    <span class="absolute top-3 left-3 bg-white/90 px-3 py-1 rounded-lg text-[9px] font-black uppercase shadow-sm">${art.kategori}</span>
                </div>
                <h3 class="text-lg font-extrabold text-slate-800 leading-tight line-clamp-2 group-hover:navy-text transition-colors">${art.judul}</h3>
                <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-50">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${art.penulis}</p>
                    <div class="flex gap-3 text-[10px] font-bold text-slate-300">
                        <span>👁️ ${art.views || 0}</span>
                        <span>❤️ ${art.reactions || 0}</span>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function renderLeaderboard(data) {
        const list = document.getElementById('leaderboardList');
        list.innerHTML = data.map((auth) => {
            const avatarImg = auth.foto_profil ? 
                `<img src="${getThumb(auth.foto_profil, 'w100')}" class="w-full h-full object-cover">` : 
                `<span>${auth.avatar}</span>`;
            return `
            <div class="rank-card flex items-center gap-3 p-3 bg-slate-50/50 rounded-2xl hover:bg-white transition-colors border border-transparent hover:border-slate-100">
                <div class="w-10 h-10 navy-bg rounded-xl flex-shrink-0 overflow-hidden flex items-center justify-center text-white font-bold text-sm shadow-sm">${avatarImg}</div>
                <div class="flex-1 min-w-0">
                    <p class="font-bold text-xs truncate text-slate-800">${auth.nama}</p>
                    <p class="text-[9px] font-black text-amber-500 uppercase tracking-tighter">${auth.poin} POINTS</p>
                </div>
            </div>`;
        }).join('');
    }

    async function openReadView(id) {
        const art = globalArticles.find(a => a.id === id);
        if(!art) return;
        currentArtId = id;
        
        document.getElementById('homeView').classList.add('hidden');
        document.getElementById('readView').classList.remove('hidden');
        
        document.getElementById('readJudul').innerText = art.judul;
        document.getElementById('readPenulis').innerText = art.penulis;
        document.getElementById('readIsi').innerHTML = art.isi;
        document.getElementById('readStats').innerText = `${art.views || 0} Pembaca • ${art.kategori}`;
        document.getElementById('readPoinPenulis').innerText = `⭐ ${art.poin_penulis || 0} PTS`;
        document.getElementById('readLikesCount').innerText = art.reactions || 0;

        // --- FIX TOMBOL WA SHARE ---
        // Menggunakan URL halaman + ID artikel agar link spesifik
        const currentUrl = window.location.href.split('?')[0]; 
        const shareLink = `${currentUrl}?read=${id}`; 
        const waText = encodeURIComponent(`*${art.judul}*\nKarya: ${art.penulis}\n\nBaca selengkapnya di Portal Literasi:\n${shareLink}`);
        document.getElementById('waShareBtn').onclick = () => window.open(`https://wa.me/?text=${waText}`);

        // Update Avatar di halaman baca
        const avatarBox = document.getElementById('readAvatarContainer');
        if(art.foto_profil_penulis) {
            avatarBox.innerHTML = `<img src="${getThumb(art.foto_profil_penulis, 'w200')}" class="w-full h-full object-cover">`;
        } else {
            avatarBox.innerHTML = art.penulis[0].toUpperCase();
        }

        fetch(`${GAS_URL}?action=hitView&id=${id}`);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function backToHome() {
        document.getElementById('readView').classList.add('hidden');
        document.getElementById('homeView').classList.remove('hidden');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function renderCategories() {
        const cats = ["Semua", ...new Set(globalArticles.map(a => a.kategori))];
        const container = document.getElementById('catContainer');
        container.innerHTML = cats.map(c => `
            <button onclick="filterCat('${c}')" class="cat-pill whitespace-nowrap px-6 py-2 rounded-full bg-white border border-slate-200 text-sm font-bold transition-all hover:border-blue-200">${c}</button>
        `).join('');
    }

    function filterCat(cat) {
        document.querySelectorAll('.cat-pill').forEach(b => b.innerText === cat ? b.classList.add('active-cat') : b.classList.remove('active-cat'));
        renderArticles(cat === "Semua" ? globalArticles : globalArticles.filter(a => a.kategori === cat));
    }

    init();
</script>
</body>
</html>
