<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Engine - Portal Literasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .ql-editor { min-height: 350px; font-size: 16px; line-height: 1.8; }
        .ql-container { border-radius: 0 0 16px 16px !important; border: 1px solid #e2e8f0 !important; }
        .ql-toolbar { border-radius: 16px 16px 0 0 !important; background: #f8fafc !important; border: 1px solid #e2e8f0 !important; }
        
        .image-preview-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 12px; 
            margin-top: 15px; 
        }
        .preview-item { 
            width: 100%; 
            height: 100px; 
            border-radius: 12px; 
            object-fit: cover; 
            border: 3px solid #fff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-10">

    <div class="max-w-4xl mx-auto bg-white p-6 md:p-12 rounded-[2.5rem] shadow-2xl border border-slate-100">
        <div class="border-b-2 border-slate-50 pb-8 mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight italic">CORE <span class="text-blue-600">ENGINE</span></h1>
                <p class="text-slate-500 font-medium mt-1">Dashboard Penulis Komunitas — Status: <span class="text-orange-500 font-bold">Review Mode</span></p>
            </div>
            <div class="bg-blue-50 px-4 py-2 rounded-2xl">
                <p class="text-blue-700 text-xs font-black uppercase tracking-widest text-center">Version 2.1 Multi-Photo</p>
            </div>
        </div>

        <form id="engineForm" class="space-y-10">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block text-sm font-extrabold text-slate-700 mb-3 uppercase tracking-wider">Identitas Penulis</label>
                    <input type="text" id="penulis" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400" placeholder="Nama Lengkap Anda">
                </div>
                <div>
                    <label class="block text-sm font-extrabold text-slate-700 mb-3 uppercase tracking-wider">Email Korespondensi</label>
                    <input type="email" id="email" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400" placeholder="email@sekolah.sch.id">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="md:col-span-1">
                    <label class="block text-sm font-extrabold text-slate-700 mb-3 uppercase tracking-wider">Kategori Konten</label>
                    <select id="kategori" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none cursor-pointer appearance-none font-semibold text-slate-700">
                        <option value="Cerpen">📖 Cerpen</option>
                        <option value="Puisi">✍️ Puisi</option>
                        <option value="Opini">💡 Opini</option>
                        <option value="Artikel Umum">📰 Artikel Umum</option>
                        <option value="Parenting">👨‍👩‍👧 Parenting</option>
                        <option value="Kesehatan">🏥 Kesehatan</option>
                        <option value="Hobi">🎨 Hobi & Gaya Hidup</option>
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-extrabold text-slate-700 mb-3 uppercase tracking-wider">Judul Artikel</label>
                    <input type="text" id="judul" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-500 outline-none transition-all font-bold text-xl text-slate-800" placeholder="Tuliskan judul yang provokatif & menarik...">
                </div>
            </div>

            <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-8 rounded-[2rem] text-white shadow-lg shadow-blue-200">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-bold mb-3 opacity-90 uppercase">🖼️ Foto Utama (Maks. 5 Foto)</label>
                        <input type="file" id="imageFiles" accept="image/*" multiple class="block w-full text-sm text-blue-100 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-white file:text-blue-700 hover:file:bg-blue-50 cursor-pointer">
                        <div id="imagePreview" class="image-preview-grid"></div>
                        <p class="text-[10px] mt-3 text-blue-200 italic">* Foto ini akan muncul sebagai slider/thumbnail di halaman utama.</p>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-3 opacity-90 uppercase">🎥 Integrasi Video YouTube</label>
                        <input type="url" id="youtube" class="w-full p-4 bg-blue-700/50 border border-blue-400/30 rounded-2xl focus:ring-2 focus:ring-white outline-none placeholder:text-blue-300 text-white" placeholder="https://youtube.com/watch?v=...">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-extrabold text-slate-700 mb-3 uppercase tracking-wider">Isi Tulisan & Media Dalam Konten</label>
                <div id="editor" class="bg-white"></div>
                <div class="flex items-center gap-2 mt-3 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-[11px] italic">Gunakan ikon gambar di toolbar editor jika ingin menyisipkan foto di antara paragraf.</p>
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100">
                <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-black text-white font-black py-6 px-8 rounded-3xl transition-all transform hover:-translate-y-1 active:scale-[0.98] shadow-2xl flex justify-center items-center gap-4 text-xl tracking-wide uppercase">
                    <span id="btnIcon">🚀</span>
                    <span id="btnText">Kirim Naskah Sekarang</span>
                </button>
                <div id="statusMsg" class="mt-6 text-center p-5 rounded-2xl hidden font-bold text-sm"></div>
            </div>
        </form>
    </div>

    <script>
        // 1. MASUKKAN URL GOOGLE APPS SCRIPT ANDA
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwyEZxncoGnMjCOWqkKo-yCWaJs4Rx7sirj1HFnxVa3q_sBthTxzZh4rXs0l0Mxf3RA1A/exec";

        // 2. Inisialisasi Quill Editor dengan Tool Lengkap
        const quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Tuangkan ide brilian Anda di sini...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });

        // 3. Logic: Preview Multi-Photo
        document.getElementById('imageFiles').addEventListener('change', function(e) {
            const previewContainer = document.getElementById('imagePreview');
            previewContainer.innerHTML = '';
            const files = Array.from(e.target.files).slice(0, 5); // Limit 5
            
            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(ex) {
                    const img = document.createElement('img');
                    img.src = ex.target.result;
                    img.className = 'preview-item';
                    previewContainer.appendChild(img);
                }
                reader.readAsDataURL(file);
            });
        });

        // 4. Helper: Base64 Converter
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // 5. Submit Process
        document.getElementById('engineForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const statusMsg = document.getElementById('statusMsg');

            if(GAS_WEB_APP_URL.includes("MASUKKAN_URL")) {
                alert("Sistem belum siap: URL Apps Script belum dipasang!");
                return;
            }

            // UI: Loading State
            btn.disabled = true;
            btnText.innerText = "SEDANG MENGIRIM DATA...";
            btnIcon.innerHTML = `<div class="loading-spinner"></div>`;
            statusMsg.classList.add('hidden');

            try {
                // Collect Multi-Photos
                const fileInput = document.getElementById('imageFiles');
                const imageArray = [];
                const files = Array.from(fileInput.files).slice(0, 5);
                
                for (let file of files) {
                    const b64 = await getBase64(file);
                    imageArray.push(b64);
                }

                const payload = {
                    penulis: document.getElementById('penulis').value,
                    email: document.getElementById('email').value,
                    kategori: document.getElementById('kategori').value,
                    judul: document.getElementById('judul').value,
                    isi: quill.root.innerHTML, 
                    youtube: document.getElementById('youtube').value,
                    imageFiles: imageArray
                };

                // Kirim ke Google Apps Script
                await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                // Success Message
                statusMsg.innerText = "✅ NASKAH TERKIRIM! Mohon tunggu proses kurasi dari Tim Redaksi/Admin.";
                statusMsg.className = "mt-6 text-center p-5 rounded-2xl block bg-green-50 text-green-700 border-2 border-green-200 shadow-sm";
                
                // Reset Form
                document.getElementById('engineForm').reset();
                document.getElementById('imagePreview').innerHTML = '';
                quill.setContents([]);

            } catch (err) {
                statusMsg.innerText = "❌ ERROR: " + err.message;
                statusMsg.className = "mt-6 text-center p-5 rounded-2xl block bg-red-50 text-red-700 border-2 border-red-200 shadow-sm";
            } finally {
                btn.disabled = false;
                btnText.innerText = "Kirim Naskah Sekarang";
                btnIcon.innerText = "🚀";
            }
        });
    </script>
</body>
</html>
