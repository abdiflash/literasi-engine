<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi Komunitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy-light: #38bdf8; --bg-dark: #0f172a; --card-dark: #1e293b; --border-dark: #334155; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow-x: hidden; }
        .navy-text { color: var(--navy-light); }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-dark); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { background-color: var(--navy-light) !important; color: #0f172a !important; }
        
        .article-card { background: var(--card-dark); border: 1px solid var(--border-dark); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .article-card:hover { transform: translateY(-8px); border-color: var(--navy-light); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        
        .slider-wrapper { position: relative; overflow: hidden; border-radius: 2rem; background: #000; aspect-ratio: 16/9; }
        .slider-container { display: flex; transition: transform 0.5s ease-in-out; height: 100%; }
        .slider-item-container { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .slider-item { max-width: 100%; max-height: 100%; object-fit: contain; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black navy-text tracking-tighter cursor-pointer" onclick="location.reload()">
                PORTAL<span class="text-slate-500 font-light italic">LITERASI</span>
            </div>
            <div class="flex gap-3">
                <a href="daftar.html" class="bg-slate-800 text-white font-bold py-2.5 px-5 rounded-xl text-xs border border-slate-700 hover:bg-slate-700 transition-all">Daftar</a>
                <a href="tulis.html" class="bg-[#38bdf8] text-slate-900 font-bold py-2.5 px-5 rounded-xl text-xs shadow-lg shadow-blue-500/20 hover:scale-105 transition-all">Kirim Naskah</a>
            </div>
        </div>
    </nav>

    <main id="homeView">
        <header class="max-w-4xl mx-auto px-6 pt-16 pb-10 text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter mb-6 text-white">Jendela <span class="navy-text">Inspirasi</span></h1>
            
            <div id="catContainer" class="flex gap-3 overflow-x-auto no-scrollbar py-6 justify-center"></div>
            
            <div class="relative max-w-2xl mx-auto mt-4 px-4">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Cari karya atau penulis..." class="w-full bg-slate-800/50 border border-slate-700 text-white py-4 px-8 rounded-2xl focus:ring-2 focus:ring-[#38bdf8] outline-none transition-all backdrop-blur-sm">
            </div>
        </header>

        <section class="max-w-7xl mx-auto px-6 pb-20">
            <div id="articleGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>

            <div id="paginationContainer" class="flex justify-center items-center gap-6 mt-16 hidden">
                <button id="prevPage" onclick="changePage(-1)" class="p-4 rounded-full border border-slate-700 text-slate-400 hover:text-[#38bdf8] hover:border-[#38bdf8] transition-all disabled:opacity-20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <span id="pageIndicator" class="font-black text-slate-500 tracking-widest text-sm uppercase">Halaman 1</span>
                <button id="nextPage" onclick="changePage(1)" class="bg-slate-800 p-4 rounded-full border border-slate-700 text-white hover:bg-[#38bdf8] hover:text-slate-900 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
        </section>

        <section class="bg-slate-900/50 border-t border-slate-800 py-16">
            <div class="max-w-7xl mx-auto px-6">
                <div class="mb-8 text-center md:text-left">
                    <h2 class="text-2xl font-black text-white italic">🏆 TOP PENULIS</h2>
                    <p class="text-slate-500 text-sm font-medium uppercase tracking-widest">Kreator Berprestasi Minggu Ini</p>
                </div>
                <div id="leaderboardList" class="flex gap-4 overflow-x-auto pb-6 no-scrollbar">
                    </div>
            </div>
        </section>
    </main>

    <main id="readView" class="hidden pb-20">
        <div class="max-w-4xl mx-auto px-6 py-12">
            <button onclick="backToHome()" class="mb-8 font-black text-xs text-slate-500 hover:text-white transition-all tracking-widest uppercase">← Kembali ke Galeri</button>
            
            <div id="sliderWrapper" class="slider-wrapper mb-10 shadow-2xl">
                <div id="imageSlider" class="slider-container"></div>
                <button id="prevBtn" onclick="moveSlide(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-[#38bdf8] text-white w-12 h-12 rounded-full backdrop-blur-md transition-all z-20">‹</button>
                <button id="nextBtn" onclick="moveSlide(1)" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/50 hover:bg-[#38bdf8] text-white w-12 h-12 rounded-full backdrop-blur-md transition-all z-20">›</button>
            </div>

            <div class="text-center mb-10">
                <span id="readKategori" class="bg-[#38bdf8] text-slate-900 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-4 inline-block">Kategori</span>
                <h1 id="readJudul" class="text-4xl md:text-6xl font-black text-white mb-6 leading-tight tracking-tighter"></h1>
                <div class="flex items-center justify-center gap-4 text-slate-400 font-bold text-sm">
                    <span id="readPenulis">Oleh: -</span>
                    <span id="readTanggal">1 Jan 2026</span>
                </div>
            </div>

            <div id="readIsi" class="prose prose-invert prose-blue max-w-none text-slate-300 text-lg leading-relaxed bg-slate-800/30 p-8 rounded-[2rem] border border-slate-700/50">
                </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxx87Qzy4VYYqnXET71EQc5cP_3ax9x4-sgLS8vEssE376fnSiOgfB91590qoBZ0kE-rA/exec";
        
        let allArticles = [];
        let filteredArticles = [];
        let authorMap = {};
        let currentPage = 1;
        const ITEMS_PER_PAGE = 6;
        let currentSlide = 0;

        function getThumb(url, size = "w1200") {
            if (!url || url === "" || url === "#") return "https://via.placeholder.com/800x450/1e293b/64748b?text=Portal+Literasi";
            const match = url.match(/[-\w]{25,}/);
            return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=${size}` : url;
        }

        async function init() {
            try {
                // 1. Ambil Data Penulis
                const authRes = await fetch(`${GAS_URL}?action=getAuthors`).then(r => r.json());
                const authors = authRes.data || [];
                authors.forEach(a => { 
                    authorMap[a.pin?.toString().trim()] = a.foto;
                });
                renderLeaderboard(authors);

                // 2. Ambil Data Artikel
                const artRes = await fetch(GAS_URL).then(r => r.json());
                if (artRes.result === "success") {
                    allArticles = artRes.data;
                    filteredArticles = [...allArticles];
                    renderCategories(artRes.categories);
                    renderPage();
                }
            } catch (e) {
                console.error("Initialization error:", e);
            }
        }

        function renderPage() {
            const grid = document.getElementById('articleGrid');
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const end = start + ITEMS_PER_PAGE;
            const pageData = filteredArticles.slice(start, end);

            if(pageData.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-500">Belum ada karya untuk ditampilkan.</div>`;
                return;
            }

            grid.innerHTML = pageData.map((art, idx) => {
                const fotoPenulis = getThumb(authorMap[art.pin?.toString().trim()], "w100");
                return `
                <div class="article-card rounded-[2.5rem] p-5 fade-in" style="animation-delay: ${idx * 0.1}s" onclick="openReadView('${art.id}')">
                    <div class="relative h-60 mb-5 rounded-[2rem] overflow-hidden bg-slate-900">
                        <img src="${getThumb(art.foto[0], "w600")}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest border border-white/10">${art.kategori}</div>
                    </div>
                    <h3 class="text-xl font-bold text-white line-clamp-2 px-2 leading-snug mb-4">${art.judul}</h3>
                    <div class="flex items-center justify-between px-2 pt-4 border-t border-slate-700/50">
                        <div class="flex items-center gap-3">
                            <img src="${fotoPenulis}" class="w-8 h-8 rounded-full object-cover border border-slate-600 shadow-sm" onerror="this.src='https://ui-avatars.com/api/?name=${art.penulis}'">
                            <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">${art.penulis}</span>
                        </div>
                        <span class="text-[11px] font-bold text-slate-600">👁️ ${art.views || 0}</span>
                    </div>
                </div>`;
            }).join('');

            updatePagination();
        }

        function renderLeaderboard(data) {
            const list = document.getElementById('leaderboardList');
            const top10 = [...data].sort((a, b) => (b.poin || 0) - (a.poin || 0)).slice(0, 10);
            
            list.innerHTML = top10.map((auth, idx) => `
                <div class="flex-shrink-0 bg-slate-800/40 border border-slate-700/50 p-4 rounded-3xl flex items-center gap-4 min-w-[240px]">
                    <div class="relative">
                        <img src="${getThumb(auth.foto, 'w100')}" class="w-14 h-14 rounded-2xl object-cover border-2 border-slate-700" onerror="this.src='https://ui-avatars.com/api/?name=${auth.nama}'">
                        <div class="absolute -top-2 -left-2 bg-[#38bdf8] text-slate-900 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black shadow-lg">#${idx+1}</div>
                    </div>
                    <div>
                        <p class="font-black text-sm text-white uppercase tracking-tight truncate w-32">${auth.nama}</p>
                        <p class="text-[10px] font-bold text-[#38bdf8] uppercase tracking-widest">${auth.poin || 0} POIN</p>
                    </div>
                </div>
            `).join('');
        }

        function openReadView(id) {
            const art = allArticles.find(a => a.id === id);
            if (!art) return;

            // Update View Stat ke GAS
            fetch(`${GAS_URL}?action=hitView&id=${id}`);

            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('readView').classList.remove('hidden');
            window.scrollTo(0, 0);

            document.getElementById('readJudul').innerText = art.judul;
            document.getElementById('readKategori').innerText = art.kategori;
            document.getElementById('readPenulis').innerText = `Oleh: ${art.penulis}`;
            document.getElementById('readIsi').innerHTML = art.isi.replace(/\n/g, '<br>');
            
            // Render Slider Gambar
            const slider = document.getElementById('imageSlider');
            const images = art.foto.filter(f => f && f !== "");
            slider.innerHTML = images.map(f => `
                <div class="slider-item-container">
                    <img src="${getThumb(f, "w1200")}" class="slider-item">
                </div>
            `).join('');

            currentSlide = 0;
            updateSlider();
            
            // Sembunyikan navigasi slider jika foto cuma 1
            document.getElementById('prevBtn').classList.toggle('hidden', images.length <= 1);
            document.getElementById('nextBtn').classList.toggle('hidden', images.length <= 1);
        }

        function moveSlide(step) {
            const slides = document.querySelectorAll('.slider-item-container');
            if (slides.length <= 1) return;
            currentSlide = (currentSlide + step + slides.length) % slides.length;
            updateSlider();
        }

        function updateSlider() {
            const slider = document.getElementById('imageSlider');
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        function backToHome() {
            document.getElementById('readView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
            renderPage();
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            filteredArticles = allArticles.filter(a => 
                a.judul.toLowerCase().includes(q) || a.penulis.toLowerCase().includes(q)
            );
            currentPage = 1;
            renderPage();
        }

        function filterCat(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-cat'));
            document.getElementById(`btn-${cat}`).classList.add('active-cat');
            filteredArticles = (cat === "Semua") ? [...allArticles] : allArticles.filter(a => a.kategori === cat);
            currentPage = 1;
            renderPage();
        }

        function renderCategories(cats) {
            const container = document.getElementById('catContainer');
            const uniqueCats = ["Semua", ...new Set(cats)];
            container.innerHTML = uniqueCats.map(c => `
                <button onclick="filterCat('${c}')" id="btn-${c}" class="cat-btn px-8 py-2.5 rounded-full border border-slate-700 text-xs font-black uppercase tracking-widest transition-all ${c === 'Semua' ? 'active-cat' : 'text-slate-500 hover:text-white'}">${c}</button>
            `).join('');
        }

        function updatePagination() {
            const container = document.getElementById('paginationContainer');
            const totalPages = Math.ceil(filteredArticles.length / ITEMS_PER_PAGE);
            container.classList.toggle('hidden', filteredArticles.length <= ITEMS_PER_PAGE);
            document.getElementById('pageIndicator').innerText = `Halaman ${currentPage} / ${totalPages}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages || totalPages === 0;
        }

        function changePage(dir) {
            currentPage += dir;
            window.scrollTo({ top: 300, behavior: 'smooth' });
            renderPage();
        }

        init();
    </script>
</body>
</html>
