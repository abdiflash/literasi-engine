<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi - Jendela Inspirasi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b1325;
            --card-bg: #132038;
            --primary-blue: #38bdf8;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 6%;
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #64748b;
            font-weight: 400;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .nav-links a.active {
            color: var(--primary-blue);
        }

        .search-icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 16px;
        }

        .hero {
            text-align: center;
            padding: 40px 20px 20px 20px;
        }

        .hero h1 {
            font-size: 64px;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: -1px;
        }

        .hero h1 span {
            color: var(--primary-blue);
        }

        .controls-container {
            max-width: 760px;
            margin: 0 auto 40px auto;
            padding: 0 20px;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 30px;
        }

        .search-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 16px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 55px;
            background-color: #0f1a30;
            border: 1px solid #1e2e4a;
            border-radius: 30px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 1px var(--primary-blue);
        }

        .filter-settings {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 1px solid #16253f;
            padding-bottom: 25px;
        }

        .role-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-filter {
            background-color: #162544;
            color: #94a3b8;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        .btn-filter.active {
            background-color: #1e293b;
            color: var(--primary-blue);
            border: 1px solid #334155;
        }

        .dropdown-group {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .select-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .select-wrapper select {
            background-color: #0f1a30;
            color: var(--text-main);
            border: 1px solid #1e2e4a;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .content-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 4%;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #1e3354;
        }

        .card-banner {
            position: relative;
            width: 100%;
            height: 210px;
            background-color: #0b1424;
        }

        .badge-category {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(4px);
            color: #cbd5e1;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 25px;
            color: var(--text-main);
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #1e2e4d;
            padding-top: 15px;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #1e293b;
        }

        .author-meta {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
        }

        .author-role {
            font-size: 10px;
            color: #475569;
            margin-top: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .view-count {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #475569;
        }

        .status-message {
            text-align: center;
            padding: 80px 20px;
            color: #475569;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            width: 100%;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PORTAL<span>LITERASI</span></div>
        <nav class="nav-links">
            <a href="daftar.html">Daftar</a>
            <a href="tulis.html" class="active">Tulis</a>
            <button class="search-icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Jendela <span>Inspirasi</span></h1>
        </section>

        <section class="controls-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari karya, penulis, atau bulan/tahun...">
            </div>

            <div class="filter-settings">
                <div class="role-filters" id="roleFilterGroup">
                    <button class="btn-filter active" data-role="all">Semua Peran</button>
                    <button class="btn-filter" data-role="Siswa">Siswa</button>
                    <button class="btn-filter" data-role="Orang Tua">Orang Tua</button>
                    <button class="btn-filter" data-role="Guru">Guru</button>
                    <button class="btn-filter" data-role="Alumni">Alumni</button>
                </div>

                <div class="dropdown-group">
                    <div class="select-wrapper">
                        <span>Kategori:</span>
                        <select id="categorySelect">
                            <option value="all">Semua Kategori</option>
                            <option value="Cerpen (Cerita Pendek)">Cerpen</option>
                            <option value="Puisi & Sajak">Puisi</option>
                            <option value="Berita & Liputan Sekolah">Berita Sekolah</option>
                            <option value="Opini & Ulasan (Review)">Opini/Ulasan</option>
                            <option value="Edukasi & Pengetahuan">Edukasi</option>
                            <option value="Komik & Ilustrasi">Komik</option>
                            <option value="Fotografi">Fotografi</option>
                            <option value="Film Pendek & Video">Film Pendek</option>
                            <option value="Catatan Harian / Pengalaman">Catatan Pengalaman</option>
                            <option value="Artikel Umum">Artikel Umum</option>
                        </select>
                    </div>

                    <div class="select-wrapper">
                        <span>Urutkan:</span>
                        <select id="sortSelect">
                            <option value="terbaru">Terbaru</option>
                            <option value="populer">Populer</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="content-section">
            <div class="grid-container" id="feedGrid">
                </div>
        </section>
    </main>

    <script>
        // Data Dummy Terintegrasi Sesuai Gambar Database Sheets & Redaksi Anda
        const mockDatabase = [
            {
                id: "ART-97BD539E",
                timestamp: "5/14/2026 14:10", // Format asli DB: Bulan/Hari/Tahun
                judul: "Raungan Taring Baja Eps. 1",
                kategori: "Komik & Ilustrasi",
                penulis: "Leonardus Yesiabdi",
                peran: "Orang Tua",
                detailPeran: "ORTU • ABILAH HUSAIN",
                views: 29,
                avatar: "https://i.pravatar.cc/100?img=33"
            },
            {
                id: "ART-88XF221A",
                timestamp: "5/15/2026 09:30",
                judul: "Desain Rumah Minimalis",
                kategori: "Fotografi",
                penulis: "Leonardus Yesi",
                peran: "Guru/Staf", // Sesuai data string dari database di image_ce3c67.png
                detailPeran: "GURU/STAF • PUBLIKASI",
                views: 9,
                avatar: "https://i.pravatar.cc/100?img=12"
            },
            {
                id: "ART-11QA902C",
                timestamp: "5/12/2026 11:15",
                judul: "Tes",
                kategori: "Artikel Umum",
                penulis: "Leonardus Yesiabdi",
                peran: "Orang Tua",
                detailPeran: "ORANG TUA",
                views: 4,
                avatar: "https://i.pravatar.cc/100?img=33"
            }
        ];

        // Daftar nama bulan bahasa Indonesia untuk konversi pencarian teks tanggal
        const namaBulanIndo = [
            "januari", "februari", "maret", "april", "mei", "juni", 
            "juli", "agustus", "september", "oktober", "november", "desember"
        ];

        let currentRole = "all";
        let currentCategory = "all";
        let currentSort = "terbaru";
        let searchQuery = "";

        const feedGrid = document.getElementById('feedGrid');
        const searchInput = document.getElementById('searchInput');
        const categorySelect = document.getElementById('categorySelect');
        const sortSelect = document.getElementById('sortSelect');
        const roleButtons = document.querySelectorAll('#roleFilterGroup .btn-filter');

        function renderFeed(data) {
            feedGrid.innerHTML = "";
            
            if (data.length === 0) {
                feedGrid.innerHTML = `<div class="status-message">Karya tidak ditemukan</div>`;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-banner">
                        <span class="badge-category">${getShortCategory(item.kategori)}</span>
                        <div style="width:100%; height:100%; background:#1a273f; display:flex; align-items:center; justify-content:center; color:#334155;">
                            <i class="fa-regular fa-image" style="font-size: 28px;"></i>
                        </div>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${item.judul}</h3>
                        <div class="card-footer">
                            <div class="author-info">
                                <img src="${item.avatar}" alt="${item.penulis}" class="author-img">
                                <div class="author-meta">
                                    <span class="author-name">${item.penulis}</span>
                                    <span class="author-role">${item.detailPeran}</span>
                                </div>
                            </div>
                            <div class="view-count">
                                <i class="fa-regular fa-eye"></i>
                                <span>${item.views}</span>
                            </div>
                        </div>
                    </div>
                `;
                feedGrid.appendChild(card);
            });
        }

        function getShortCategory(fullCategory) {
            if(fullCategory.includes("Komik")) return "Komik";
            if(fullCategory.includes("Fotografi")) return "Fotografi";
            if(fullCategory.includes("Umum")) return "Artikel Umum";
            return fullCategory;
        }

        // ENGINE RESPONSif: Memperbaiki Filter Peran & Pencarian Bulan/Tahun
        function filterAndSortData() {
            let filtered = [...mockDatabase];

            // 1. Logika Perbaikan Filter Peran (Menggabungkan Guru & Guru/Staf)
            if (currentRole !== "all") {
                filtered = filtered.filter(item => {
                    if (currentRole === "Guru") {
                        // Jika menekan tombol 'GURU', data bertuliskan 'Guru' maupun 'Guru/Staf' otomatis lolos penyaringan
                        return item.peran.toLowerCase().includes('guru') || item.peran.toLowerCase().includes('staf');
                    }
                    return item.peran.toLowerCase() === currentRole.toLowerCase();
                });
            }

            // 2. Filter Kategori Dropdown
            if (currentCategory !== "all") {
                filtered = filtered.filter(item => item.kategori === currentCategory);
            }

            // 3. Logika Mutakhir Pencarian Multi-Keyword (Judul, Penulis, Bulan, Tahun)
            if (searchQuery.trim() !== "") {
                const query = searchQuery.toLowerCase().trim();
                
                filtered = filtered.filter(item => {
                    // Pecah timestamp (contoh: "5/14/2026 14:10") untuk ekstraksi waktu
                    const parts = item.timestamp.split(' ')[0].split('/');
                    const itemBulanAngka = parseInt(parts[0]); // 5
                    const itemHari = parts[1];                 // 14
                    const itemTahun = parts[2];                // 2026
                    const itemNamaBulan = namaBulanIndo[itemBulanAngka - 1] || ""; // "mei"

                    // Cek apakah query pengguna mencocokkan kriteria teks tanggal biasa/nama bulan
                    const matchTanggal = itemTahun.includes(query) || 
                                         itemNamaBulan.includes(query) || 
                                         `${itemHari} ${itemNamaBulan}`.includes(query) ||
                                         `${itemNamaBulan} ${itemTahun}`.includes(query);

                    return item.judul.toLowerCase().includes(query) || 
                           item.penulis.toLowerCase().includes(query) || 
                           matchTanggal;
                });
            }

            // 4. Pengurutan (Sorting)
            if (currentSort === "terbaru") {
                filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            } else if (currentSort === "populer") {
                filtered.sort((a, b) => b.views - a.views);
            }

            renderFeed(filtered);
        }

        // --- Pemicu Event Kontrol ---
        roleButtons.forEach(button => {
            button.addEventListener('click', () => {
                roleButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentRole = button.getAttribute('data-role');
                filterAndSortData();
            });
        });

        categorySelect.addEventListener('change', (e) => {
            currentCategory = e.target.value;
            filterAndSortData();
        });

        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            filterAndSortData();
        });

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            filterAndSortData();
        });

        // Tampilkan data saat pertama kali aplikasi dimuat
        document.addEventListener("DOMContentLoaded", () => {
            filterAndSortData();
        });
    </script>
</body>
</html>
