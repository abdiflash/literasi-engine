<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi Komunitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        /* Styling Khusus untuk Keterbacaan Artikel (UX Typography) */
        .content-render { font-size: 1.125rem; line-height: 1.8; color: #334155; letter-spacing: -0.01em; }
        .content-render h1, .content-render h2, .content-render h3 { color: #0f172a; font-weight: 700; margin-top: 2em; margin-bottom: 0.75em; line-height: 1.3; }
        .content-render h1 { font-size: 1.875rem; }
        .content-render h2 { font-size: 1.5rem; }
        .content-render h3 { font-size: 1.25rem; }
        .content-render p { margin-bottom: 1.5em; }
        .content-render ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.5em; }
        .content-render ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1.5em; }
        .content-render li { margin-bottom: 0.5em; }
        .content-render blockquote { border-left: 4px solid #044A80; background-color: #f1f5f9; padding: 1rem 1.5rem; font-style: italic; color: #475569; border-radius: 0 8px 8px 0; margin-bottom: 1.5em; }
        .content-render img { max-width: 100%; height: auto; border-radius: 12px; margin: 2em 0; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .content-render a { color: #044A80; text-decoration: underline; text-underline-offset: 4px; }
    </style>
</head>
<body class="text-slate-800 selection:bg-[#044A80] selection:text-white">

    <nav class="bg-white/90 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-6xl mx-auto px-5 py-4 flex justify-between items-center">
            <div class="text-2xl font-extrabold text-[#044A80] flex items-center gap-2 cursor-pointer tracking-tight" onclick="backToHome()">
                Portal Literasi
            </div>
            <a href="tulis.html" class="bg-[#044A80] hover:bg-[#03365e] text-white font-medium py-2.5 px-6 rounded-full transition-all shadow-md hover:shadow-lg text-sm flex items-center gap-2">
                ✍️ <span class="hidden sm:inline">Kirim Naskah</span>
            </a>
        </div>
    </nav>

    <div id="homeView" class="max-w-6xl mx-auto px-5 py-12 md:py-20">
        <div class="text-center mb-16 md:mb-20">
            <h1 class="text-4xl md:text-6xl font-extrabold mb-6 tracking-tight text-slate-900">
                Eksplorasi Ide & <span class="text-[#044A80]">Gagasan</span>
            </h1>
            <p class="text-lg text-slate-500 max-w-2xl mx-auto leading-relaxed">
                Ruang baca dan kreasi. Temukan berbagai perspektif, cerita, dan pengetahuan baru dari komunitas kita.
            </p>
        </div>

        <div id="loading" class="text-center py-20">
            <div class="animate-spin inline-block w-10 h-10 border-[3px] border-current border-t-transparent text-[#044A80] rounded-full" role="status" aria-label="loading"></div>
            <p class="mt-4 text-slate-500 font-medium tracking-wide">Merangkai tulisan terbaru...</p>
        </div>

        <div id="articleGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10 hidden">
            </div>
    </div>

    <div id="readView" class="max-w-3xl mx-auto px-5 py-12 hidden">
        <button onclick="backToHome()" class="group text-slate-500 hover:text-[#044A80] font-medium mb-10 flex items-center gap-2 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            Kembali ke Beranda
        </button>

        <header class="mb-10">
            <span id="readKategori" class="bg-[#eaf3fa] text-[#044A80] text-xs font-bold px-3 py-1.5 rounded-md mb-6 inline-block tracking-wider uppercase">Kategori</span>
            <h1 id="readJudul" class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-8 leading-tight tracking-tight">Judul Artikel</h1>
            
            <div class="flex items-center gap-4 py-6 border-y border-slate-100">
                <div class="w-12 h-12 bg-[#044A80] rounded-full flex items-center justify-center text-lg font-bold text-white uppercase shadow-inner" id="readAvatar">A</div>
                <div>
                    <p class="font-bold text-slate-800" id="readPenulis">Nama Penulis</p>
                    <p class="text-sm text-slate-500 font-medium" id="readTanggal">Tanggal rilis</p>
                </div>
            </div>
        </header>

        <div id="sliderMainContainer" class="mb-12 hidden">
            <div class="relative w-full h-[300px] md:h-[500px] rounded-2xl overflow-hidden shadow-sm bg-slate-100 group">
                <div id="sliderWrapper" class="flex w-full h-full transition-transform duration-500 ease-in-out">
                    </div>
                
                <button onclick="prevSlide()" id="btnPrev" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 hover:bg-white text-slate-800 rounded-full flex items-center justify-center shadow-md transition-all opacity-0 group-hover:opacity-100 z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
                </button>
                <button onclick="nextSlide()" id="btnNext" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/80 hover:bg-white text-slate-800 rounded-full flex items-center justify-center shadow-md transition-all opacity-0 group-hover:opacity-100 z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" /></svg>
                </button>
                
                <div id="sliderIndicators" class="absolute bottom-4 left-0 right-0 flex justify-center gap-2 z-10">
                </div>
            </div>
            <p class="text-right text-sm text-slate-500 italic mt-3 pr-2">📷 Kredit Foto: <span id="readSumberFoto" class="font-medium text-slate-700"></span></p>
        </div>

        <article id="readIsi" class="content-render">
            </article>

    </div>

    <script>
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz4asOMmEvaoL-qfmxuvep7l3Amcv0uL4dCmtXklYMWF-uTlutlZT_9qTrY5hXVM4s-Xw/exec?status=PUBLISHED"; 
        let globalArticles = [];

        let currentSlideIndex = 0;
        let totalSlidesCount = 0;

        async function loadPublishedArticles() {
            try {
                const response = await fetch(GAS_WEB_APP_URL);
                const result = await response.json();
                
                document.getElementById('loading').style.display = 'none';

                if(result.result === "success") {
                    globalArticles = result.data.reverse(); 
                    const grid = document.getElementById('articleGrid');
                    grid.classList.remove('hidden');

                    if(globalArticles.length === 0) {
                        grid.innerHTML = `<div class="col-span-full text-center py-20"><p class="text-lg text-slate-500">Belum ada artikel yang dipublikasikan.</p></div>`;
                        return;
                    }

                    globalArticles.forEach(art => {
                        let thumbUrl = "https://images.unsplash.com/photo-1455390582262-044cdead27d8?w=800&q=80"; 
                        if(art.foto.length > 0) {
                            let fileIdMatch = art.foto[0].match(/\/file\/d\/(.+?)\//);
                            if (fileIdMatch && fileIdMatch[1]) {
                                thumbUrl = `https://drive.google.com/thumbnail?id=${fileIdMatch[1]}&sz=w800`;
                            }
                        }

                        const dateObj = new Date(art.tanggal);
                        const options = { year: 'numeric', month: 'long', day: 'numeric' };
                        const formattedDate = dateObj.toLocaleDateString('id-ID', options) !== "Invalid Date" ? dateObj.toLocaleDateString('id-ID', options) : art.tanggal.split("T")[0];

                        const card = document.createElement('div');
                        card.className = "bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer group flex flex-col";
                        card.onclick = () => openReadView(art.id);
                        card.innerHTML = `
                            <div class="h-52 w-full overflow-hidden bg-slate-100 relative">
                                <img src="${thumbUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700 ease-out">
                                <div class="absolute top-4 left-4 bg-white/95 backdrop-blur-sm text-[#044A80] text-xs font-bold px-3 py-1.5 rounded-md shadow-sm uppercase tracking-wider">
                                    ${art.kategori}
                                </div>
                            </div>
                            <div class="p-6 flex-1 flex flex-col">
                                <h3 class="font-bold text-xl text-slate-900 mb-3 leading-snug line-clamp-3 group-hover:text-[#044A80] transition-colors">${art.judul}</h3>
                                <div class="mt-auto flex items-center justify-between pt-5">
                                    <div class="flex items-center gap-2 overflow-hidden">
                                        <div class="w-6 h-6 rounded-full bg-[#eaf3fa] text-[#044A80] flex items-center justify-center text-xs font-bold shrink-0">${art.penulis.charAt(0).toUpperCase()}</div>
                                        <span class="text-sm font-medium text-slate-600 truncate">${art.penulis}</span>
                                    </div>
                                    <span class="text-xs text-slate-400 whitespace-nowrap ml-3 font-medium">${formattedDate}</span>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (err) {
                document.getElementById('loading').innerHTML = '<span class="text-red-500 font-medium">Koneksi terputus. Silakan muat ulang halaman.</span>';
            }
        }

        function openReadView(id) {
            const art = globalArticles.find(a => a.id === id);
            if(!art) return;

            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('readView').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            const dateObj = new Date(art.tanggal);
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = dateObj.toLocaleDateString('id-ID', options) !== "Invalid Date" ? dateObj.toLocaleDateString('id-ID', options) : art.tanggal.split("T")[0];

            document.getElementById('readKategori').innerText = art.kategori;
            document.getElementById('readJudul').innerText = art.judul;
            document.getElementById('readPenulis').innerText = art.penulis;
            document.getElementById('readAvatar').innerText = art.penulis.charAt(0).toUpperCase();
            document.getElementById('readTanggal').innerText = formattedDate;
            document.getElementById('readIsi').innerHTML = art.isi;

            const sumberFotoText = art.sumberFoto && art.sumberFoto.trim() !== "" 
                                    ? art.sumberFoto 
                                    : "Dokumen Pribadi (" + art.penulis + ")";
            document.getElementById('readSumberFoto').innerText = sumberFotoText;

            const sliderContainer = document.getElementById('sliderMainContainer');
            const sliderWrapper = document.getElementById('sliderWrapper');
            const sliderIndicators = document.getElementById('sliderIndicators');
            
            sliderWrapper.innerHTML = '';
            sliderIndicators.innerHTML = '';

            if(art.foto && art.foto.length > 0) {
                sliderContainer.classList.remove('hidden');
                
                art.foto.forEach((link, index) => {
                    let imgUrl = link;
                    let fileIdMatch = link.match(/\/file\/d\/(.+?)\//);
                    if (fileIdMatch && fileIdMatch[1]) {
                        imgUrl = `https://drive.google.com/thumbnail?id=${fileIdMatch[1]}&sz=w1200`;
                    }
                    
                    // KUNCI UTAMA PERBAIKAN: Memaksa ukuran tiap slide 100% mutlak
                    const slide = document.createElement('div');
                    slide.className = "w-full h-full flex-shrink-0 relative overflow-hidden";
                    slide.style.flex = "0 0 100%"; 
                    slide.innerHTML = `<img src="${imgUrl}" class="absolute inset-0 w-full h-full object-cover">`;
                    sliderWrapper.appendChild(slide);

                    const dot = document.createElement('button');
                    dot.className = `slider-dot h-2 rounded-full transition-all duration-300 shadow-sm ${index === 0 ? 'w-6 bg-white' : 'w-2 bg-white/50 hover:bg-white/80'}`;
                    dot.onclick = () => goToSlide(index);
                    sliderIndicators.appendChild(dot);
                });

                initSlider(art.foto.length);
            } else {
                sliderContainer.classList.add('hidden');
            }
        }

        function backToHome() {
            document.getElementById('readView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initSlider(total) {
            currentSlideIndex = 0;
            totalSlidesCount = total;
            updateSliderView();
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                updateSliderView();
            }
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlidesCount - 1) {
                currentSlideIndex++;
                updateSliderView();
            }
        }

        function goToSlide(index) {
            currentSlideIndex = index;
            updateSliderView();
        }

        function updateSliderView() {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
            
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            
            btnPrev.style.display = currentSlideIndex === 0 ? 'none' : 'flex';
            btnNext.style.display = currentSlideIndex === totalSlidesCount - 1 ? 'none' : 'flex';

            const indicators = document.querySelectorAll('.slider-dot');
            indicators.forEach((dot, index) => {
                if (index === currentSlideIndex) {
                    dot.classList.remove('bg-white/50', 'w-2');
                    dot.classList.add('bg-white', 'w-6');
                } else {
                    dot.classList.remove('bg-white', 'w-6');
                    dot.classList.add('bg-white/50', 'w-2');
                }
            });
        }

        window.onload = loadPublishedArticles;
    </script>
</body>
</html>
