<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi - Jendela Inspirasi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b1528;
            --card-bg: #13223c;
            --primary-blue: #38bdf8;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        /* Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 6%;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--text-muted);
            font-weight: 400;
            font-style: italic;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links a {
            color: var(--text-main);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-blue);
        }

        .search-icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            font-size: 16px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px 40px 20px;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .hero h1 span {
            color: var(--primary-blue);
        }

        /* Main Search & Filter Control App */
        .controls-container {
            max-width: 760px;
            margin: 0 auto 40px auto;
            padding: 0 20px;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .search-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 55px;
            background-color: #0f1b33;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 1px var(--primary-blue);
        }

        /* Filter Row & Select Dropdowns */
        .filter-settings {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .role-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-filter {
            background-color: #162544;
            color: var(--text-main);
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-filter.active {
            background-color: var(--primary-blue);
            color: #000000;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .dropdown-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .select-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .select-wrapper select {
            background-color: #162544;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        /* Grid Feed Content */
        .content-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 4%;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: #22375e;
        }

        .card-banner {
            position: relative;
            width: 100%;
            height: 210px;
            background-color: #0b1424;
        }

        .card-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-category {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(4px);
            color: var(--text-main);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-body {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            justify-content: space-between;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #1e2e4d;
            padding-top: 15px;
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #1e293b;
        }

        .author-meta {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .author-role {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .view-count {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Feedback Status */
        .status-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            width: 100%;
            grid-column: 1 / -1;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 50px;
        }

        .page-link {
            background-color: #162544;
            color: var(--text-main);
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .page-link.active {
            background-color: var(--primary-blue);
            color: #000000;
        }

        .page-link:hover:not(.active) {
            background-color: #1f335a;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PORTAL<span>LITERASI</span></div>
        <nav class="nav-links">
            <a href="daftar.html">Daftar</a>
            <a href="tulis.html" class="active">Tulis</a>
            <button class="search-icon-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>Jendela <span>Inspirasi</span></h1>
        </section>

        <section class="controls-container">
            <div class="search-wrapper">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari karya, penulis, atau teks tanggal...">
            </div>

            <div class="filter-settings">
                <div class="role-filters" id="roleFilterGroup">
                    <button class="btn-filter active" data-role="all">Semua Peran</button>
                    <button class="btn-filter" data-role="Siswa">Siswa</button>
                    <button class="btn-filter" data-role="Orang Tua">Orang Tua</button>
                    <button class="btn-filter" data-role="Guru">Guru</button>
                    <button class="btn-filter" data-role="Alumni">Alumni</button>
                </div>

                <div class="dropdown-group">
                    <div class="select-wrapper">
                        <span>Kategori:</span>
                        <select id="categorySelect">
                            <option value="all">Semua Kategori</option>
                            <option value="Cerpen (Cerita Pendek)">Cerpen</option>
                            <option value="Puisi & Sajak">Puisi</option>
                            <option value="Berita & Liputan Sekolah">Berita Sekolah</option>
                            <option value="Opini & Ulasan (Review)">Opini/Ulasan</option>
                            <option value="Edukasi & Pengetahuan">Edukasi</option>
                            <option value="Komik & Ilustrasi">Komik</option>
                            <option value="Fotografi">Fotografi</option>
                            <option value="Film Pendek & Video">Film Pendek</option>
                            <option value="Catatan Harian / Pengalaman">Catatan Pengalaman</option>
                            <option value="Artikel Umum">Artikel Umum</option>
                        </select>
                    </div>

                    <div class="select-wrapper">
                        <span>Urutkan:</span>
                        <select id="sortSelect">
                            <option value="terbaru">Terbaru</option>
                            <option value="populer">Populer</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="content-section">
            <div class="grid-container" id="feedGrid">
                </div>

            <div class="pagination" id="paginationContainer">
                </div>
        </section>
    </main>

    <script>
        // MOCK DATA (Representasi dari Database Google Sheets Anda)
        // Memastikan string peran mencakup variasi seperti "Guru/Staf" agar aman saat ditarik.
        const mockDatabase = [
            {
                id: "ART-97BD539E",
                timestamp: "5/14/2026 14:10",
                judul: "Raungan Taring Baja Eps. 1",
                kategori: "Komik & Ilustrasi",
                penulis: "Leonardus Yesiabdi",
                peran: "Orang Tua",
                detailPeran: "Ortu Abilah Husain",
                banner: "image_8b233a.jpg", // atau link Google Drive terkompresi
                views: 24,
                avatar: "https://i.pravatar.cc/100?img=33"
            },
            {
                id: "ART-88XF221A",
                timestamp: "5/15/2026 09:30",
                judul: "Desain Rumah Minimalis",
                kategori: "Fotografi",
                penulis: "Leonardus Yesi",
                peran: "Guru/Staf", // Terbaca di DB Redaksi sebagai Guru/Staf
                detailPeran: "Guru/Staf • Publikasi",
                banner: "image_8b233a.jpg",
                views: 9,
                avatar: "https://i.pravatar.cc/100?img=12"
            },
            {
                id: "ART-11QA902C",
                timestamp: "5/12/2026 11:15",
                judul: "Tes Artikel Literasi",
                kategori: "Artikel Umum",
                penulis: "Leonardus Yesiabdi",
                peran: "Orang Tua",
                detailPeran: "Orang Tua",
                banner: "image_cdd7ea.jpg",
                views: 4,
                avatar: "https://i.pravatar.cc/100?img=33"
            }
        ];

        // State Aplikasi Global
        let currentRole = "all";
        let currentCategory = "all";
        let currentSort = "terbaru";
        let searchQuery = "";

        // DOM Elements
        const feedGrid = document.getElementById('feedGrid');
        const searchInput = document.getElementById('searchInput');
        const categorySelect = document.getElementById('categorySelect');
        const sortSelect = document.getElementById('sortSelect');
        const roleButtons = document.querySelectorAll('#roleFilterGroup .btn-filter');

        // Fungsi Memrender Kartu ke Grid
        function renderFeed(data) {
            feedGrid.innerHTML = "";
            
            if (data.length === 0) {
                feedGrid.innerHTML = `<div class="status-message">Karya tidak ditemukan</div>`;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-banner">
                        <span class="badge-category">${getShortCategory(item.kategori)}</span>
                        <div style="width:100%; height:100%; background:#1a2b4c; display:flex; align-items:center; justify-content:center; color:#475569;">
                            <i class="fa-regular fa-image" font-size: 24px;></i>
                        </div>
                    </div>
                    <div class="card-body">
                        <h3 class="card-title">${item.judul}</h3>
                        <div class="card-footer">
                            <div class="author-info">
                                <img src="${item.avatar}" alt="${item.penulis}" class="author-img">
                                <div class="author-meta">
                                    <span class="author-name">${item.penulis}</span>
                                    <span class="author-role">${item.detailPeran}</span>
                                </div>
                            </div>
                            <div class="view-count">
                                <i class="fa-regular fa-eye"></i>
                                <span>${item.views}</span>
                            </div>
                        </div>
                    </div>
                `;
                feedGrid.appendChild(card);
            });
        }

        // Helper mempersingkat nama kategori panjang di tag badge
        function getShortCategory(fullCategory) {
            if(fullCategory.includes("Komik")) return "Komik";
            if(fullCategory.includes("Fotografi")) return "Fotografi";
            if(fullCategory.includes("Umum")) return "Artikel Umum";
            return fullCategory;
        }

        // CORE ENGINE: Logika Filter & Pencarian Komprehensif
        function filterAndSortData() {
            let filtered = [...mockDatabase];

            // 1. Filter Berdasarkan Peran (Dengan perbaikan pengecekan Guru/Staf)
            if (currentRole !== "all") {
                filtered = filtered.filter(item => {
                    if (currentRole === "Guru") {
                        // Jika klik tombol "GURU", data bertuliskan "Guru", "Staf", atau "Guru/Staf" harus lolos filter.
                        return item.peran.toLowerCase().includes('guru') || item.peran.toLowerCase().includes('staf');
                    }
                    return item.peran.toLowerCase() === currentRole.toLowerCase();
                });
            }

            // 2. Filter Berdasarkan Kategori Dropdown
            if (currentCategory !== "all") {
                filtered = filtered.filter(item => item.kategori === currentCategory);
            }

            // 3. Filter Berdasarkan Kolom Pencarian Input
            if (searchQuery.trim() !== "") {
                const query = searchQuery.toLowerCase().trim();
                filtered = filtered.filter(item => {
                    return item.judul.toLowerCase().includes(query) || 
                           item.penulis.toLowerCase().includes(query) || 
                           item.timestamp.toLowerCase().includes(query) ||
                           item.kategori.toLowerCase().includes(query);
                });
            }

            // 4. Pengurutan (Sorting)
            if (currentSort === "terbaru") {
                filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            } else if (currentSort === "populer") {
                filtered.sort((a, b) => b.views - a.views);
            }

            renderFeed(filtered);
        }

        // --- Event Listeners Setup ---

        // Event Klik Tombol Peran
        roleButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                roleButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentRole = button.getAttribute('data-role');
                filterAndSortData();
            });
        });

        // Event Ganti Dropdown Kategori
        categorySelect.addEventListener('change', (e) => {
            currentCategory = e.target.value;
            filterAndSortData();
        });

        // Event Ganti Dropdown Urutan
        sortSelect.addEventListener('change', (e) => {
            currentSort = e.target.value;
            filterAndSortData();
        });

        // Event Input Kolom Pencarian (Real-time pencarian)
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            filterAndSortData();
        });

        // Inisialisasi Pertama Kali Halaman Dimuat
        document.addEventListener("DOMContentLoaded", () => {
            filterAndSortData();
        });
    </script>
</body>
</html>
