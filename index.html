<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi Komunitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy-light: #38bdf8; --bg-dark: #0f172a; --card-dark: #1e293b; --border-dark: #334155; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow-x: hidden; }
        .navy-text { color: var(--navy-light); }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-dark); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .article-card { background: var(--card-dark); border: 1px solid var(--border-dark); transition: all 0.3s ease; cursor: pointer; border-radius: 2.5rem; }
        .article-card:hover { transform: translateY(-8px); border-color: var(--navy-light); }
        
        /* Wadah Media Utama Standar */
        .media-box { position: relative; width: 100%; aspect-ratio: 16/10; background: #020617; border-radius: 2rem; border: 1px solid var(--border-dark); overflow: hidden; }
        .slider-container { display: flex; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .slider-item-container { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 0.5rem; }
        .slider-item { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 1.5rem; }

        /* Mode Komik Memanjang */
        .media-box.comic-mode:not(.video-active) { 
            aspect-ratio: auto !important; 
            height: auto !important; 
            overflow: visible !important; 
            background: transparent !important; 
            border: none !important; 
        }
        .media-box.comic-mode:not(.video-active) .slider-container { 
            flex-direction: column !important; 
            gap: 1rem; 
            transform: none !important; 
            height: auto !important; 
        }
        .media-box.comic-mode:not(.video-active) .slider-item { 
            width: 100% !important; 
            height: auto !important; 
            max-height: none !important; 
        }

        /* Video Display Mode */
        .media-box.video-active { 
            display: block !important;
            aspect-ratio: 16/10 !important; 
            width: 100% !important;
            height: auto !important; 
            overflow: hidden !important; 
            background: #020617 !important; 
            border: 1px solid var(--border-dark) !important; 
            border-radius: 2rem !important; 
        }

        .media-box.video-active #videoContent,
        .media-box.video-active #readYoutube {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }

        /* Gaya Tombol Navigasi Tab */
        .tab-btn-active { background-color: #38bdf8; color: #0f172a; font-weight: 800; border-color: #38bdf8; }
        .tab-btn-inactive { background-color: #1e293b; color: #94a3b8; font-weight: 600; border-color: #334155; }
        .tab-btn-inactive:hover { color: #fff; border-color: #475569; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center gap-2">
            <div class="text-xl sm:text-2xl font-black navy-text tracking-tighter cursor-pointer whitespace-nowrap" onclick="location.reload()">
                PORTAL<span class="text-slate-500 font-light italic">LITERASI</span>
            </div>
            <div class="flex items-center gap-5 sm:gap-7 structural-buttons">

                <button onclick="document.getElementById('searchInput').focus()" class="text-white hover:text-[#38bdf8] transition-colors" title="Pencarian">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main id="homeView">

                    <button onclick="filterByRole('Orang Tua')" class="role-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold tracking-wide uppercase bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all">Orang Tua</button>
                    <button onclick="filterByRole('Guru')" class="role-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold tracking-wide uppercase bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all">Guru</button>
                    <button onclick="filterByRole('Staf')" class="role-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold tracking-wide uppercase bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all">Staf</button>
                    <button onclick="filterByRole('Alumni')" class="role-btn flex-shrink-0 px-4 py-2 rounded-full text-xs font-bold tracking-wide uppercase bg-slate-800 text-slate-300 hover:bg-slate-700 transition-all">Alumni</button>
                </div>

                <div class="flex items-center justify-between w-full lg:w-auto gap-4 pt-3 border-t border-slate-800/60 lg:border-t-0 lg:pt-0">
                    <div class="flex items-center gap-2">

                            <option value="Semua">Semua Kategori</option>

                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-slate-400 text-[10px] sm:text-xs font-bold uppercase tracking-wider whitespace-nowrap">Urutkan:</span>
                        <select id="sort-select" onchange="applyFiltersAndRender()" class="bg-slate-800 text-white border border-slate-700 rounded-xl px-2.5 py-1.5 text-xs font-semibold outline-none focus:ring-1 focus:ring-[#38bdf8]">
                            <option value="terbaru">Terbaru</option>

                </div>
            </div>
        </header>

        <section class="max-w-7xl mx-auto px-6 pb-20">

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxx87Qzy4VYYqnXET71EQc5cP_3ax9x4-sgLS8vEssE376fnSiOgfB91590qoBZ0kE-rA/exec";
        
        let allArticles = [];
        let filteredArticles = [];
        let authorMap = {};
        let currentPage = 1;
        const LIMIT = 9; 
        let currentSlide = 0;
        let currentYoutubeId = null;
        let activeKategoriIsKomik = false;

        let currentSelectedRole = 'Semua';
        let currentSelectedCategory = 'Semua';
        let resetTimer = null; // Menahan timer untuk fitur reset reaksi

        function getThumb(url, size = "w1200") {
            if (!url || url === "") return "https://via.placeholder.com/800x450/1e293b/64748b?text=Portal+Literasi";
            const match = url.match(/[-\w]{25,}/);
            return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=${size}` : url;
        }

        function getYoutubeId(url) {
            if (!url) return null;
            const str = url.toString().trim();
            if (str.length === 11) return str; 
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = str.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function getTimestampValue(art) {
            if (!art) return "";
            if (art.timestamp) return art.timestamp;
            if (art.Timestamp) return art.Timestamp;
            if (art.tanggal) return art.tanggal;
            if (art.Tanggal) return art.Tanggal;
            
            const keys = Object.keys(art);
            for (let key of keys) {
                const lowerKey = key.toLowerCase().trim();
                if (lowerKey.includes('time') || lowerKey.includes('tgl') || lowerKey.includes('date') || lowerKey.includes('waktu') || lowerKey.includes('merek') || lowerKey.includes('tayang')) {
                    return art[key];
                }
            }
            return "";
        }

        function parseToValidDate(val) {
            if (!val) return new Date(0);
            let str = String(val).toLowerCase().trim();
            if (str === "" || str === "undefined" || str === "null" || str === "-") return new Date(0);

            const idMonths = ["jan", "feb", "mar", "apr", "mei", "jun", "jul", "agu", "sep", "okt", "nov", "des"];
            const idMonthsLong = ["januari", "februari", "maret", "april", "mei", "juni", "juli", "agustus", "september", "oktober", "november", "desember"];
            
            for (let i = 0; i < 12; i++) {
                if (str.includes(idMonthsLong[i]) || str.includes(idMonths[i]) || (i === 7 && str.includes("ags"))) {
                    const nums = str.match(/\d+/g);
                    if (nums && nums.length >= 2) {
                        let day = parseInt(nums[0], 10);
                        let year = parseInt(nums[1], 10);
                        let foundYear = nums.find(n => n.length === 4);
                        if (foundYear) {
                            year = parseInt(foundYear, 10);
                            if (nums[0] !== foundYear) {
                                day = parseInt(nums[0], 10);
                            } else if (nums.length > 1) {
                                day = parseInt(nums[1], 10);
                            }
                        }
                        return new Date(year, i, day);
                    }
                }
            }

            if (/^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/.test(str)) {
                const d = new Date(str);
                if (!isNaN(d.getTime())) return d;
            }

            const parts = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
            if (parts) {
                let p1 = parseInt(parts[1], 10);
                let p2 = parseInt(parts[2], 10);
                let year = parseInt(parts[3], 10);
                if (year < 100) year += year < 50 ? 2000 : 1900;
                
                let day = p1;
                let month = p2 - 1;
                if (p2 > 12) {
                    day = p2;
                    month = p1 - 1;
                }
                return new Date(year, month, day);
            }

            let d = new Date(val);
            if (!isNaN(d.getTime())) return d;
            return new Date(0);
        }

        function formatIndonesianDate(timestampStr) {
            const d = parseToValidDate(timestampStr);
            if (d.getTime() === 0) return String(timestampStr || "-");
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        function formatToDDMMYYYY(timestampStr) {
            const d = parseToValidDate(timestampStr);
            if (d.getTime() === 0) return "-";
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function getSearchableDateText(timestampStr) {
            if (!timestampStr) return "";
            let d = parseToValidDate(timestampStr);
            if (isNaN(d.getTime()) || d.getTime() === 0) return String(timestampStr).toLowerCase();
            
            const months = ["januari", "februari", "maret", "april", "mei", "juni", "juli", "agustus", "september", "oktober", "november", "desember"];
            const monthsShort = ["jan", "feb", "mar", "apr", "mei", "jun", "jul", "agu", "sep", "okt", "nov", "des"];
            
            const day = d.getDate();
            const monthIndex = d.getMonth();
            const monthLong = months[monthIndex];
            const monthShortStr = monthsShort[monthIndex];
            const year = d.getFullYear();
            const padDay = String(day).padStart(2, '0');
            const padMonth = String(monthIndex + 1).padStart(2, '0');
            
            return `${day} ${monthLong} ${year} ${monthShortStr} ${padDay}/${padMonth}/${year} ${year}`;
        }

        function formatPoinMedsos(num) {
            const n = parseInt(num, 10) || 0;
            if (n >= 1000000) return (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1).replace('.0', '') + 'M';
            if (n >= 1000) return (n / 1000).toFixed(n % 1000 === 0 ? 0 : 1).replace('.0', '') + 'K';
            return n.toLocaleString('id-ID');
        }

        async function init() {
            try {
                const authRes = await fetch(`${GAS_URL}?action=getAuthors`).then(r => r.json());
                const authors = authRes.data || [];
                authors.forEach(a => { 
                    authorMap[a.pin?.toString().trim()] = { foto: a.foto, nama: a.nama, poin: a.poin }; 
                });
                renderLeaderboard(authors);

                const artRes = await fetch(GAS_URL).then(r => r.json());
                if (artRes.result === "success") {
                    allArticles = artRes.data;
                    renderCategoryDropdown(artRes.categories);
                    applyFiltersAndRender();
                }
            } catch (e) { console.error("Error Loading:", e); }
        }

        function applyFiltersAndRender() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            const sortOrder = document.getElementById('sort-select').value;
            currentSelectedCategory = document.getElementById('category-select').value;

            filteredArticles = allArticles.filter(art => {
                const peran = (art.peran || art.Peran || art.peran_saat_menulis || art.Peran_Saat_Menulis || '').toLowerCase();
                const matchRole = (currentSelectedRole === 'Semua') || (peran === currentSelectedRole.toLowerCase());
                const matchCategory = (currentSelectedCategory === 'Semua') || ((art.kategori || '').toLowerCase() === currentSelectedCategory.toLowerCase());
                return matchRole && matchCategory;
            });

            if (searchQuery !== "") {
                filteredArticles = filteredArticles.filter(art => {
                    const presidential = (art.judul || "").toLowerCase();
                    const penulis = (art.penulis || "").toLowerCase();
                    const isi = (art.isi || "").toLowerCase();
                    const kategori = (art.kategori || "").toLowerCase();
                    const dateSearchText = getSearchableDateText(getTimestampValue(art));

                    return presidential.includes(searchQuery) || 
                           penulis.includes(searchQuery) || 
                           isi.includes(searchQuery) || 
                           kategori.includes(searchQuery) ||
                           dateSearchText.includes(searchQuery);
                });
            }

            filteredArticles.sort((a, b) => {
                const timeA = parseToValidDate(getTimestampValue(a)).getTime();
                const timeB = parseToValidDate(getTimestampValue(b)).getTime();
                return sortOrder === 'terbaru' ? timeB - timeA : timeA - timeB;
            });

            currentPage = 1;
            renderPage();
        }

        function filterByRole(roleName) {
            currentSelectedRole = roleName;
            const buttons = document.querySelectorAll('.role-btn');
            buttons.forEach(btn => {
                const btnText = btn.textContent.trim().toLowerCase();
                const targetRole = roleName.toLowerCase();
                if (btnText === targetRole || (targetRole === 'semua' && btnText === 'semua peran')) {
                    btn.classList.add('bg-[#38bdf8]', 'text-slate-900');
                    btn.classList.remove('bg-slate-800', 'text-slate-300');
                } else {
                    btn.classList.remove('bg-[#38bdf8]', 'text-slate-900');
                    btn.classList.add('bg-slate-800', 'text-slate-300');
                }
            });
            applyFiltersAndRender();
        }

        function renderCategoryDropdown(cats) {
            const select = document.getElementById('category-select');
            if(!cats || cats.length === 0) return;
            const rawCats = cats.filter(c => c && c.toLowerCase() !== "semua");
            const uniqueCats = [...new Set(rawCats)];
            
            select.innerHTML = `<option value="Semua">Semua Kategori</option>`;
            uniqueCats.forEach(c => {
                select.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }

        function renderPage() {
            const grid = document.getElementById('articleGrid');
            const start = (currentPage - 1) * LIMIT;
            const end = start + LIMIT;
            const pageData = filteredArticles.slice(start, end);

            if (pageData.length === 0) {
                grid.innerHTML = `<div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-20 text-slate-500 font-bold tracking-widest uppercase">Karya tidak ditemukan</div>`;
                updatePagination();
                return;
            }

            grid.innerHTML = pageData.map((art, idx) => {
                const pin = art.pin?.toString().trim();
                const fotoPenulis = authorMap[pin] ? getThumb(authorMap[pin].foto, "w100") : `https://ui-avatars.com/api/?name=${encodeURIComponent(art.penulis)}`;
                
                const peran = art.peran || art.Peran || art.peran_saat_menulis || art.Peran_Saat_Menulis || '';
                const detailPeran = art.detail_peran || art.Detail_Peran || '';
                const displayPeran = peran ? `${peran}${detailPeran ? ' • ' + detailPeran : ''}` : '';
                const tglFormatted = formatToDDMMYYYY(getTimestampValue(art));
                
                let firstPhoto = "";
                if (art.foto) {
                    if (Array.isArray(art.foto) && art.foto.length > 0) firstPhoto = art.foto[0];
                    else if (typeof art.foto === 'string') firstPhoto = art.foto.split(',')[0].trim();
                }
                
                return `
                <div class="article-card p-5 fade-in flex flex-col justify-between" style="animation-delay: ${idx * 0.1}s" onclick="openReadView('${art.id}')">
                    <div>
                        <div class="h-56 mb-5 rounded-[1.8rem] overflow-hidden bg-slate-900 relative">
                            <img src="${getThumb(firstPhoto, "w600")}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/800x450/1e293b/64748b?text=Portal+Literasi'">
                            <div class="absolute top-4 left-4 bg-black/80 backdrop-blur-md px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border border-white/10">${art.kategori || 'Umum'}</div>
                        </div>
                        <span class="text-[10px] text-slate-400 font-bold tracking-wider mb-2 block">Tanggal ditayangkan (${tglFormatted})</span>
                        <h3 class="text-xl font-bold text-white line-clamp-2 px-1 leading-snug mb-5 hover:text-[#38bdf8] transition-colors">${art.judul}</h3>
                    </div>
                    <div class="flex items-center justify-between px-1 pt-4 border-t border-slate-700/50 mt-auto">
                        <div class="flex items-center gap-3">
                            <img src="${fotoPenulis}" class="w-8 h-8 rounded-full object-cover border border-slate-600 shadow-sm" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(art.penulis)}'">
                            <div class="flex flex-col">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${art.penulis}</span>
                                ${displayPeran ? `<span class="text-[8px] font-semibold text-slate-500 uppercase tracking-wider mt-0.5">${displayPeran}</span>` : ''}
                            </div>
                        </div>
                        <span class="text-[10px] font-black text-slate-600 tracking-tighter">👁️ ${art.views || 0}</span>
                    </div>
                </div>`;
            }).join('');
            
            updatePagination();
        }

        function updatePagination() {
            const container = document.getElementById('paginationContainer');
            container.innerHTML = "";
            const totalPages = Math.ceil(filteredArticles.length / LIMIT);
            if (totalPages <= 1) return;

            const prevDisabled = currentPage === 1;
            container.insertAdjacentHTML('beforeend', `
                <button onclick="changePage(${currentPage - 1})" ${prevDisabled ? 'disabled' : ''} class="px-4 py-2 rounded-xl text-xs font-bold tracking-widest transition-all uppercase ${prevDisabled ? 'text-slate-600 cursor-not-allowed border border-slate-800' : 'text-slate-400 border border-slate-700 hover:border-[#38bdf8] hover:text-[#38bdf8]'}">PREV</button>
            `);

            for (let i = 1; i <= totalPages; i++) {
                const isCurrent = i === currentPage;
                container.insertAdjacentHTML('beforeend', `
                    <button onclick="changePage(${i})" class="w-10 h-10 rounded-xl text-sm font-black transition-all ${isCurrent ? 'bg-[#38bdf8] text-slate-900 shadow-lg shadow-[#38bdf8]/20' : 'text-slate-400 border border-slate-700 hover:bg-slate-800 hover:text-white'}">${i}</button>
                `);
            }

            const nextDisabled = currentPage === totalPages;
            container.insertAdjacentHTML('beforeend', `
                <button onclick="changePage(${currentPage + 1})" ${nextDisabled ? 'disabled' : ''} class="px-4 py-2 rounded-xl text-xs font-bold tracking-widest transition-all uppercase ${nextDisabled ? 'text-slate-600 cursor-not-allowed border border-slate-800' : 'text-slate-400 border border-slate-700 hover:border-[#38bdf8] hover:text-[#38bdf8]'}">NEXT</button>
            `);
        }

        function changePage(targetPage) {
            const totalPages = Math.ceil(filteredArticles.length / LIMIT);
            if (targetPage < 1 || targetPage > totalPages) return;
            currentPage = targetPage;
            document.getElementById('searchInput').scrollIntoView({ behavior: 'smooth', block: 'center' });
            renderPage();
        }

        function renderLeaderboard(data) {
            const list = document.getElementById('leaderboardList');
            const top10 = [...data].sort((a, b) => (b.poin || 0) - (a.poin || 0)).slice(0, 10);
            list.innerHTML = top10.map((auth, idx) => `
                <div class="flex-shrink-0 bg-slate-800/40 border border-slate-700/50 p-4 sm:p-5 rounded-[2rem] flex items-center gap-4 sm:gap-5 min-w-[220px] sm:min-w-[260px] relative overflow-hidden group hover:border-[#38bdf8]/50 transition-all">
                    <div class="relative z-10">
                        <img src="${getThumb(auth.foto, 'w100')}" class="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl object-cover border-2 border-slate-700 group-hover:border-[#38bdf8] transition-all" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(auth.nama)}'">
                        <div class="absolute -top-2 -left-2 w-7 h-7 sm:w-8 sm:h-8 ${idx === 0 ? 'bg-yellow-500 text-slate-900' : 'bg-slate-700 text-white'} rounded-full flex items-center justify-center text-[9px] sm:text-[10px] font-black shadow-xl">#${idx+1}</div>
                    </div>
                    <div class="relative z-10 min-w-0 flex-1">
                        <p class="font-normal text-sm text-white uppercase tracking-tight truncate">${auth.nama}</p>
                        <p class="text-[10px] font-bold text-[#38bdf8] uppercase tracking-widest mt-1">${formatPoinMedsos(auth.poin || 0)} POIN</p>
                    </div>
                    <div class="absolute right-[-10%] bottom-[-20%] text-6xl sm:text-7xl font-black text-white opacity-[0.03] italic">#${idx+1}</div>
                </div>
            `).join('');
        }

        function openReadView(id) {
            const art = allArticles.find(a => a.id === id);
            if (!art) return;

            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('readView').classList.remove('hidden');
            window.scrollTo(0, 0);

            document.getElementById('readJudul').innerText = art.judul;
            document.getElementById('readPenulis').innerText = art.penulis;
            
            const peran = art.peran || art.Peran || art.peran_saat_menulis || art.Peran_Saat_Menulis || '';
            const detailPeran = art.detail_peran || art.Detail_Peran || '';
            const displayPeran = peran ? ` • ${peran}${detailPeran ? ' (' + detailPeran + ')' : ''}` : '';
            const tgl = formatIndonesianDate(getTimestampValue(art));

            document.getElementById('readStats').innerText = `${art.views || 0} VIEW • ${tgl} • ${art.kategori}${displayPeran}`;
            
            const pin = art.pin?.toString().trim();
            const fotoPenulis = authorMap[pin] ? getThumb(authorMap[pin].foto, "w100") : `https://ui-avatars.com/api/?name=${encodeURIComponent(art.penulis)}`;
            document.getElementById('readAvatar').innerHTML = `<img src="${fotoPenulis}" class="w-full h-full object-cover rounded-xl" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(art.penulis)}'">`;

            const slider = document.getElementById('imageSlider');
            slider.innerHTML = '';
            currentSlide = 0;
            slider.style.transform = 'translateX(0)';

            let photos = [];
            if (art.foto) {
                if (Array.isArray(art.foto)) photos = art.foto;
                else if (typeof art.foto === 'string') photos = art.foto.split(',').map(p => p.trim()).filter(p => p);
            }

            if (photos.length > 0) {
                slider.innerHTML = photos.map(p => `
                    <div class="slider-item-container">
                        <img src="${getThumb(p, 'w1200')}" class="slider-item" onerror="this.src='https://via.placeholder.com/800x450/1e293b/64748b?text=Portal+Literasi'">
                    </div>
                `).join('');
            } else {
                slider.innerHTML = `<div class="slider-item-container"><img src="https://via.placeholder.com/800x450/1e293b/64748b?text=Portal+Literasi" class="slider-item"></div>`;
            }

            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            if (photos.length > 1) {
                prevBtn.classList.remove('hidden');
                nextBtn.classList.remove('hidden');
            } else {
                prevBtn.classList.add('hidden');
                nextBtn.classList.add('hidden');
            }

            currentYoutubeId = getYoutubeId(art.video || art.Video || art.link_youtube || art.Link_Youtube || art.youtube || '');
            const mediaTabs = document.getElementById('mediaTabs');
            const mediaBox = document.getElementById('mediaBox');

            activeKategoriIsKomik = (art.kategori || '').toLowerCase().includes('komik');
            if (activeKategoriIsKomik) {
                mediaBox.classList.add('comic-mode');
            } else {
                mediaBox.classList.remove('comic-mode');
            }

            if (currentYoutubeId) {
                mediaTabs.classList.remove('hidden');
            } else {
                mediaTabs.classList.add('hidden');
            }
            switchMedia('foto');

            const kreditEl = document.getElementById('readKredit');
            if (art.kredit_foto || art.Kredit_Foto) {
                kreditEl.innerText = `Kredit Gambar: ${art.kredit_foto || art.Kredit_Foto}`;
                kreditEl.classList.remove('hidden');
            } else {
                kreditEl.classList.add('hidden');
            }

            const readIsiEl = document.getElementById('readIsi');
            readIsiEl.innerHTML = art.isi ? art.isi.replace(/\n/g, '<br>') : '';
            
            const links = readIsiEl.getElementsByTagName('a');
            for (let i = 0; i < links.length; i++) {
                let hrefValue = links[i].getAttribute('href');
                if (hrefValue) {
                    hrefValue = hrefValue.trim();
                    if (!/^https?:\/\//i.test(hrefValue)) {
                        links[i].setAttribute('href', 'https://' + hrefValue);
                    }
                }
            }

            // --- BAGIAN UTAMA MODIFIKASI: SISTEM REACT GAMIFIKASI INTERAKTIF ---
            const actionContainer = document.getElementById('actionContainer');
            const userClickCount = parseInt(localStorage.getItem(`liked_clicks_${art.id}`), 10) || 0;
            const likeCount = art.likes || art.Likes || art.suka || art.Suka || 0;
            
            actionContainer.innerHTML = `
                <div class="flex flex-col gap-2 bg-slate-800/40 p-4 rounded-2xl border border-slate-700/40 relative">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <button id="likeBtn" 
                                    onclick="triggerLikeGamified('${art.id}')" 
                                    onmousedown="startLikeResetTimer('${art.id}')" 
                                    onmouseup="clearLikeResetTimer()" 
                                    onmouseleave="clearLikeResetTimer()"
                                    ontouchstart="startLikeResetTimer('${art.id}')"
                                    ontouchend="clearLikeResetTimer()"
                                    class="group flex items-center gap-2 px-5 py-2.5 rounded-xl text-xs font-bold tracking-wider uppercase transition-all duration-150 active:scale-95 ${userClickCount > 0 ? 'bg-rose-500 text-white shadow-lg shadow-rose-500/20' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transition-transform group-hover:scale-110 ${userClickCount > 0 ? 'fill-current text-white' : 'text-slate-400'}" fill="${userClickCount > 0 ? 'currentColor' : 'none'}" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                </svg>
                                <span id="likeText">${userClickCount > 0 ? `Kamu Suka (+${userClickCount})` : 'Suka'}</span>
                            </button>
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest"><span id="likeCountNum">${likeCount}</span> Reaksi</span>
                        </div>
                        <button onclick="shareArticle('${art.judul.replace(/'/g, "\\'")}')" class="p-2.5 rounded-xl bg-slate-800 text-slate-400 hover:text-[#38bdf8] hover:bg-slate-700 transition-all" title="Bagikan Karya">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 01-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 01-5.368-2.684z" />
                            </svg>
                        </button>
                    </div>
                    <p class="text-[9px] font-medium text-slate-500 italic mt-1">*Bisa klik sampai 5x! Tahan tombol selama 1 detik untuk membatalkan (kembali ke 0).</p>
                </div>
            `;
        }

        // --- SISTEM FUNGSI ENGINE BARU UNTUK MANAGEMENT REACTION ---
        async function triggerLikeGamified(id) {
            const art = allArticles.find(a => a.id === id);
            if (!art) return;

            let userClickCount = parseInt(localStorage.getItem(`liked_clicks_${id}`), 10) || 0;
            const likeCountNum = document.getElementById('likeCountNum');
            const likeBtn = document.getElementById('likeBtn');
            const likeText = document.getElementById('likeText');
            const svg = likeBtn.querySelector('svg');

            if (userClickCount >= 5) {
                likeBtn.classList.add('animate-bounce');
                setTimeout(() => likeBtn.classList.remove('animate-bounce'), 300);
                return;
            }

            userClickCount += 1;
            localStorage.setItem(`liked_clicks_${id}`, userClickCount);

            let totalLikes = parseInt(likeCountNum.innerText, 10) || 0;
            totalLikes += 1;
            likeCountNum.innerText = totalLikes;
            
            art.likes = totalLikes; art.Likes = totalLikes; art.suka = totalLikes; art.Suka = totalLikes;

            likeBtn.className = "group flex items-center gap-2 px-5 py-2.5 rounded-xl text-xs font-bold tracking-wider uppercase transition-all duration-150 bg-rose-500 text-white shadow-lg shadow-rose-500/20 active:scale-95";
            likeText.innerText = `Kamu Suka (+${userClickCount})`;
            svg.setAttribute('fill', 'currentColor');
            svg.classList.add('fill-current', 'text-white');

            createHeartParticle(likeBtn);

            try {
                fetch(`${GAS_URL}?action=like&id=${id}&type=like`);
            } catch(e) { console.error("Gagal sinkronisasi data sheet:", e); }
        }

        function createHeartParticle(targetElement) {
            const rect = targetElement.getBoundingClientRect();
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = `${rect.left + rect.width / 2}px`;
            heart.style.top = `${rect.top}px`;
            heart.style.pointerEvents = 'none';
            heart.style.fontSize = `${Math.floor(Math.random() * 15) + 15}px`;
            heart.style.zIndex = '100';
            heart.style.transition = 'all 0.8s ease-out';
            heart.style.transform = 'translate(-50%, 0) scale(1)';
            heart.style.opacity = '1';
            document.body.appendChild(heart);

            const randomX = (Math.random() - 0.5) * 100;
            const randomY = -(Math.random() * 80 + 80);

            setTimeout(() => {
                heart.style.transform = `translate(calc(-50% + ${randomX}px), ${randomY}px) scale(1.4)`;
                heart.style.opacity = '0';
            }, 50);

            setTimeout(() => heart.remove(), 850);
        }

        function startLikeResetTimer(id) {
            resetTimer = setTimeout(() => {
                const userClickCount = parseInt(localStorage.getItem(`liked_clicks_${id}`), 10) || 0;
                if (userClickCount === 0) return;

                const art = allArticles.find(a => a.id === id);
                if (!art) return;

                const likeCountNum = document.getElementById('likeCountNum');
                const likeBtn = document.getElementById('likeBtn');
                const likeText = document.getElementById('likeText');
                const svg = likeBtn.querySelector('svg');

                let totalLikes = parseInt(likeCountNum.innerText, 10) || 0;
                totalLikes = Math.max(0, totalLikes - userClickCount);
                likeCountNum.innerText = totalLikes;
                
                art.likes = totalLikes; art.Likes = totalLikes; art.suka = totalLikes; art.Suka = totalLikes;

                localStorage.setItem(`liked_clicks_${id}`, 0);

                likeBtn.className = "group flex items-center gap-2 px-5 py-2.5 rounded-xl text-xs font-bold tracking-wider uppercase transition-all duration-150 bg-slate-800 text-slate-300 hover:bg-slate-700 active:scale-95";
                likeText.innerText = "Suka";
                svg.setAttribute('fill', 'none');
                svg.classList.remove('fill-current', 'text-white');
                svg.classList.add('text-slate-400');

                alert("Apresiasi kamu untuk artikel ini telah di-reset kembali ke 0.");

                for (let i = 0; i < userClickCount; i++) {
                    try {
                        fetch(`${GAS_URL}?action=like&id=${id}&type=unlike`);
                    } catch(e) { console.error(e); }
                }
            }, 1000); 
        }

        function clearLikeResetTimer() {
            if (resetTimer) clearTimeout(resetTimer);
        }

        function shareArticle(judul) {
            if (navigator.share) {
                navigator.share({ title: judul, url: window.location.href }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert("Tautan artikel berhasil disalin!");
            }
        }

        function backToHome() {
            document.getElementById('readView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
            document.getElementById('readYoutube').innerHTML = '';
        }

        function switchMedia(type) {
            const tabFoto = document.getElementById('tabFoto');
            const tabVideo = document.getElementById('tabVideo');
            const sliderContent = document.getElementById('sliderContent');
            const videoContent = document.getElementById('videoContent');
            const mediaBox = document.getElementById('mediaBox');

            if (type === 'foto') {
                if(tabFoto) tabFoto.className = 'flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200 tab-btn-active';
                if(tabVideo) tabVideo.className = 'flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200 tab-btn-inactive';
                sliderContent.classList.remove('hidden');
                videoContent.classList.add('hidden');
                mediaBox.classList.remove('video-active');
            } else {
                if(tabFoto) tabFoto.className = 'flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200 tab-btn-inactive';
                if(tabVideo) tabVideo.className = 'flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200 tab-btn-active';
                sliderContent.classList.add('hidden');
                videoContent.classList.remove('hidden');
                mediaBox.classList.add('video-active');
                if (currentYoutubeId) {
                    document.getElementById('readYoutube').innerHTML = `<iframe class="w-full h-full rounded-2xl" src="https://www.youtube.com/embed/${currentYoutubeId}?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                }
            }
        }

        function moveSlide(direction) {
            const slider = document.getElementById('imageSlider');
            const items = slider.children.length;
            if (items <= 1) return;
            currentSlide = (currentSlide + direction + items) % items;
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        window.onload = init;
    </script>
</body>
</html>
