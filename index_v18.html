<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Literasi Komunitas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --navy-light: #38bdf8; --bg-dark: #0f172a; --card-dark: #1e293b; --border-dark: #334155; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-dark); color: #f1f5f9; overflow-x: hidden; }
        .navy-text { color: var(--navy-light); }
        .glass-nav { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-dark); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-cat { background-color: var(--navy-light) !important; color: #0f172a !important; box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4); }
        
        .article-card { background: var(--card-dark); border: 1px solid var(--border-dark); transition: all 0.3s ease; cursor: pointer; border-radius: 2.5rem; }
        .article-card:hover { transform: translateY(-8px); border-color: var(--navy-light); }
        
        /* Wadah Media Utama Standar (Artikel/Cerpen/Esai) */
        .media-box { position: relative; width: 100%; aspect-ratio: 16/10; background: #020617; border-radius: 2rem; border: 1px solid var(--border-dark); overflow: hidden; }
        .slider-container { display: flex; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); height: 100%; }
        .slider-item-container { min-width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 0.5rem; }
        .slider-item { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 1.5rem; }

        /* Mode Komik Memanjang (Hanya aktif jika tab foto dipilih DAN sedang tidak memutar video) */
        .media-box.comic-mode:not(.video-active) { 
            aspect-ratio: auto !important; 
            height: auto !important; 
            overflow: visible !important; 
            background: transparent !important; 
            border: none !important; 
        }
        .media-box.comic-mode:not(.video-active) .slider-container { 
            flex-direction: column !important; 
            gap: 1rem; 
            transform: none !important; 
            height: auto !important; 
        }
        .media-box.comic-mode:not(.video-active) .slider-item { 
            width: 100% !important; 
            height: auto !important; 
            max-height: none !important; 
        }

        /* Solusi Mutakhir Video Gepeng: Jika tab video aktif, paksa ukuran sinematik 16:10 */
        .media-box.video-active { 
            display: block !important;
            aspect-ratio: 16/10 !important; 
            width: 100% !important;
            height: auto !important; 
            overflow: hidden !important; 
            background: #020617 !important; 
            border: 1px solid var(--border-dark) !important; 
            border-radius: 2rem !important; 
        }

        /* Memaksa elemen internal video agar mengisi ruang 100% penuh tanpa menciut */
        .media-box.video-active #videoContent,
        .media-box.video-active #readYoutube {
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }

        /* Gaya Tombol Navigasi Tab */
        .tab-btn-active { background-color: #38bdf8; color: #0f172a; font-weight: 800; border-color: #38bdf8; }
        .tab-btn-inactive { background-color: #1e293b; color: #94a3b8; font-weight: 600; border-color: #334155; }
        .tab-btn-inactive:hover { color: #fff; border-color: #475569; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
</style>
</head>
<body>

    <nav class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center gap-2">
            <div class="text-xl sm:text-2xl font-black navy-text tracking-tighter cursor-pointer whitespace-nowrap" onclick="location.reload()">
                PORTAL<span class="text-slate-500 font-light italic">LITERASI</span>
            </div>
            <div class="flex gap-1.5 sm:gap-3 structural-buttons">
                <a href="daftar.html" class="bg-slate-800 text-white font-bold py-2 px-3 sm:py-2.5 sm:px-5 rounded-xl text-[10px] sm:text-xs border border-slate-700 hover:bg-slate-700 transition-all">Daftar</a>
                <a href="tulis.html" class="bg-[#38bdf8] text-slate-900 font-bold py-2 px-3 sm:py-2.5 sm:px-5 rounded-xl text-[10px] sm:text-xs shadow-lg shadow-blue-500/20 hover:scale-105 transition-all whitespace-nowrap">Kirim Naskah</a>
            </div>
        </div>
    </nav>

    <main id="homeView">
        <header class="max-w-4xl mx-auto px-6 pt-12 sm:pt-16 pb-10 text-center">
            <h1 class="text-4xl sm:text-5xl md:text-7xl font-extrabold tracking-tighter mb-6 text-white">Jendela <span class="navy-text">Inspirasi</span></h1>
            <div id="catContainer" class="flex gap-2 sm:gap-3 overflow-x-auto no-scrollbar py-6 justify-start md:justify-center px-2"></div>
            <div class="relative max-w-2xl mx-auto mt-4 px-4">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Cari karya atau penulis..." class="w-full bg-slate-800/50 border border-slate-700 text-white py-4 px-8 rounded-2xl focus:ring-2 focus:ring-[#38bdf8] outline-none transition-all">
            </div>
        </header>

        <section class="max-w-7xl mx-auto px-6 pb-20">
            <div id="articleGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

            <div id="paginationContainer" class="flex justify-center items-center gap-8 mt-16 hidden">
                <button id="prevPage" onclick="changePage(-1)" class="p-4 rounded-full border border-slate-700 text-slate-400 hover:border-[#38bdf8] hover:text-[#38bdf8] transition-all disabled:opacity-20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <span id="pageIndicator" class="font-black text-slate-500 tracking-tighter text-sm">HALAMAN 1 / 1</span>
                <button id="nextPage" onclick="changePage(1)" class="p-4 rounded-full border border-slate-700 text-slate-400 hover:border-[#38bdf8] hover:text-[#38bdf8] transition-all disabled:opacity-20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
        </section>

        <section class="bg-slate-900/50 border-t border-slate-800 py-16 sm:py-20">
            <div class="max-w-7xl mx-auto px-6">
                <div class="flex items-center justify-between mb-10">
                    <div>
                        <h2 class="text-3xl font-black text-white italic tracking-tighter">🏆 TOP PENULIS</h2>
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Paling Aktif Minggu Ini</p>
                    </div>
                </div>
                <div id="leaderboardList" class="flex gap-4 sm:gap-6 overflow-x-auto pb-8 no-scrollbar px-1"></div>
            </div>
        </section>
    </main>

    <main id="readView" class="hidden pb-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
            <button onclick="backToHome()" class="mb-8 font-black text-xs text-slate-500 hover:text-white transition-all tracking-widest uppercase inline-flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                KEMBALI KE GALERI
            </button>
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                <div class="lg:col-span-6 space-y-4 lg:sticky lg:top-24">
                    
                    <div id="mediaTabs" class="flex gap-2 w-full hidden">
                        <button id="tabFoto" onclick="switchMedia('foto')" class="flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200">
                            📸 Galeri Foto
                        </button>
                        <button id="tabVideo" onclick="switchMedia('video')" class="flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200">
                            🎥 Video YouTube
                        </button>
                    </div>

                    <div id="mediaBox" class="media-box shadow-2xl">
                        <div id="sliderContent" class="h-full w-full relative">
                            <div id="imageSlider" class="slider-container"></div>
                            <button id="prevBtn" onclick="moveSlide(-1)" class="absolute left-4 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-[#38bdf8] hover:text-slate-900 text-white w-10 h-10 rounded-full z-20 transition-all font-bold text-lg">‹</button>
                            <button id="nextBtn" onclick="moveSlide(1)" class="absolute right-4 top-1/2 -translate-y-1/2 bg-black/70 hover:bg-[#38bdf8] hover:text-slate-900 text-white w-10 h-10 rounded-full z-20 transition-all font-bold text-lg">›</button>
                        </div>
                        
                        <div id="videoContent" class="w-full h-full bg-black hidden">
                            <div id="readYoutube" class="w-full h-full"></div>
                        </div>
                    </div>

                    <p id="readKredit" class="text-[11px] font-bold italic text-slate-500 px-2 uppercase tracking-wider hidden"></p>
                </div>

                <div class="lg:col-span-6 bg-slate-900/30 border border-slate-800/60 p-6 sm:p-10 rounded-[2.5rem]">
                    <h1 id="readJudul" class="text-3xl sm:text-4xl md:text-5xl font-black text-white mb-6 leading-tight tracking-tighter"></h1>
                    
                    <div class="flex items-center gap-4 border-b border-slate-800/80 pb-6 mb-8">
                        <div id="readAvatar" class="w-12 h-12 rounded-xl bg-slate-800 overflow-hidden border border-slate-700"></div>
                        <div>
                            <p id="readPenulis" class="font-black text-white uppercase text-xs tracking-wider"></p>
                            <p id="readStats" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-0.5"></p>
                        </div>
                    </div>

                    <article id="readIsi" class="prose prose-invert max-w-none text-slate-300 text-base sm:text-lg leading-relaxed"></article>

                    <div class="mt-12 pt-6 border-t border-slate-800/80 flex">
                        <button onclick="backToHome()" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-black text-xs py-4 px-6 rounded-xl transition-all tracking-widest uppercase shadow-lg">
                            SELESAI BACA & KEMBALI
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxx87Qzy4VYYqnXET71EQc5cP_3ax9x4-sgLS8vEssE376fnSiOgfB91590qoBZ0kE-rA/exec";
        let allArticles = [];
        let filteredArticles = [];
        let authorMap = {};
        let currentPage = 1;
        const LIMIT = 6;
        let currentSlide = 0;
        let currentYoutubeId = null;
        let activeKategoriIsKomik = false; // Tracker status kategori

        function getThumb(url, size = "w1200") {
            if (!url || url === "") return "https://via.placeholder.com/800x450/1e293b/64748b?text=Portal+Literasi";
            const match = url.match(/[-\w]{25,}/);
            return match ? `https://drive.google.com/thumbnail?id=${match[0]}&sz=${size}` : url;
        }

        function getYoutubeId(url) {
            if (!url) return null;
            const str = url.toString().trim();
            if (str.length === 11) return str; 
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = str.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function init() {
            try {
                const authRes = await fetch(`${GAS_URL}?action=getAuthors`).then(r => r.json());
                const authors = authRes.data || [];
                authors.forEach(a => { 
                    authorMap[a.pin?.toString().trim()] = { foto: a.foto, nama: a.nama }; 
                });
                renderLeaderboard(authors);

                const artRes = await fetch(GAS_URL).then(r => r.json());
                if (artRes.result === "success") {
                    allArticles = artRes.data;
                    filteredArticles = [...allArticles];
                    renderCategories(artRes.categories);
                    renderPage();
                }
            } catch (e) { console.error("Error Loading:", e); }
        }

        function renderPage() {
            const grid = document.getElementById('articleGrid');
            const start = (currentPage - 1) * LIMIT;
            const end = start + LIMIT;
            const pageData = filteredArticles.slice(start, end);

            grid.innerHTML = pageData.map((art, idx) => {
                const pin = art.pin?.toString().trim();
                const fotoPenulis = authorMap[pin] ? getThumb(authorMap[pin].foto, "w100") : `https://ui-avatars.com/api/?name=${art.penulis}`;
                
                return `
                <div class="article-card p-5 fade-in" style="animation-delay: ${idx * 0.1}s" onclick="openReadView('${art.id}')">
                    <div class="h-56 mb-5 rounded-[1.8rem] overflow-hidden bg-slate-900 relative">
                        <img src="${getThumb(art.foto[0], "w600")}" class="w-full h-full object-cover">
                        <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest border border-white/10">${art.kategori}</div>
                    </div>
                    <h3 class="text-xl font-bold text-white line-clamp-2 px-1 leading-snug mb-5 group-hover:navy-text transition-colors">${art.judul}</h3>
                    <div class="flex items-center justify-between px-1 pt-4 border-t border-slate-700/50">
                        <div class="flex items-center gap-3">
                            <img src="${fotoPenulis}" class="w-8 h-8 rounded-full object-cover border border-slate-600 shadow-sm">
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${art.penulis}</span>
                        </div>
                        <span class="text-[10px] font-black text-slate-600 tracking-tighter">👁️ ${art.views || 0}</span>
                    </div>
                </div>`;
            }).join('');
            updatePagination();
        }

        function renderLeaderboard(data) {
            const list = document.getElementById('leaderboardList');
            const top10 = [...data].sort((a, b) => (b.poin || 0) - (a.poin || 0)).slice(0, 10);
            list.innerHTML = top10.map((auth, idx) => `
                <div class="flex-shrink-0 bg-slate-800/40 border border-slate-700/50 p-4 sm:p-5 rounded-[2rem] flex items-center gap-4 sm:gap-5 min-w-[220px] sm:min-w-[260px] relative overflow-hidden group hover:border-[#38bdf8]/50 transition-all">
                    <div class="relative z-10">
                        <img src="${getThumb(auth.foto, 'w100')}" class="w-14 h-14 sm:w-16 sm:h-16 rounded-2xl object-cover border-2 border-slate-700 group-hover:border-[#38bdf8] transition-all" onerror="this.src='https://ui-avatars.com/api/?name=${auth.nama}'">
                        <div class="absolute -top-2 -left-2 w-7 h-7 sm:w-8 sm:h-8 ${idx === 0 ? 'bg-yellow-500 text-slate-900' : 'bg-slate-700 text-white'} rounded-full flex items-center justify-center text-[9px] sm:text-[10px] font-black shadow-xl">#${idx+1}</div>
                    </div>
                    <div class="relative z-10 min-w-0 flex-1">
                        <p class="font-normal text-sm text-white uppercase tracking-tight truncate">${auth.nama}</p>
                        <p class="text-[10px] font-bold text-[#38bdf8] uppercase tracking-widest mt-1">${auth.poin || 0} POIN</p>
                    </div>
                    <div class="absolute right-[-10%] bottom-[-20%] text-6xl sm:text-7xl font-black text-white opacity-[0.03] italic">#${idx+1}</div>
                </div>
            `).join('');
        }

        function openReadView(id) {
            const art = allArticles.find(a => a.id === id);
            if (!art) return;

            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('readView').classList.remove('hidden');
            window.scrollTo(0, 0);

            document.getElementById('readJudul').innerText = art.judul;
            document.getElementById('readPenulis').innerText = art.penulis;
            document.getElementById('readStats').innerText = `${art.views || 0} VIEW • ${art.kategori}`;
            document.getElementById('readIsi').innerHTML = art.isi.replace(/\n/g, '<br>');
            
            const kreditEl = document.getElementById('readKredit');
            if (art.kredit && art.kredit.trim() !== "") {
                kreditEl.innerText = "Sumber/Kredit: " + art.kredit;
                kreditEl.classList.remove('hidden');
            } else {
                kreditEl.classList.add('hidden');
            }

            const tabsEl = document.getElementById('mediaTabs');
            currentYoutubeId = getYoutubeId(art.youtube);
            
            if (currentYoutubeId) {
                tabsEl.classList.remove('hidden'); 
            } else {
                tabsEl.classList.add('hidden'); 
            }

            const mediaBox = document.getElementById('mediaBox');
            const slider = document.getElementById('imageSlider');
            activeKategoriIsKomik = art.kategori?.toLowerCase() === 'komik';

            // Bersihkan sisa class modifikasi sebelumnya
            mediaBox.classList.remove('comic-mode', 'video-active');

            if (activeKategoriIsKomik) {
                mediaBox.classList.add('comic-mode');
                document.getElementById('prevBtn').classList.add('hidden');
                document.getElementById('nextBtn').classList.add('hidden');
            } else {
                document.getElementById('prevBtn').classList.toggle('hidden', art.foto.length <= 1);
                document.getElementById('nextBtn').classList.toggle('hidden', art.foto.length <= 1);
            }

            // Set default tab ke foto setiap kali membuka karya baru
            switchMedia('foto');

            const pin = art.pin?.toString().trim();
            const avatarImg = authorMap[pin] ? getThumb(authorMap[pin].foto, "w100") : `https://ui-avatars.com/api/?name=${art.penulis}`;
            document.getElementById('readAvatar').innerHTML = `<img src="${avatarImg}" class="w-full h-full object-cover">`;

            slider.innerHTML = art.foto.map(f => `
                <div class="slider-item-container">
                    <img src="${getThumb(f, 'w1600')}" class="slider-item">
                </div>
            `).join('');
            
            currentSlide = 0;
            updateSlider();
            fetch(`${GAS_URL}?action=hitView&id=${id}`);
        }

        function switchMedia(type) {
            const btnFoto = document.getElementById('tabFoto');
            const btnVideo = document.getElementById('tabVideo');
            const contentSlider = document.getElementById('sliderContent');
            const contentVideo = document.getElementById('videoContent');
            const youtubeContainer = document.getElementById('readYoutube');
            const mediaBox = document.getElementById('mediaBox');

            if (type === 'video' && currentYoutubeId) {
                btnVideo.className = "flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200 tab-btn-active";
                btnFoto.className = "flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200 tab-btn-inactive";
                
                contentSlider.classList.add('hidden');
                contentVideo.classList.remove('hidden');
                
                // Tambahkan class video-active untuk memaksa aspect-ratio 16/10 sinematik
                mediaBox.classList.add('video-active');
                
                youtubeContainer.innerHTML = `<iframe class="w-full h-full" src="https://www.youtube.com/embed/${currentYoutubeId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
            } else {
                btnFoto.className = "flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200 tab-btn-active";
                btnVideo.className = "flex-1 py-3 px-4 rounded-2xl border text-xs tracking-wider uppercase transition-all duration-200 tab-btn-inactive";
                
                contentSlider.classList.remove('hidden');
                contentVideo.classList.add('hidden');
                
                // Matikan paksaan rasio video agar layout kembali ke setelan dasar kategori naskah
                mediaBox.classList.remove('video-active');
                
                youtubeContainer.innerHTML = ''; 
            }
        }

        function moveSlide(step) {
            const slides = document.querySelectorAll('.slider-item-container');
            currentSlide = (currentSlide + step + slides.length) % slides.length;
            updateSlider();
        }

        function updateSlider() {
            const slider = document.getElementById('imageSlider');
            if(!document.getElementById('mediaBox').classList.contains('comic-mode')) {
                slider.style.transform = `translateX(-${currentSlide * 100}%)`;
            } else {
                slider.style.transform = 'none';
            }
        }

        function changePage(dir) {
            currentPage += dir;
            window.scrollTo({ top: 300, behavior: 'smooth' });
            renderPage();
        }

        function updatePagination() {
            const totalPages = Math.ceil(filteredArticles.length / LIMIT);
            document.getElementById('paginationContainer').classList.toggle('hidden', totalPages <= 1);
            document.getElementById('pageIndicator').innerText = `HALAMAN ${currentPage} / ${totalPages}`;
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }

        function renderCategories(cats) {
            const container = document.getElementById('catContainer');
            const rawCats = cats.filter(c => c && c.toLowerCase() !== "semua");
            const uniqueCats = ["Semua", ...new Set(rawCats)];
            
            container.innerHTML = uniqueCats.map(c => {
                const safeId = `btn-${c.replace(/\s+/g, '-')}`;
                return `
                <button onclick="filterCat('${c}')" 
                        id="${safeId}" 
                        class="cat-btn flex-shrink-0 px-6 sm:px-8 py-2.5 rounded-full border border-slate-700 text-[10px] font-black uppercase tracking-widest transition-all ${c === 'Semua' ? 'active-cat' : 'text-slate-500 hover:text-white'}">
                    ${c}
                </button>`;
            }).join('');
        }

        function filterCat(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('active-cat');
                b.classList.add('text-slate-500', 'hover:text-white');
            });

            const safeId = `btn-${cat.replace(/\s+/g, '-')}`;
            const activeBtn = document.getElementById(safeId);
            if (activeBtn) {
                activeBtn.classList.add('active-cat');
                activeBtn.classList.remove('text-slate-500', 'hover:text-white');
            }

            filteredArticles = (cat === "Semua") ? [...allArticles] : allArticles.filter(a => a.kategori === cat);
            currentPage = 1;
            renderPage();
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            filteredArticles = allArticles.filter(a => a.judul.toLowerCase().includes(q) || a.penulis.toLowerCase().includes(q));
            currentPage = 1;
            renderPage();
        }

        function backToHome() {
            document.getElementById('readView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
            renderPage();
        }

        init();
    </script>
</body>
</html>
