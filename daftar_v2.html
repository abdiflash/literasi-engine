<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Penulis - Portal Literasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .navy-bg { background-color: #044A80; }
        .navy-text { color: #044A80; }
        .navy-border { border-color: #044A80; }
        .navy-hover:hover { background-color: #03365e; }
    </style>
</head>
<body class="text-slate-800 flex items-center justify-center min-h-screen py-10 px-5">

    <div class="bg-white max-w-2xl w-full rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <div class="navy-bg text-white px-8 py-10 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-white opacity-5 rounded-full -translate-y-1/2 translate-x-1/3"></div>
            <h1 class="text-3xl font-bold mb-2 relative z-10">Bergabung Sebagai Penulis</h1>
            <p class="text-blue-100 relative z-10">Mari berkontribusi membangun budaya literasi sekolah kita.</p>
        </div>

        <div class="p-8 md:p-10">
            <form id="formDaftar" onsubmit="submitPendaftaran(event)">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Nama Lengkap</label>
                        <input type="text" id="nama" required class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-[#044A80] focus:border-[#044A80] outline-none transition-all" placeholder="Misal: Leonardus Yesi">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Email</label>
                        <input type="email" id="email" required class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-[#044A80] focus:border-[#044A80] outline-none transition-all" placeholder="Email aktif Anda">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Peran di Sekolah</label>
                        <select id="peran" required onchange="updateValidasiLabel()" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-[#044A80] focus:border-[#044A80] outline-none transition-all bg-white">
                            <option value="" disabled selected>-- Pilih Peran --</option>
                            <option value="Guru/Staf">Guru / Staf</option>
                            <option value="Siswa">Siswa</option>
                            <option value="Orang Tua">Orang Tua</option>
                            <option value="Alumni">Alumni</option>
                        </select>
                    </div>
                    <div>
                        <label id="labelValidasi" class="block text-sm font-semibold text-slate-700 mb-2">Data Validasi</label>
                        <input type="text" id="validasi" required class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-[#044A80] focus:border-[#044A80] outline-none transition-all" placeholder="Pilih peran terlebih dahulu">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">No. WhatsApp</label>
                        <input type="tel" id="wa" required class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-[#044A80] focus:border-[#044A80] outline-none transition-all" placeholder="Misal: 08123456789">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Foto Profil Penulis</label>
                        <div class="flex items-center gap-3">
                            <div id="previewContainer" class="w-12 h-12 rounded-full bg-slate-100 border border-slate-300 flex items-center justify-center overflow-hidden flex-shrink-0">
                                <i class="fa-solid fa-user text-slate-400"></i>
                            </div>
                            <div class="flex-1">
                                <input type="file" id="fotoInput" accept="image/jpeg, image/png" class="hidden">
                                <button type="button" onclick="document.getElementById('fotoInput').click()" class="w-full bg-white border border-slate-300 text-slate-700 px-3 py-3 rounded-xl text-sm font-semibold hover:bg-slate-50 transition-all text-left flex justify-between items-center outline-none focus:ring-2 focus:ring-[#044A80]">
                                    <span id="namaFile">Pilih Foto (Max 2MB)</span>
                                    <i class="fa-solid fa-camera"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-8 mt-4">
                    <label class="block text-sm font-bold text-slate-800 mb-2">
                        <i class="fa-solid fa-lock navy-text mr-2"></i>Buat PIN Penulis (6 Angka)
                    </label>
                    <p class="text-xs text-slate-500 mb-4">PIN ini akan selalu Anda gunakan setiap kali mengirim naskah. Harap ingat baik-baik.</p>
                    <div class="relative">
                        <input type="password" id="pin" required maxlength="6" minlength="6" pattern="\d{6}" title="Harus berupa 6 digit angka" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:ring-2 focus:ring-[#044A80] focus:border-[#044A80] outline-none transition-all text-xl tracking-[0.5em] font-bold text-center" placeholder="••••••">
                        <button type="button" onclick="togglePIN()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <i id="eyeIcon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="w-full navy-bg navy-hover text-white font-bold py-4 rounded-xl transition-all shadow-lg hover:shadow-xl flex items-center justify-center gap-2 text-lg">
                    <span>Kirim Pendaftaran</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>

                <div id="statusMessage" class="mt-6 text-center hidden p-4 rounded-xl font-medium"></div>

            </form>
            
            <div class="mt-8 text-center">
                <a href="index.html" class="text-slate-500 hover:text-[#044A80] text-sm font-medium transition-colors">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Beranda
                </a>
            </div>
        </div>
    </div>

    <script>
        // --- MASUKKAN URL WEB APP ANDA DI SINI ---
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxx87Qzy4VYYqnXET71EQc5cP_3ax9x4-sgLS8vEssE376fnSiOgfB91590qoBZ0kE-rA/exec";

        let base64Foto = ""; // Penampung data foto

        // Fungsi Auto-Compress Foto
        document.getElementById('fotoInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('namaFile').innerText = file.name.length > 15 ? file.name.substring(0, 15) + '...' : file.name;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 400; // Resize resolusi ke maks 400px
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Convert ke JPEG dengan kualitas 70%
                    base64Foto = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // Tampilkan di preview
                    document.getElementById('previewContainer').innerHTML = `<img src="${base64Foto}" class="w-full h-full object-cover">`;
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function updateValidasiLabel() {
            const peran = document.getElementById('peran').value;
            const inputValidasi = document.getElementById('validasi');
            const labelValidasi = document.getElementById('labelValidasi');

            if(peran === "Guru/Staf") {
                labelValidasi.innerText = "Nomor Induk (NIK/NIP)";
                inputValidasi.placeholder = "Masukkan NIK / NIP Anda";
            } else if(peran === "Siswa") {
                labelValidasi.innerText = "Nomor Induk Siswa (NIS/NISN)";
                inputValidasi.placeholder = "Masukkan NIS / NISN Anda";
            } else if(peran === "Orang Tua") {
                labelValidasi.innerText = "Nama Anak & Angkatan";
                inputValidasi.placeholder = "Misal: Budi Santoso (Angkatan 2024)";
            } else if(peran === "Alumni") {
                labelValidasi.innerText = "Tahun Kelulusan";
                inputValidasi.placeholder = "Misal: Lulus Tahun 2021";
            }
        }

        function togglePIN() {
            const pinInput = document.getElementById('pin');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (pinInput.type === "password") {
                pinInput.type = "text";
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                pinInput.type = "password";
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        async function submitPendaftaran(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            const statusBox = document.getElementById('statusMessage');
            
            // Validasi jika foto belum diupload
            if (!base64Foto) {
                statusBox.classList.remove('hidden');
                statusBox.classList.add('bg-red-50', 'text-red-600');
                statusBox.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-2"></i>Harap pilih Foto Profil Anda.';
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memproses Pendaftaran...';
            btnSubmit.classList.add('opacity-70', 'cursor-not-allowed');
            statusBox.classList.add('hidden');

            const payload = {
                action: "daftar",
                nama: document.getElementById('nama').value,
                email: document.getElementById('email').value,
                peran: document.getElementById('peran').value,
                validasi: document.getElementById('validasi').value,
                wa: document.getElementById('wa').value,
                fotoBase64: base64Foto, // Data foto yang sudah dikompres
                pin: document.getElementById('pin').value
            };

            try {
                // Di Google Apps Script standard doPost, biasanya kita butuh no-cors jika tidak di-setup CORS
                // Namun karena script Anda sebelumnya sukses menggunakan default, kita tetap pertahankan as is.
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                statusBox.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'bg-green-50', 'text-green-700');
                
                if(result.result === "success") {
                    statusBox.classList.add('bg-green-50', 'text-green-700');
                    statusBox.innerHTML = '<i class="fa-solid fa-circle-check mr-2"></i>' + result.message;
                    
                    // Reset form dan foto preview
                    document.getElementById('formDaftar').reset();
                    base64Foto = "";
                    document.getElementById('previewContainer').innerHTML = '<i class="fa-solid fa-user text-slate-400"></i>';
                    document.getElementById('namaFile').innerText = 'Pilih Foto (Max 2MB)';
                } else {
                    statusBox.classList.add('bg-red-50', 'text-red-600');
                    statusBox.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-2"></i>' + result.message;
                }
            } catch (error) {
                statusBox.classList.remove('hidden');
                statusBox.classList.add('bg-red-50', 'text-red-600');
                statusBox.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-2"></i>Terjadi kesalahan koneksi. Silakan coba lagi.';
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<span>Kirim Pendaftaran</span><i class="fa-solid fa-paper-plane"></i>';
                btnSubmit.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
